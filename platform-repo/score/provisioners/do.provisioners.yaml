# =============================================================================
# CATALOG PROVISIONER — DIGITALOCEAN (DOKS)
# Team hạ tầng sở hữu. Dev chỉ khai `type` trong score.yaml, KHÔNG đọc file này.
#
# CÙNG GIAO DIỆN SCORE với onprem/cloud — chỉ khác cách "hiện thực hóa":
#   type: postgres   -> StatefulSet Postgres trên do-block-storage (Block Storage CSI)
#   type: mysql      -> StatefulSet MySQL/MariaDB trên do-block-storage
#   type: mongodb    -> StatefulSet MongoDB trên do-block-storage
#   type: redis      -> Deployment Redis (mặc định KHÔNG PVC — cache)
#   type: app-config -> Secret gom key cấu hình (giống hệt onprem/cloud)
#   type: route      -> Ingress nginx (ingress-nginx trên DOKS -> DO Load Balancer)
#   type: service    -> chỉ xuất DNS nội bộ (không sinh manifest)
#
# KHÁC BIỆT SO VỚI onprem:
#   - storageClassName: do-block-storage  (CSI mặc định của DOKS — KHÔNG Rook Ceph).
#     Dùng do-block-storage-retain nếu muốn giữ volume khi xoá PVC.
#   - Storage của DO tính tiền theo GiB/tháng -> default nhỏ hơn onprem (postgres 1Gi)
#     để cụm test rẻ nhất có thể. Dev vẫn override được qua params.storage.
#   - route: DOKS không có ingress dựng sẵn -> cần cài ingress-nginx một lần
#     (Helm/manifest). Ingress class mặc định "nginx"; controller tự xin 1 DO LB.
#
# KHÁC BIỆT SO VỚI cloud (EKS/RDS): DO target KHÔNG dùng managed DB — datastore chạy
# ngay trong cụm (như onprem) để chi phí tối thiểu. Muốn dùng DO Managed Database thì
# tách sang một target riêng + ghi Secret <workload>-db-credentials (khuôn như cloud).
#
# QUY ƯỚC CHUNG (giống onprem — hợp đồng ổn định):
#   - Biến xuất ra: host / port / name / username / password (password luôn secretKeyRef)
#   - Secret datastore: <workload>-db-credentials (redis: <workload>-redis-credentials)
#   - Workload/PVC datastore mang label app.kubernetes.io/component: datastore
#     -> patch env (do-staging/do-prod.tpl) tự BỎ QUA replicas/resources của chúng.
# =============================================================================

# ---------------------------------------------------------------------------
# postgres: mỗi workload khai `db: {type: postgres}` được một Postgres riêng.
# Password sinh ngẫu nhiên, giữ trong state (.score-k8s/), app đọc qua secretKeyRef.
# Biến xuất ra : host / port(5432) / name / username(postgres) / password(secretKeyRef)
#                url(secretKeyRef) — connection string đầy đủ (xem ghi chú ở onprem)
# ---------------------------------------------------------------------------
- uri: template://do/postgres
  type: postgres
  init: |
    name: {{ .SourceWorkload }}-db
    secretName: {{ .SourceWorkload }}-db-credentials
    database: {{ .Params.database | default "appdb" }}
    image: {{ .Params.image | default "postgres:16-alpine" }}
    storage: {{ .Params.storage | default "1Gi" }}
    storageClass: {{ .Params.storageClass | default "do-block-storage" }}
    urlQuery: {{ .Params.urlQuery | default "" | quote }}
  state: |
    {{ if not .State.password }}password: {{ randAlphaNum 20 | quote }}{{ else }}password: {{ .State.password | quote }}{{ end }}
  outputs: |
    host: {{ .Init.name }}
    port: 5432
    name: {{ .Init.database }}
    username: postgres
    password: {{ encodeSecretRef .Init.secretName "password" }}
    url: {{ encodeSecretRef .Init.secretName "url" }}
  manifests: |
    {{ $backup := .Params.backup | default dict }}
    # Secret bị deploy-do.sh TÁCH RA, apply create-if-missing — KHÔNG vào git.
    - apiVersion: v1
      kind: Secret
      metadata:
        name: {{ .Init.secretName }}
      type: Opaque
      stringData:
        password: {{ .State.password | quote }}
        url: {{ printf "postgresql://postgres:%s@%s:5432/%s%s" .State.password .Init.name .Init.database .Init.urlQuery | quote }}
    - apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: {{ .Init.name }}
        labels:
          app.kubernetes.io/component: datastore
      spec:
        serviceName: {{ .Init.name }}
        replicas: 1
        selector:
          matchLabels: { app: {{ .Init.name }} }
        template:
          metadata:
            labels: { app: {{ .Init.name }} }
          spec:
            containers:
              - name: postgres
                image: {{ .Init.image }}
                env:
                  - name: POSTGRES_DB
                    value: {{ .Init.database | quote }}
                  - name: POSTGRES_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: {{ .Init.secretName }}
                        key: password
                  - name: PGDATA
                    value: /var/lib/postgresql/data/pgdata
                ports:
                  - containerPort: 5432
                volumeMounts:
                  - name: data
                    mountPath: /var/lib/postgresql/data
                livenessProbe:
                  exec:
                    command: [pg_isready, -U, postgres, -d, {{ .Init.database | quote }}]
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
                readinessProbe:
                  exec:
                    command: [pg_isready, -U, postgres, -d, {{ .Init.database | quote }}]
                  initialDelaySeconds: 5
                  periodSeconds: 5
                  timeoutSeconds: 3
                  failureThreshold: 3
                resources:
                  requests: { cpu: 100m, memory: 256Mi }
                  limits: { memory: 512Mi }
        volumeClaimTemplates:
          - metadata:
              name: data
            spec:
              accessModes: [ReadWriteOnce]
              storageClassName: {{ .Init.storageClass }}
              resources:
                requests:
                  storage: {{ .Init.storage }}
    - apiVersion: v1
      kind: Service
      metadata:
        name: {{ .Init.name }}
        labels: { app: {{ .Init.name }} }
      spec:
        clusterIP: None    # headless — Service của StatefulSet DB
        selector: { app: {{ .Init.name }} }
        ports:
          - port: 5432
            targetPort: 5432
    {{ if $backup.enabled }}
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: {{ .Init.name }}-backup
        labels:
          app.kubernetes.io/component: datastore
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: {{ .Init.storageClass }}
        resources:
          requests:
            storage: {{ $backup.storage | default "1Gi" }}
    - apiVersion: batch/v1
      kind: CronJob
      metadata:
        name: {{ .Init.name }}-auto-backup
        labels:
          app.kubernetes.io/component: datastore
      spec:
        schedule: {{ $backup.schedule | default "0 18 * * *" | quote }}
        concurrencyPolicy: Forbid
        successfulJobsHistoryLimit: 3
        failedJobsHistoryLimit: 1
        jobTemplate:
          spec:
            template:
              spec:
                restartPolicy: OnFailure
                volumes:
                  - name: backup-storage
                    persistentVolumeClaim:
                      claimName: {{ .Init.name }}-backup
                containers:
                  - name: backup
                    image: {{ .Init.image }}
                    env:
                      - name: PGPASSWORD
                        valueFrom:
                          secretKeyRef:
                            name: {{ .Init.secretName }}
                            key: password
                    command: ["/bin/sh", "-c"]
                    args:
                      - |
                        set -e
                        TS=$(date +%Y%m%d-%H%M%S)
                        echo "Postgres backup bat dau: $TS"
                        pg_dumpall -h {{ .Init.name }} -p 5432 -U postgres > /backup/backup-$TS.sql
                        echo "Xong: /backup/backup-$TS.sql"
                        ls -lh /backup | tail -5
                    volumeMounts:
                      - name: backup-storage
                        mountPath: /backup
    - apiVersion: batch/v1
      kind: CronJob
      metadata:
        name: {{ .Init.name }}-cleanup-backup
        labels:
          app.kubernetes.io/component: datastore
      spec:
        schedule: {{ $backup.cleanupSchedule | default "0 19 * * *" | quote }}
        concurrencyPolicy: Forbid
        successfulJobsHistoryLimit: 3
        failedJobsHistoryLimit: 1
        jobTemplate:
          spec:
            template:
              spec:
                restartPolicy: OnFailure
                volumes:
                  - name: backup-storage
                    persistentVolumeClaim:
                      claimName: {{ .Init.name }}-backup
                containers:
                  - name: cleanup
                    image: {{ .Init.image }}
                    command: ["/bin/sh", "-c"]
                    args:
                      - |
                        echo "Don backup cu hon {{ $backup.retentionDays | default 7 }} ngay"
                        find /backup -name 'backup-*.sql' -type f -mtime +{{ $backup.retentionDays | default 7 }} -print -delete
                        echo "Con lai:"; ls -lh /backup | tail -10
                    volumeMounts:
                      - name: backup-storage
                        mountPath: /backup
    {{ end }}

# ---------------------------------------------------------------------------
# mysql: bao trùm cả MariaDB (đổi image qua params). Khuôn giống postgres.
# Biến xuất ra : host / port(3306) / name / username(root) / password(secretKeyRef)
# ---------------------------------------------------------------------------
- uri: template://do/mysql
  type: mysql
  init: |
    name: {{ .SourceWorkload }}-mysql
    secretName: {{ .SourceWorkload }}-db-credentials
    database: {{ .Params.database | default "appdb" }}
    image: {{ .Params.image | default "mysql:8.0" }}
    storage: {{ .Params.storage | default "5Gi" }}
    storageClass: {{ .Params.storageClass | default "do-block-storage" }}
  state: |
    {{ if not .State.password }}password: {{ randAlphaNum 20 | quote }}{{ else }}password: {{ .State.password | quote }}{{ end }}
  outputs: |
    host: {{ .Init.name }}
    port: 3306
    name: {{ .Init.database }}
    username: root
    password: {{ encodeSecretRef .Init.secretName "password" }}
  manifests: |
    {{ $backup := .Params.backup | default dict }}
    - apiVersion: v1
      kind: Secret
      metadata:
        name: {{ .Init.secretName }}
      type: Opaque
      stringData:
        password: {{ .State.password | quote }}
    - apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: {{ .Init.name }}
        labels:
          app.kubernetes.io/component: datastore
      spec:
        serviceName: {{ .Init.name }}
        replicas: 1
        selector:
          matchLabels: { app: {{ .Init.name }} }
        template:
          metadata:
            labels: { app: {{ .Init.name }} }
          spec:
            containers:
              - name: mysql
                image: {{ .Init.image }}
                env:
                  - name: MYSQL_DATABASE
                    value: {{ .Init.database | quote }}
                  - name: MYSQL_ROOT_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: {{ .Init.secretName }}
                        key: password
                ports:
                  - containerPort: 3306
                volumeMounts:
                  - name: data
                    mountPath: /var/lib/mysql
                  {{ if .Params.config }}
                  - name: config
                    mountPath: /etc/mysql/conf.d/custom.cnf
                    subPath: custom.cnf
                  {{ end }}
                livenessProbe:
                  exec:
                    command: [sh, -c, 'mysqladmin -uroot -p"$MYSQL_ROOT_PASSWORD" ping > /dev/null 2>&1']
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
                readinessProbe:
                  exec:
                    command: [sh, -c, 'mysql -h 127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD" -e "SELECT 1" > /dev/null 2>&1']
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
                resources:
                  requests: { cpu: 250m, memory: 1Gi }
                  limits: { memory: 1536Mi }
            {{ if .Params.config }}
            volumes:
              - name: config
                configMap:
                  name: {{ .Init.name }}-config
            {{ end }}
        volumeClaimTemplates:
          - metadata:
              name: data
            spec:
              accessModes: [ReadWriteOnce]
              storageClassName: {{ .Init.storageClass }}
              resources:
                requests:
                  storage: {{ .Init.storage }}
    - apiVersion: v1
      kind: Service
      metadata:
        name: {{ .Init.name }}
        labels: { app: {{ .Init.name }} }
      spec:
        clusterIP: None
        selector: { app: {{ .Init.name }} }
        ports:
          - port: 3306
            targetPort: 3306
    {{ if .Params.config }}
    - apiVersion: v1
      kind: ConfigMap
      metadata:
        name: {{ .Init.name }}-config
        labels:
          app.kubernetes.io/component: datastore
      data:
        custom.cnf: |
    {{ .Params.config | indent 10 }}
    {{ end }}

# ---------------------------------------------------------------------------
# mongodb: khuôn giống mysql. Auth root/<password sinh sẵn>, authSource=admin.
# Biến xuất ra : host / port(27017) / name / username(root) / password(secretKeyRef) / authSource(admin)
# ---------------------------------------------------------------------------
- uri: template://do/mongodb
  type: mongodb
  init: |
    name: {{ .SourceWorkload }}-mongo
    secretName: {{ .SourceWorkload }}-db-credentials
    database: {{ .Params.database | default "appdb" }}
    image: {{ .Params.image | default "mongo:6.0" }}
    storage: {{ .Params.storage | default "5Gi" }}
    storageClass: {{ .Params.storageClass | default "do-block-storage" }}
  state: |
    {{ if not .State.password }}password: {{ randAlphaNum 20 | quote }}{{ else }}password: {{ .State.password | quote }}{{ end }}
  outputs: |
    host: {{ .Init.name }}
    port: 27017
    name: {{ .Init.database }}
    username: root
    password: {{ encodeSecretRef .Init.secretName "password" }}
    authSource: admin
  manifests: |
    - apiVersion: v1
      kind: Secret
      metadata:
        name: {{ .Init.secretName }}
      type: Opaque
      stringData:
        password: {{ .State.password | quote }}
    - apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: {{ .Init.name }}
        labels:
          app.kubernetes.io/component: datastore
      spec:
        serviceName: {{ .Init.name }}
        replicas: 1
        selector:
          matchLabels: { app: {{ .Init.name }} }
        template:
          metadata:
            labels: { app: {{ .Init.name }} }
          spec:
            containers:
              - name: mongodb
                image: {{ .Init.image }}
                {{ if .Params.config }}
                args: ["--config", "/etc/mongod.conf"]
                {{ end }}
                env:
                  - name: MONGO_INITDB_ROOT_USERNAME
                    value: root
                  - name: MONGO_INITDB_ROOT_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: {{ .Init.secretName }}
                        key: password
                ports:
                  - containerPort: 27017
                volumeMounts:
                  - name: data
                    mountPath: /data/db
                  {{ if .Params.config }}
                  - name: config
                    mountPath: /etc/mongod.conf
                    subPath: mongod.conf
                  {{ end }}
                livenessProbe:
                  exec:
                    command: [sh, -c, 'mongosh --quiet --eval "db.adminCommand({ping: 1})" > /dev/null 2>&1']
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
                readinessProbe:
                  exec:
                    command: [sh, -c, 'mongosh --quiet --eval "db.adminCommand({ping: 1})" > /dev/null 2>&1']
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
                resources:
                  requests: { cpu: 100m, memory: 1Gi }
                  limits: { memory: 1536Mi }
            {{ if .Params.config }}
            volumes:
              - name: config
                configMap:
                  name: {{ .Init.name }}-config
            {{ end }}
        volumeClaimTemplates:
          - metadata:
              name: data
            spec:
              accessModes: [ReadWriteOnce]
              storageClassName: {{ .Init.storageClass }}
              resources:
                requests:
                  storage: {{ .Init.storage }}
    - apiVersion: v1
      kind: Service
      metadata:
        name: {{ .Init.name }}
        labels: { app: {{ .Init.name }} }
      spec:
        clusterIP: None
        selector: { app: {{ .Init.name }} }
        ports:
          - port: 27017
            targetPort: 27017
    {{ if .Params.config }}
    - apiVersion: v1
      kind: ConfigMap
      metadata:
        name: {{ .Init.name }}-config
        labels:
          app.kubernetes.io/component: datastore
      data:
        mongod.conf: |
    {{ .Params.config | indent 10 }}
    {{ end }}

# ---------------------------------------------------------------------------
# redis: cache — mặc định Deployment + emptyDir, KHÔNG PVC.
# Biến xuất ra : host / port(6379) / password ("" khi auth=false, secretKeyRef khi auth=true)
# Secret       : <workload>-redis-credentials (chỉ khi auth=true)
# ---------------------------------------------------------------------------
- uri: template://do/redis
  type: redis
  init: |
    name: {{ .SourceWorkload }}-redis
    secretName: {{ .SourceWorkload }}-redis-credentials
    image: {{ .Params.image | default "redis:6.2-alpine" }}
  state: |
    {{ if .Params.auth }}{{ if not .State.password }}password: {{ randAlphaNum 20 | quote }}{{ else }}password: {{ .State.password | quote }}{{ end }}{{ end }}
  outputs: |
    host: {{ .Init.name }}
    port: 6379
    {{ if .Params.auth }}password: {{ encodeSecretRef .Init.secretName "password" }}{{ else }}password: ""{{ end }}
  manifests: |
    {{ if .Params.auth }}
    - apiVersion: v1
      kind: Secret
      metadata:
        name: {{ .Init.secretName }}
      type: Opaque
      stringData:
        password: {{ .State.password | quote }}
    {{ end }}
    - apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: {{ .Init.name }}
        labels:
          app.kubernetes.io/component: datastore
      spec:
        replicas: 1
        selector:
          matchLabels: { app: {{ .Init.name }} }
        template:
          metadata:
            labels: { app: {{ .Init.name }} }
          spec:
            containers:
              - name: redis
                image: {{ .Init.image }}
                {{ if .Params.auth }}
                env:
                  - name: REDIS_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: {{ .Init.secretName }}
                        key: password
                args: ["--requirepass", "$(REDIS_PASSWORD)"]
                {{ end }}
                ports:
                  - containerPort: 6379
                volumeMounts:
                  - name: data
                    mountPath: /data
                livenessProbe:
                  exec:
                    command: [sh, -c, {{ if .Params.auth }}'redis-cli -a "$REDIS_PASSWORD" ping > /dev/null 2>&1'{{ else }}'redis-cli ping > /dev/null 2>&1'{{ end }}]
                  initialDelaySeconds: 15
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
                readinessProbe:
                  exec:
                    command: [sh, -c, {{ if .Params.auth }}'redis-cli -a "$REDIS_PASSWORD" ping > /dev/null 2>&1'{{ else }}'redis-cli ping > /dev/null 2>&1'{{ end }}]
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
                resources:
                  requests: { cpu: 50m, memory: 256Mi }
                  limits: { memory: 1Gi }
            volumes:
              - name: data
                emptyDir: {}
    - apiVersion: v1
      kind: Service
      metadata:
        name: {{ .Init.name }}
      spec:
        selector: { app: {{ .Init.name }} }
        ports:
          - port: 6379
            targetPort: 6379

# ---------------------------------------------------------------------------
# app-config: Secret gom nhiều key cấu hình app (giống hệt onprem/cloud).
# Dev khai params.keys = [NODE_ENV, JWT_SECRET, ...]; ops điền giá trị thật bằng
#   kubectl -n <ns> patch secret <workload>-app-config -p '{"stringData":{"<KEY>":"..."}}'
# ---------------------------------------------------------------------------
- uri: template://do/app-config
  type: app-config
  init: |
    {{ if not .Params.keys }}{{ fail "app-config: thiếu params.keys (danh sách tên biến app cần)" }}{{ end }}
    secretName: {{ .SourceWorkload }}-app-config
  outputs: |
    secretName: {{ .Init.secretName }}
    {{- range .Params.keys }}
    {{ . }}: {{ encodeSecretRef $.Init.secretName . }}
    {{- end }}
  manifests: |
    - apiVersion: v1
      kind: Secret
      metadata:
        name: {{ .Init.secretName }}
        labels:
          app.kubernetes.io/component: app-config
      type: Opaque
      stringData:
        {{- range .Params.keys }}
        {{ . }}: "CHANGE_ME"
        {{- end }}

# ---------------------------------------------------------------------------
# route: lộ service ra ngoài qua Ingress nginx (ingress-nginx trên DOKS).
# Controller ingress-nginx tự xin 1 DigitalOcean Load Balancer (Service type
# LoadBalancer). Cài một lần cho cụm; mọi route dùng chung 1 LB đó (tiết kiệm).
#
# Dev khai:
#   api:
#     type: route
#     params:
#       host: notes.example.com   # BẮT BUỘC (deploy-do.sh override bằng nip.io theo env)
#       port: 8080                # BẮT BUỘC — port Service workload
#       path: /                   # tùy chọn (mặc định /)
#       pathType: Prefix          # tùy chọn
#       ingressClass: nginx       # tùy chọn
#       bodySize: 100M            # tùy chọn -> proxy-body-size
#       tlsSecret: notes-tls      # tùy chọn -> khối tls
# ---------------------------------------------------------------------------
- uri: template://do/route
  type: route
  init: |
    host: {{ .Params.host }}
    path: {{ .Params.path | default "/" }}
    port: {{ .Params.port }}
    class: {{ .Params.ingressClass | default "nginx" }}
    pathType: {{ .Params.pathType | default "Prefix" }}
  outputs: |
    host: {{ .Init.host }}
    path: {{ .Init.path }}
  manifests: |
    - apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: {{ .SourceWorkload }}-route-{{ .Init.host | lower | replace "." "-" }}{{ if ne .Init.path "/" }}-{{ .Init.path | trimPrefix "/" | replace "/" "-" | lower }}{{ end }}
        {{ if .Params.bodySize }}
        annotations:
          nginx.ingress.kubernetes.io/proxy-body-size: {{ .Params.bodySize | quote }}
        {{ end }}
      spec:
        ingressClassName: {{ .Init.class }}
        {{ if .Params.tlsSecret }}
        tls:
          - hosts: [{{ .Init.host | quote }}]
            secretName: {{ .Params.tlsSecret }}
        {{ end }}
        rules:
          - host: {{ .Init.host }}
            http:
              paths:
                - path: {{ .Init.path }}
                  pathType: {{ .Init.pathType }}
                  backend:
                    service:
                      name: {{ (index .WorkloadServices .SourceWorkload).ServiceName }}
                      port:
                        number: {{ .Init.port }}

# ---------------------------------------------------------------------------
# service: gọi service khác trong cùng app (cùng namespace). Không sinh manifest.
# Dev dùng: http://${resources.<tên>.host}:${resources.<tên>.port}
# ---------------------------------------------------------------------------
- uri: template://do/service
  type: service
  outputs: |
    host: {{ .Params.workload }}
    port: {{ .Params.port }}

# =============================================================================
# CATALOG PROVISIONER — ONPREM
# Team hạ tầng sở hữu. Dev chỉ khai `type` trong score.yaml, KHÔNG đọc file này.
#
# type: postgres   -> StatefulSet Postgres + Secret (password tự sinh, app đọc qua secretKeyRef)
# type: mysql      -> StatefulSet MySQL replication đúng file công ty (init server-id +
#                     clone/sidecar xtrabackup + master/slave.cnf); MariaDB: đổi params.image
# type: mongodb    -> StatefulSet MongoDB + Secret (cùng khuôn)
# type: redis      -> Deployment Redis (mặc định KHÔNG PVC — xem ghi chú block)
# type: app-config -> Secret gom nhiều key cấu hình; dev khai TÊN key, ops điền GIÁ TRỊ trên cụm
# type: route      -> Ingress nginx chuẩn (networking.k8s.io/v1 — khuôn công ty; đa host/path)
# type: service    -> chỉ xuất DNS nội bộ (không sinh manifest)
#
# QUY ƯỚC CHUNG cho mọi datastore (hợp đồng ổn định — xem docs/them-provisioner-moi.md):
#   - Biến xuất ra:  host / port / name / username / password (password luôn là secretKeyRef)
#   - Secret:        <workload>-db-credentials  (create-if-missing, KHÔNG commit vào git)
#   - Mỗi workload chỉ khai MỘT datastore chính (postgres|mysql|mongodb) — tên Secret
#     dùng chung convention nên khai 2 loại cùng lúc sẽ đụng tên. Redis là cache, dùng
#     secret riêng (<workload>-redis-credentials) nên đi kèm datastore chính thoải mái.
#   - Workload/PVC do provisioner sinh ra có label `app.kubernetes.io/component: datastore`
#     -> patch env (staging/prod.tpl) tự BỎ QUA replicas/resources của chúng.
#
# Thêm loại hạ tầng mới (s3, queue, ...) = thêm MỘT block ở đây + MỘT block bên
# cloud.provisioners.yaml. Checklist: platform-repo/docs/them-provisioner-moi.md
# =============================================================================

# ---------------------------------------------------------------------------
# postgres: mỗi workload khai `db: {type: postgres}` được một Postgres riêng.
# - Password sinh ngẫu nhiên, giữ trong state (.score-k8s/) để ổn định giữa các lần generate.
#   State KHÔNG commit vào git; trên cluster, CI chỉ tạo Secret nếu CHƯA tồn tại
#   nên password thực tế trên cụm không bao giờ bị xoay ngoài ý muốn.
# - App nhận password qua secretKeyRef (encodeSecretRef) — không bao giờ plaintext trong env.
# - Convention tên Secret: <workload>-db-credentials — là hợp đồng ổn định,
#   sau này đổi sang Sealed Secrets / ESO thì app không đổi gì.
#
# Dev khai (tất cả params TÙY CHỌN — mặc định giữ đúng hành vi catalog/v1):
#   db:
#     type: postgres
#     params:
#       database: feedback360          # tên DB tạo sẵn (mặc định: appdb)
#       image: postgres:16-alpine
#       storage: 5Gi
#       backup: { enabled: true, schedule: "0 18 * * *", cleanupSchedule: "0 19 * * *", retentionDays: 7, storage: 10Gi }
#
# Biến xuất ra : host / port(5432) / name / username(postgres) / password(secretKeyRef)
# ---------------------------------------------------------------------------
- uri: template://onprem/postgres
  type: postgres
  init: |
    name: {{ .SourceWorkload }}-db
    secretName: {{ .SourceWorkload }}-db-credentials
    database: {{ .Params.database | default "appdb" }}
    image: {{ .Params.image | default "postgres:16-alpine" }}
    storage: {{ .Params.storage | default "5Gi" }}
  state: |
    {{ if not .State.password }}password: {{ randAlphaNum 20 | quote }}{{ else }}password: {{ .State.password | quote }}{{ end }}
  outputs: |
    host: {{ .Init.name }}
    port: 5432
    name: {{ .Init.database }}
    username: postgres
    password: {{ encodeSecretRef .Init.secretName "password" }}
  manifests: |
    {{ $backup := .Params.backup | default dict }}
    # Secret này sẽ bị CI TÁCH RA khỏi manifest trước khi commit sang config repo
    # (xem bước "split secrets" trong ci.yaml). Nó không bao giờ nằm trong git.
    - apiVersion: v1
      kind: Secret
      metadata:
        name: {{ .Init.secretName }}
      type: Opaque
      stringData:
        password: {{ .State.password | quote }}
    - apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: {{ .Init.name }}
        labels:
          app.kubernetes.io/component: datastore
      spec:
        serviceName: {{ .Init.name }}
        replicas: 1
        selector:
          matchLabels: { app: {{ .Init.name }} }
        template:
          metadata:
            labels: { app: {{ .Init.name }} }
          spec:
            containers:
              - name: postgres
                # Nếu cụm không ra được Docker Hub: dùng Harbor proxy-cache,
                # vd harbor.example.com/dockerhub/library/postgres:16-alpine
                image: {{ .Init.image }}
                env:
                  - name: POSTGRES_DB
                    value: {{ .Init.database | quote }}
                  - name: POSTGRES_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: {{ .Init.secretName }}
                        key: password
                  - name: PGDATA
                    value: /var/lib/postgresql/data/pgdata
                ports:
                  - containerPort: 5432
                volumeMounts:
                  - name: data
                    mountPath: /var/lib/postgresql/data
                # Probe đúng khuôn StatefulSet.postgresql của công ty (feedback360 trên Rancher)
                livenessProbe:
                  exec:
                    command: [pg_isready, -U, postgres, -d, {{ .Init.database | quote }}]
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
                readinessProbe:
                  exec:
                    command: [pg_isready, -U, postgres, -d, {{ .Init.database | quote }}]
                  initialDelaySeconds: 5
                  periodSeconds: 5
                  timeoutSeconds: 3
                  failureThreshold: 3
                resources:
                  requests: { cpu: 100m, memory: 256Mi }
                  limits: { memory: 512Mi }
        volumeClaimTemplates:
          - metadata:
              name: data
            spec:
              accessModes: [ReadWriteOnce]
              # Cụm dùng Rook Ceph (RBD block). Kiểm tra tên chính xác: kubectl get storageclass
              storageClassName: rook-ceph-block
              resources:
                requests:
                  storage: {{ .Init.storage }}
    - apiVersion: v1
      kind: Service
      metadata:
        name: {{ .Init.name }}
        labels: { app: {{ .Init.name }} }
      spec:
        clusterIP: None    # headless — khuôn công ty cho Service của StatefulSet DB
        selector: { app: {{ .Init.name }} }
        ports:
          - port: 5432
            targetPort: 5432
    {{ if $backup.enabled }}
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: {{ .Init.name }}-backup
        labels:
          app.kubernetes.io/component: datastore
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: rook-ceph-block
        resources:
          requests:
            storage: {{ $backup.storage | default "10Gi" }}
    - apiVersion: batch/v1
      kind: CronJob
      metadata:
        name: {{ .Init.name }}-auto-backup
        labels:
          app.kubernetes.io/component: datastore
      spec:
        schedule: {{ $backup.schedule | default "0 18 * * *" | quote }}
        concurrencyPolicy: Forbid
        successfulJobsHistoryLimit: 3
        failedJobsHistoryLimit: 1
        jobTemplate:
          spec:
            template:
              spec:
                restartPolicy: OnFailure
                volumes:
                  - name: backup-storage
                    persistentVolumeClaim:
                      claimName: {{ .Init.name }}-backup
                containers:
                  - name: backup
                    image: {{ .Init.image }}   # dùng lại image DB -> có sẵn pg_dumpall
                    env:
                      - name: PGPASSWORD       # pg_dumpall tự đọc biến này
                        valueFrom:
                          secretKeyRef:
                            name: {{ .Init.secretName }}
                            key: password
                    command: ["/bin/sh", "-c"]
                    args:
                      - |
                        set -e
                        TS=$(date +%Y%m%d-%H%M%S)
                        echo "Postgres backup bat dau: $TS"
                        pg_dumpall -h {{ .Init.name }} -p 5432 -U postgres \
                          > /backup/backup-$TS.sql
                        echo "Xong: /backup/backup-$TS.sql"
                        ls -lh /backup | tail -5
                    volumeMounts:
                      - name: backup-storage
                        mountPath: /backup
    - apiVersion: batch/v1
      kind: CronJob
      metadata:
        name: {{ .Init.name }}-cleanup-backup
        labels:
          app.kubernetes.io/component: datastore
      spec:
        schedule: {{ $backup.cleanupSchedule | default "0 19 * * *" | quote }}
        concurrencyPolicy: Forbid
        successfulJobsHistoryLimit: 3
        failedJobsHistoryLimit: 1
        jobTemplate:
          spec:
            template:
              spec:
                restartPolicy: OnFailure
                volumes:
                  - name: backup-storage
                    persistentVolumeClaim:
                      claimName: {{ .Init.name }}-backup
                containers:
                  - name: cleanup
                    image: {{ .Init.image }}
                    command: ["/bin/sh", "-c"]
                    args:
                      - |
                        echo "Don backup cu hon {{ $backup.retentionDays | default 7 }} ngay"
                        find /backup -name 'backup-*.sql' -type f -mtime +{{ $backup.retentionDays | default 7 }} -print -delete
                        echo "Con lai:"; ls -lh /backup | tail -10
                    volumeMounts:
                      - name: backup-storage
                        mountPath: /backup
    {{ end }}

# ---------------------------------------------------------------------------
# mysql: port TRUNG THỰC StatefulSet mysql công ty đang apply (bản Rancher):
#   - initContainer init-mysql: sinh server-id theo ordinal, chọn master.cnf/slave.cnf
#   - initContainer clone-mysql: clone dữ liệu từ peer trước (xtrabackup/ncat 3307)
#   - sidecar xtrabackup: stream backup cho peer kế tiếp (ncat listen 3307)
#   - ConfigMap master.cnf/slave.cnf, mount /etc/mysql/conf.d qua emptyDir
#   - livenessProbe bash mysqladmin ping (delay 120 / period 20 / timeout 5 / fail 5)
#     — file công ty KHÔNG có readinessProbe, giữ nguyên
#   - Service headless <name> (DNS pod ổn định) + <name>-read (đọc, cân bằng mọi pod)
#   - PVC retention Retain, updateStrategy RollingUpdate maxUnavailable 1
# Bao trùm MariaDB về giao diện (đổi params.image); với mariadb nên để replicas=1
# (xtrabackup 1.0 không đảm bảo với mariadb; replicas=1 thì sidecar chỉ nằm chờ).
#
# Dev khai:
#   db:
#     type: mysql
#     params:                                # tất cả TÙY CHỌN
#       database: otm                        # DB tạo sẵn (mặc định: appdb)
#       image: mysql:5.6                     # image mysql/mariadb (air-gap: Harbor proxy-cache)
#       xtrabackupImage: gcr.io/google-samples/xtrabackup:1.0   # air-gap: mirror qua Harbor
#       replicas: 1                          # >1 = thêm replica read-only (tự clone từ peer)
#       storage: 5Gi                         # dung lượng PVC mỗi pod (volumeClaimTemplates)
#       resources:                           # container mysql — mặc định 500m / 1Gi, KHÔNG limits
#         cpu: 500m                          # (đúng file công ty). Khai gì thì đè cái đó.
#         memory: 1Gi
#         cpuLimit: "2"                      # limits chỉ sinh ra khi khai
#         memoryLimit: 4Gi
#       sidecarResources:                    # container xtrabackup — mặc định 100m / 100Mi
#         cpu: 100m
#         memory: 100Mi
#       config: |                            # cnf chung — GHÉP vào cả master.cnf lẫn slave.cnf
#         [mysqld]
#         character-set-server=utf8
#       masterConfig: |                      # thay hẳn master.cnf (mặc định: [mysqld] log-bin)
#       slaveConfig: |                       # thay hẳn slave.cnf  (mặc định: [mysqld] super-read-only)
#       backup:                              # CronJob mysqldump TÙY CHỌN (xem §backup dưới)
#         enabled: true
#         schedule: "0 18 * * *"
#         cleanupSchedule: "0 19 * * *"
#         retentionDays: 7
#         storage: 10Gi
#
# Biến xuất ra : host (<name>-0.<name> — master, để GHI) / readHost (<name>-read — ĐỌC)
#                / port(3306) / name / username(root) / password(secretKeyRef)
# Secret       : <workload>-db-credentials (key: password) — create-if-missing
#                (file công ty tên `mysql-root-pass`; platform giữ convention chung)
# Pull secret  : patch env tự tiêm pod-level (file công ty: harbor-registry-secret
#                -> chỉnh biến $pullSecret trong patches/<env>.tpl cho khớp)
#
# §backup: CronJob <name>-auto-backup + <name>-cleanup-backup + PVC <name>-backup —
# dump logic định kỳ, độc lập với cơ chế clone xtrabackup của replication.
# ---------------------------------------------------------------------------
- uri: template://onprem/mysql
  type: mysql
  init: |
    name: {{ .SourceWorkload }}-mysql
    secretName: {{ .SourceWorkload }}-db-credentials
    database: {{ .Params.database | default "appdb" }}
    image: {{ .Params.image | default "mysql:8.0" }}
    xtrabackupImage: {{ .Params.xtrabackupImage | default "gcr.io/google-samples/xtrabackup:1.0" }}
    storage: {{ .Params.storage | default "5Gi" }}
    replicas: {{ .Params.replicas | default 1 }}
    # Gói nguyên cụm resources vào Init (toRawJson = YAML hợp lệ) để manifests đọc
    # .Init.resources.cpu ... mà không nổ khi dev không khai params.resources.
    resources: {{ .Params.resources | default dict | toRawJson }}
    sidecarResources: {{ .Params.sidecarResources | default dict | toRawJson }}
  state: |
    {{ if not .State.password }}password: {{ randAlphaNum 20 | quote }}{{ else }}password: {{ .State.password | quote }}{{ end }}
  outputs: |
    host: {{ .Init.name }}-0.{{ .Init.name }}
    readHost: {{ .Init.name }}-read
    port: 3306
    name: {{ .Init.database }}
    username: root
    password: {{ encodeSecretRef .Init.secretName "password" }}
  manifests: |
    {{ $backup := .Params.backup | default dict }}
    {{ $res := .Init.resources | default dict }}
    {{ $sres := .Init.sidecarResources | default dict }}
    # Secret bị CI tách ra, apply create-if-missing — không vào git.
    - apiVersion: v1
      kind: Secret
      metadata:
        name: {{ .Init.secretName }}
      type: Opaque
      stringData:
        password: {{ .State.password | quote }}
    # master.cnf / slave.cnf — đúng khuôn ConfigMap `mysql` của công ty
    - apiVersion: v1
      kind: ConfigMap
      metadata:
        name: {{ .Init.name }}-config
        labels:
          app.kubernetes.io/component: datastore
      data:
        master.cnf: |
    {{ .Params.masterConfig | default "[mysqld]\nlog-bin" | indent 10 }}
    {{ if .Params.config }}{{ .Params.config | indent 10 }}{{ end }}
        slave.cnf: |
    {{ .Params.slaveConfig | default "[mysqld]\nsuper-read-only" | indent 10 }}
    {{ if .Params.config }}{{ .Params.config | indent 10 }}{{ end }}
    - apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: {{ .Init.name }}
        labels:
          app: {{ .Init.name }}
          app.kubernetes.io/component: datastore
      spec:
        serviceName: {{ .Init.name }}
        replicas: {{ .Init.replicas }}
        podManagementPolicy: OrderedReady
        persistentVolumeClaimRetentionPolicy:
          whenDeleted: Retain
          whenScaled: Retain
        updateStrategy:
          type: RollingUpdate
          rollingUpdate:
            maxUnavailable: 1
            partition: 0
        selector:
          matchLabels: { app: {{ .Init.name }} }
        template:
          metadata:
            labels: { app: {{ .Init.name }} }
          spec:
            initContainers:
              # Sinh server-id theo ordinal + chọn master/slave cnf (nguyên văn file công ty)
              - name: init-mysql
                image: {{ .Init.image }}
                imagePullPolicy: IfNotPresent
                command:
                  - bash
                  - "-c"
                  - |
                    set -ex
                    [[ `hostname` =~ -([0-9]+)$ ]] || exit 1
                    ordinal=${BASH_REMATCH[1]}
                    echo [mysqld] > /mnt/conf.d/server-id.cnf
                    echo server-id=$((100 + $ordinal)) >> /mnt/conf.d/server-id.cnf
                    if [[ $ordinal -eq 0 ]]; then
                      cp /mnt/config-map/master.cnf /mnt/conf.d/
                    else
                      cp /mnt/config-map/slave.cnf /mnt/conf.d/
                    fi
                env:
                  - name: MYSQL_ROOT_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: {{ .Init.secretName }}
                        key: password
                volumeMounts:
                  - name: conf
                    mountPath: /mnt/conf.d
                  - name: config-map
                    mountPath: /mnt/config-map
              # Clone dữ liệu từ peer trước khi vào cụm (chỉ chạy với ordinal > 0)
              - name: clone-mysql
                image: {{ .Init.xtrabackupImage }}
                imagePullPolicy: IfNotPresent
                command:
                  - bash
                  - "-c"
                  - |
                    set -ex
                    [[ -d /var/lib/mysql/mysql ]] && exit 0
                    [[ `hostname` =~ -([0-9]+)$ ]] || exit 1
                    ordinal=${BASH_REMATCH[1]}
                    [[ $ordinal -eq 0 ]] && exit 0
                    ncat --recv-only {{ .Init.name }}-$(($ordinal-1)).{{ .Init.name }} 3307 | xbstream -x -C /var/lib/mysql
                    xtrabackup --prepare --target-dir=/var/lib/mysql
                volumeMounts:
                  - name: data
                    mountPath: /var/lib/mysql
                    subPath: mysql
                  - name: conf
                    mountPath: /etc/mysql/conf.d
            containers:
              - name: mysql
                image: {{ .Init.image }}
                imagePullPolicy: IfNotPresent
                env:
                  - name: MYSQL_DATABASE
                    value: {{ .Init.database | quote }}
                  - name: MYSQL_ROOT_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: {{ .Init.secretName }}
                        key: password
                ports:
                  - name: mysql
                    containerPort: 3306
                    protocol: TCP
                # Probe nguyên văn file công ty (không có readinessProbe trong file gốc)
                livenessProbe:
                  exec:
                    command:
                      - bash
                      - "-c"
                      - |
                        mysqladmin -uroot -p"$MYSQL_ROOT_PASSWORD" ping
                  initialDelaySeconds: 120
                  periodSeconds: 20
                  timeoutSeconds: 5
                  successThreshold: 1
                  failureThreshold: 5
                # Mặc định đúng file công ty (chỉ requests 500m/1Gi, không limits);
                # dev chỉnh qua params.resources. Patch env không ghi đè vì container
                # đã có resources sẵn.
                resources:
                  requests:
                    cpu: {{ $res.cpu | default "500m" }}
                    memory: {{ $res.memory | default "1Gi" }}
                  {{- if or $res.cpuLimit $res.memoryLimit }}
                  limits:
                    {{- if $res.cpuLimit }}
                    cpu: {{ $res.cpuLimit }}
                    {{- end }}
                    {{- if $res.memoryLimit }}
                    memory: {{ $res.memoryLimit }}
                    {{- end }}
                  {{- end }}
                volumeMounts:
                  - name: data
                    mountPath: /var/lib/mysql
                    subPath: mysql
                  - name: conf
                    mountPath: /etc/mysql/conf.d
              # Sidecar stream backup cho peer kế (nguyên văn file công ty).
              # replicas=1: chỉ listen, không tốn tài nguyên đáng kể.
              - name: xtrabackup
                image: {{ .Init.xtrabackupImage }}
                imagePullPolicy: IfNotPresent
                ports:
                  - name: xtrabackup
                    containerPort: 3307
                    protocol: TCP
                command:
                  - bash
                  - "-c"
                  - |
                    set -ex
                    cd /var/lib/mysql
                    if [[ -f xtrabackup_slave_info ]]; then
                      mv xtrabackup_slave_info change_master_to.sql.in
                      rm -f xtrabackup_binlog_info
                    elif [[ -f xtrabackup_binlog_info ]]; then
                      [[ `cat xtrabackup_binlog_info` =~ ^(.*?)[[:space:]]+(.*?)$ ]] || exit 1
                      rm xtrabackup_binlog_info
                      echo "CHANGE MASTER TO MASTER_LOG_FILE='${BASH_REMATCH[1]}', MASTER_LOG_POS=${BASH_REMATCH[2]}" > change_master_to.sql.in
                    fi
                    if [[ -f change_master_to.sql.in ]]; then
                      echo "Waiting for mysqld to be ready (accepting connections)"
                      until mysql -h 127.0.0.1 -uroot -p$MYSQL_ROOT_PASSWORD -e "SELECT 1"; do sleep 1; done
                      echo "Initializing replication from clone position"
                      mv change_master_to.sql.in change_master_to.sql.orig
                      mysql -h 127.0.0.1 -uroot -p$MYSQL_ROOT_PASSWORD <<EOF
                    $(<change_master_to.sql.orig),
                      MASTER_HOST='{{ .Init.name }}-0.{{ .Init.name }}',
                      MASTER_USER='root',
                      MASTER_PASSWORD=$MYSQL_ROOT_PASSWORD,
                      MASTER_CONNECT_RETRY=10;
                    START SLAVE;
                    EOF
                    fi
                    exec ncat --listen --keep-open --send-only --max-conns=1 3307 -c \
                      "xtrabackup --backup --slave-info --stream=xbstream --host=127.0.0.1 --user=root"
                env:
                  - name: MYSQL_ROOT_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: {{ .Init.secretName }}
                        key: password
                resources:
                  requests:
                    cpu: {{ $sres.cpu | default "100m" }}
                    memory: {{ $sres.memory | default "100Mi" }}
                  {{- if or $sres.cpuLimit $sres.memoryLimit }}
                  limits:
                    {{- if $sres.cpuLimit }}
                    cpu: {{ $sres.cpuLimit }}
                    {{- end }}
                    {{- if $sres.memoryLimit }}
                    memory: {{ $sres.memoryLimit }}
                    {{- end }}
                  {{- end }}
                volumeMounts:
                  - name: data
                    mountPath: /var/lib/mysql
                    subPath: mysql
                  - name: conf
                    mountPath: /etc/mysql/conf.d
            volumes:
              - name: conf
                emptyDir: {}
              - name: config-map
                configMap:
                  name: {{ .Init.name }}-config
        volumeClaimTemplates:
          - metadata:
              name: data
            spec:
              accessModes: [ReadWriteOnce]
              storageClassName: rook-ceph-block
              volumeMode: Filesystem
              resources:
                requests:
                  storage: {{ .Init.storage }}
    # Headless — DNS pod ổn định (<name>-0.<name>); khuôn Service mysql-prd công ty
    - apiVersion: v1
      kind: Service
      metadata:
        name: {{ .Init.name }}
        labels: { app: {{ .Init.name }} }
      spec:
        clusterIP: None
        selector: { app: {{ .Init.name }} }
        ports:
          - name: mysql
            port: 3306
            targetPort: 3306
    # Đọc — cân bằng mọi pod (khuôn Service mysql-read công ty)
    - apiVersion: v1
      kind: Service
      metadata:
        name: {{ .Init.name }}-read
        labels: { app: {{ .Init.name }} }
      spec:
        selector: { app: {{ .Init.name }} }
        ports:
          - name: mysql
            port: 3306
            targetPort: 3306
    {{ if $backup.enabled }}
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: {{ .Init.name }}-backup
        labels:
          app.kubernetes.io/component: datastore
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: rook-ceph-block
        resources:
          requests:
            storage: {{ $backup.storage | default "10Gi" }}
    - apiVersion: batch/v1
      kind: CronJob
      metadata:
        name: {{ .Init.name }}-auto-backup
        labels:
          app.kubernetes.io/component: datastore
      spec:
        schedule: {{ $backup.schedule | default "0 18 * * *" | quote }}
        concurrencyPolicy: Forbid
        successfulJobsHistoryLimit: 3
        failedJobsHistoryLimit: 1
        jobTemplate:
          spec:
            template:
              spec:
                restartPolicy: OnFailure
                volumes:
                  - name: backup-storage
                    persistentVolumeClaim:
                      claimName: {{ .Init.name }}-backup
                containers:
                  - name: backup
                    image: {{ .Init.image }}   # dùng lại image DB -> có sẵn mysqldump
                    env:
                      - name: MYSQL_PWD        # mysql client tự đọc biến này, không lộ qua args
                        valueFrom:
                          secretKeyRef:
                            name: {{ .Init.secretName }}
                            key: password
                    command: ["/bin/sh", "-c"]
                    args:
                      - |
                        set -e
                        TS=$(date +%Y%m%d-%H%M%S)
                        echo "MySQL backup bat dau: $TS"
                        mysqldump -h {{ .Init.name }}-0.{{ .Init.name }} -P 3306 -u root \
                          --single-transaction --routines --triggers --all-databases \
                          > /backup/backup-$TS.sql
                        echo "Xong: /backup/backup-$TS.sql"
                        ls -lh /backup | tail -5
                    volumeMounts:
                      - name: backup-storage
                        mountPath: /backup
    - apiVersion: batch/v1
      kind: CronJob
      metadata:
        name: {{ .Init.name }}-cleanup-backup
        labels:
          app.kubernetes.io/component: datastore
      spec:
        schedule: {{ $backup.cleanupSchedule | default "0 19 * * *" | quote }}
        concurrencyPolicy: Forbid
        successfulJobsHistoryLimit: 3
        failedJobsHistoryLimit: 1
        jobTemplate:
          spec:
            template:
              spec:
                restartPolicy: OnFailure
                volumes:
                  - name: backup-storage
                    persistentVolumeClaim:
                      claimName: {{ .Init.name }}-backup
                containers:
                  - name: cleanup
                    image: {{ .Init.image }}
                    command: ["/bin/sh", "-c"]
                    args:
                      - |
                        echo "Don backup cu hon {{ $backup.retentionDays | default 7 }} ngay"
                        find /backup -name 'backup-*.sql' -type f -mtime +{{ $backup.retentionDays | default 7 }} -print -delete
                        echo "Con lai:"; ls -lh /backup | tail -10
                    volumeMounts:
                      - name: backup-storage
                        mountPath: /backup
    {{ end }}

# ---------------------------------------------------------------------------
# mongodb: khuôn giống mysql. Auth root/<password sinh sẵn>, authSource=admin.
#
# Dev khai:
#   db:
#     type: mongodb
#     params:                                # tất cả TÙY CHỌN
#       database: shift_handover             # tên DB logic app dùng (mặc định: appdb)
#       image: mongo:6.0
#       storage: 5Gi
#       config: |                            # mongod.conf tùy biến -> ConfigMap + args --config
#         storage: { wiredTiger: { engineConfig: { cacheSizeGB: 1 } } }
#       backup: { enabled: true, schedule: "...", cleanupSchedule: "...", retentionDays: 7, storage: 10Gi }
#
# Biến xuất ra : host / port(27017) / name / username(root) / password(secretKeyRef) / authSource(admin)
# Secret       : <workload>-db-credentials (key: password)
# Lưu ý        : app cần MONGODB_URI đầy đủ (có password bên trong) thì khai key đó qua
#                type: app-config — score-k8s KHÔNG cho nối chuỗi một biến secretKeyRef.
# ---------------------------------------------------------------------------
- uri: template://onprem/mongodb
  type: mongodb
  init: |
    name: {{ .SourceWorkload }}-mongo
    secretName: {{ .SourceWorkload }}-db-credentials
    database: {{ .Params.database | default "appdb" }}
    image: {{ .Params.image | default "mongo:6.0" }}
    storage: {{ .Params.storage | default "5Gi" }}
  state: |
    {{ if not .State.password }}password: {{ randAlphaNum 20 | quote }}{{ else }}password: {{ .State.password | quote }}{{ end }}
  outputs: |
    host: {{ .Init.name }}
    port: 27017
    name: {{ .Init.database }}
    username: root
    password: {{ encodeSecretRef .Init.secretName "password" }}
    authSource: admin
  manifests: |
    {{ $backup := .Params.backup | default dict }}
    - apiVersion: v1
      kind: Secret
      metadata:
        name: {{ .Init.secretName }}
      type: Opaque
      stringData:
        password: {{ .State.password | quote }}
    - apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: {{ .Init.name }}
        labels:
          app.kubernetes.io/component: datastore
      spec:
        serviceName: {{ .Init.name }}
        replicas: 1
        selector:
          matchLabels: { app: {{ .Init.name }} }
        template:
          metadata:
            labels: { app: {{ .Init.name }} }
          spec:
            containers:
              - name: mongodb
                # Air-gap: harbor.example.com/dockerhub/library/mongo:6.0
                image: {{ .Init.image }}
                {{ if .Params.config }}
                args: ["--config", "/etc/mongod.conf"]   # không có args thì file mount bị mongod bỏ qua
                {{ end }}
                env:
                  - name: MONGO_INITDB_ROOT_USERNAME
                    value: root
                  - name: MONGO_INITDB_ROOT_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: {{ .Init.secretName }}
                        key: password
                ports:
                  - containerPort: 27017
                volumeMounts:
                  - name: data
                    mountPath: /data/db
                  {{ if .Params.config }}
                  - name: config
                    mountPath: /etc/mongod.conf   # khuôn mount mongodb-config của shift-handover
                    subPath: mongod.conf
                  {{ end }}
                # mongo >= 5.0 có mongosh; image cũ hơn đổi thành `mongo --quiet --eval ...`
                livenessProbe:
                  exec:
                    command:
                      - sh
                      - -c
                      - 'mongosh --quiet --eval "db.adminCommand({ping: 1})" > /dev/null 2>&1'
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
                readinessProbe:
                  exec:
                    command:
                      - sh
                      - -c
                      - 'mongosh --quiet --eval "db.adminCommand({ping: 1})" > /dev/null 2>&1'
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
                resources:
                  requests: { cpu: 100m, memory: 1Gi }
                  limits: { memory: 1536Mi }
            {{ if .Params.config }}
            volumes:
              - name: config
                configMap:
                  name: {{ .Init.name }}-config
            {{ end }}
        volumeClaimTemplates:
          - metadata:
              name: data
            spec:
              accessModes: [ReadWriteOnce]
              storageClassName: rook-ceph-block
              resources:
                requests:
                  storage: {{ .Init.storage }}
    - apiVersion: v1
      kind: Service
      metadata:
        name: {{ .Init.name }}
        labels: { app: {{ .Init.name }} }
      spec:
        clusterIP: None    # headless — khuôn công ty cho Service của StatefulSet DB
        selector: { app: {{ .Init.name }} }
        ports:
          - port: 27017
            targetPort: 27017
    {{ if .Params.config }}
    # mongod.conf tùy biến (khuôn ConfigMap mongodb-config của shift-handover)
    - apiVersion: v1
      kind: ConfigMap
      metadata:
        name: {{ .Init.name }}-config
        labels:
          app.kubernetes.io/component: datastore
      data:
        mongod.conf: |
    {{ .Params.config | indent 10 }}
    {{ end }}
    {{ if $backup.enabled }}
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: {{ .Init.name }}-backup
        labels:
          app.kubernetes.io/component: datastore
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: rook-ceph-block
        resources:
          requests:
            storage: {{ $backup.storage | default "10Gi" }}
    - apiVersion: batch/v1
      kind: CronJob
      metadata:
        name: {{ .Init.name }}-auto-backup
        labels:
          app.kubernetes.io/component: datastore
      spec:
        schedule: {{ $backup.schedule | default "0 18 * * *" | quote }}
        concurrencyPolicy: Forbid
        successfulJobsHistoryLimit: 3
        failedJobsHistoryLimit: 1
        jobTemplate:
          spec:
            template:
              spec:
                restartPolicy: OnFailure
                volumes:
                  - name: backup-storage
                    persistentVolumeClaim:
                      claimName: {{ .Init.name }}-backup
                containers:
                  - name: backup
                    image: {{ .Init.image }}   # dùng lại image DB -> có sẵn mongodump
                    env:
                      - name: MONGO_ROOT_PASSWORD
                        valueFrom:
                          secretKeyRef:
                            name: {{ .Init.secretName }}
                            key: password
                    command: ["/bin/sh", "-c"]
                    args:
                      - |
                        set -e
                        TS=$(date +%Y%m%d-%H%M%S)
                        echo "MongoDB backup bat dau: $TS"
                        mongodump --host {{ .Init.name }} --port 27017 \
                          --username root --password "$MONGO_ROOT_PASSWORD" \
                          --authenticationDatabase admin \
                          --out /backup/backup-$TS
                        echo "Xong: /backup/backup-$TS"
                        ls -ld /backup/backup-* | tail -5
                    volumeMounts:
                      - name: backup-storage
                        mountPath: /backup
    - apiVersion: batch/v1
      kind: CronJob
      metadata:
        name: {{ .Init.name }}-cleanup-backup
        labels:
          app.kubernetes.io/component: datastore
      spec:
        schedule: {{ $backup.cleanupSchedule | default "0 19 * * *" | quote }}
        concurrencyPolicy: Forbid
        successfulJobsHistoryLimit: 3
        failedJobsHistoryLimit: 1
        jobTemplate:
          spec:
            template:
              spec:
                restartPolicy: OnFailure
                volumes:
                  - name: backup-storage
                    persistentVolumeClaim:
                      claimName: {{ .Init.name }}-backup
                containers:
                  - name: cleanup
                    image: {{ .Init.image }}
                    command: ["/bin/sh", "-c"]
                    args:
                      - |
                        echo "Don backup cu hon {{ $backup.retentionDays | default 7 }} ngay"
                        find /backup -maxdepth 1 -name 'backup-*' -type d -mtime +{{ $backup.retentionDays | default 7 }} -print -exec rm -rf {} +
                        echo "Con lai:"; ls -ld /backup/backup-* 2>/dev/null | tail -10
                    volumeMounts:
                      - name: backup-storage
                        mountPath: /backup
    {{ end }}

# ---------------------------------------------------------------------------
# redis: cache — mặc định Deployment + emptyDir, KHÔNG PVC.
#
# LỰA CHỌN THIẾT KẾ (chủ đích, xem §4 tài liệu yêu cầu): cả 3 app dùng redis trên cụm cũ
# (acs, okr, okr-dep) đều dùng như cache/session — mất dữ liệu khi restart là chấp nhận
# được, đổi lại không tốn PVC Ceph và không phải quản trị persistence. Nếu về sau có app
# cần redis bền vững -> thêm params.persistent cho block này (không phá app cũ).
#
# Dev khai:
#   cache:
#     type: redis
#     params:                 # TÙY CHỌN
#       image: redis:6.2-alpine
#       auth: true            # bật requirepass (mặc định false — giống app cũ nối không password)
#
# Biến xuất ra : host / port(6379) / password ("" khi auth=false, secretKeyRef khi auth=true)
# Secret       : <workload>-redis-credentials (chỉ tạo khi auth=true) — cố ý KHÁC
#                <workload>-db-credentials để một workload dùng được cả DB + redis.
# ---------------------------------------------------------------------------
- uri: template://onprem/redis
  type: redis
  init: |
    name: {{ .SourceWorkload }}-redis
    secretName: {{ .SourceWorkload }}-redis-credentials
    image: {{ .Params.image | default "redis:6.2-alpine" }}
  state: |
    {{ if .Params.auth }}{{ if not .State.password }}password: {{ randAlphaNum 20 | quote }}{{ else }}password: {{ .State.password | quote }}{{ end }}{{ end }}
  outputs: |
    host: {{ .Init.name }}
    port: 6379
    {{ if .Params.auth }}password: {{ encodeSecretRef .Init.secretName "password" }}{{ else }}password: ""{{ end }}
  manifests: |
    {{ if .Params.auth }}
    - apiVersion: v1
      kind: Secret
      metadata:
        name: {{ .Init.secretName }}
      type: Opaque
      stringData:
        password: {{ .State.password | quote }}
    {{ end }}
    - apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: {{ .Init.name }}
        labels:
          app.kubernetes.io/component: datastore
      spec:
        replicas: 1
        selector:
          matchLabels: { app: {{ .Init.name }} }
        template:
          metadata:
            labels: { app: {{ .Init.name }} }
          spec:
            containers:
              - name: redis
                # Air-gap: harbor.example.com/dockerhub/library/redis:6.2-alpine
                image: {{ .Init.image }}
                {{ if .Params.auth }}
                env:
                  - name: REDIS_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: {{ .Init.secretName }}
                        key: password
                args: ["--requirepass", "$(REDIS_PASSWORD)"]
                {{ end }}
                ports:
                  - containerPort: 6379
                volumeMounts:
                  - name: data
                    mountPath: /data
                livenessProbe:
                  exec:
                    command:
                      - sh
                      - -c
                      - {{ if .Params.auth }}redis-cli -a "$REDIS_PASSWORD" ping > /dev/null 2>&1{{ else }}redis-cli ping > /dev/null 2>&1{{ end }}
                  initialDelaySeconds: 15
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
                readinessProbe:
                  exec:
                    command:
                      - sh
                      - -c
                      - {{ if .Params.auth }}redis-cli -a "$REDIS_PASSWORD" ping > /dev/null 2>&1{{ else }}redis-cli ping > /dev/null 2>&1{{ end }}
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
                resources:
                  requests: { cpu: 50m, memory: 256Mi }
                  limits: { memory: 1Gi }
            volumes:
              - name: data
                emptyDir: {}
    - apiVersion: v1
      kind: Service
      metadata:
        name: {{ .Init.name }}
      spec:
        selector: { app: {{ .Init.name }} }
        ports:
          - port: 6379
            targetPort: 6379

# ---------------------------------------------------------------------------
# app-config: Secret gom nhiều key cấu hình app (pattern `be-secret` trên cụm cũ).
#
# VẤN ĐỀ: nhiều app đọc cấu hình (JWT_SECRET, KEYCLOAK_*, DATABASE_URL...) qua
# secretKeyRef từ một Secret nhiều key. Giá trị KHÔNG ĐƯỢC nằm trong git.
#
# LỰA CHỌN THIẾT KẾ: resource type riêng (thay vì mở rộng cú pháp env) vì:
#   (1) dev khai TÊN key ngay trong score.yaml — nhìn score.yaml biết app cần gì;
#   (2) đi qua đúng đường Secret sẵn có của platform (CI tách + create-if-missing),
#       không cần cơ chế mới; (3) đổi backend sau này (ESO/Vault) chỉ sửa block này.
# Trade-off: giá trị phải được ops điền TAY 1 lần/namespace (kubectl patch) — chấp nhận
# vì đằng nào giá trị cũng không được vào git, và create-if-missing giữ nguyên giá trị đã điền.
#
# Dev khai:
#   config:
#     type: app-config
#     params:
#       keys: [NODE_ENV, PORT, JWT_SECRET, KEYCLOAK_URL]   # BẮT BUỘC
# rồi dùng:  variables: { JWT_SECRET: ${resources.config.JWT_SECRET} }
#
# Secret: <workload>-app-config — sinh với giá trị placeholder "CHANGE_ME";
# CI apply create-if-missing; ops điền thật:
#   kubectl -n <ns> patch secret <workload>-app-config -p '{"stringData":{"JWT_SECRET":"..."}}'
# ---------------------------------------------------------------------------
- uri: template://onprem/app-config
  type: app-config
  init: |
    {{ if not .Params.keys }}{{ fail "app-config: thiếu params.keys (danh sách tên biến app cần)" }}{{ end }}
    secretName: {{ .SourceWorkload }}-app-config
  outputs: |
    secretName: {{ .Init.secretName }}
    {{- range .Params.keys }}
    {{ . }}: {{ encodeSecretRef $.Init.secretName . }}
    {{- end }}
  manifests: |
    # Secret bị CI tách ra, apply create-if-missing. Giá trị thật KHÔNG BAO GIỜ vào git —
    # placeholder CHANGE_ME chỉ xuất hiện ở lần tạo đầu, ops điền thật rồi thì giữ nguyên.
    - apiVersion: v1
      kind: Secret
      metadata:
        name: {{ .Init.secretName }}
        labels:
          app.kubernetes.io/component: app-config
      type: Opaque
      stringData:
        {{- range .Params.keys }}
        {{ . }}: "CHANGE_ME"
        {{- end }}

# ---------------------------------------------------------------------------
# route: lộ service ra ngoài qua Ingress nginx CHUẨN (networking.k8s.io/v1) —
# đúng khuôn công ty đang dùng trên Rancher (ingressClassName: nginx).
#
# Dev khai:
#   api:
#     type: route
#     params:
#       host: otm.example.com        # BẮT BUỘC
#       port: 1080                   # BẮT BUỘC — port của Service workload
#       path: /                      # tùy chọn (mặc định /)
#       pathType: Prefix             # tùy chọn (Prefix|Exact)
#       ingressClass: nginx          # tùy chọn — đổi nếu cụm dùng class khác
#       bodySize: 100M               # tùy chọn -> nginx.ingress.kubernetes.io/proxy-body-size
#       tlsSecret: otm-tls           # tùy chọn -> khối tls (secret cert có sẵn trong ns)
#
# ĐA HOST/ĐA PATH (kiểu feedback360/otm — be/fe mỗi cái một host): mỗi host/path là
# MỘT resource route riêng trong score.yaml; tên Ingress chứa host+path đã
# chuẩn hóa nên không đụng nhau:  <workload>-route-<host>[-<path>]
# ---------------------------------------------------------------------------
- uri: template://onprem/route
  type: route
  init: |
    host: {{ .Params.host }}
    path: {{ .Params.path | default "/" }}
    port: {{ .Params.port }}
    class: {{ .Params.ingressClass | default "nginx" }}
    pathType: {{ .Params.pathType | default "Prefix" }}
  outputs: |
    host: {{ .Init.host }}
    path: {{ .Init.path }}
  manifests: |
    - apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: {{ .SourceWorkload }}-route-{{ .Init.host | lower | replace "." "-" }}{{ if ne .Init.path "/" }}-{{ .Init.path | trimPrefix "/" | replace "/" "-" | lower }}{{ end }}
        {{ if .Params.bodySize }}
        annotations:
          nginx.ingress.kubernetes.io/proxy-body-size: {{ .Params.bodySize | quote }}
        {{ end }}
      spec:
        ingressClassName: {{ .Init.class }}
        {{ if .Params.tlsSecret }}
        tls:
          - hosts: [{{ .Init.host | quote }}]
            secretName: {{ .Params.tlsSecret }}
        {{ end }}
        rules:
          - host: {{ .Init.host }}
            http:
              paths:
                - path: {{ .Init.path }}
                  pathType: {{ .Init.pathType }}
                  backend:
                    service:
                      name: {{ (index .WorkloadServices .SourceWorkload).ServiceName }}
                      port:
                        number: {{ .Init.port }}

# ---------------------------------------------------------------------------
# service: gọi service khác trong cùng app (cùng namespace).
# Không sinh manifest — chỉ trả về DNS nội bộ của K8s Service.
# Lưu ý: score-k8s đặt tên Service = tên workload (đừng override bằng annotation
# k8s.score.dev/service-name, nếu không convention này gãy).
# Dev dùng: http://${resources.<tên>.host}:${resources.<tên>.port}
# ---------------------------------------------------------------------------
- uri: template://onprem/service
  type: service
  outputs: |
    host: {{ .Params.workload }}
    port: {{ .Params.port }}

# APP MẪU MIGRATION — otm/backend
# Theo manifest công ty trên Rancher: Service otm-be port 1080 + StatefulSet mysql
# (Service headless mysql-prd, PVC 30Gi). mysql 5.6 giữ nguyên lúc migrate, nâng sau.
apiVersion: score.dev/v1b1

metadata:
  name: otm-be                # giữ đúng tên công ty: <app>-be

containers:
  main:
    image: "."
    variables:
      PORT: "1080"
      DB_HOST: ${resources.db.host}
      DB_PORT: ${resources.db.port}
      DB_NAME: ${resources.db.name}
      DB_USER: ${resources.db.username}
      DB_PASSWORD: ${resources.db.password}
    readinessProbe:
      httpGet:
        path: /
        port: 1080
    resources:
      requests: { cpu: 250m, memory: 512Mi }
      limits: { cpu: "1", memory: 1Gi }

service:
  ports:
    http:
      port: 1080              # đúng Service otm-be trên Rancher
      targetPort: 1080

resources:
  db:
    type: mysql               # render ĐÚNG StatefulSet công ty: init server-id + clone/sidecar
    params:                   # xtrabackup + master/slave.cnf + liveness bash 120s
      database: otm
      image: mysql:5.6        # đúng bản cụm cũ
      # xtrabackupImage: harbor.<domain>/otm/prd/xtrabackup:1.0   # air-gap: đổi về Harbor
      storage: 30Gi           # đúng PVC 30Gi trên Rancher — tăng ở đây khi cần thêm ổ
      # replicas: 2           # bật khi cần replica read-only (đọc qua ${resources.db.readHost})
      resources:              # bỏ trống = 500m/1Gi requests đúng file công ty
        cpu: 500m
        memory: 1Gi
        # cpuLimit: "2"       # mở khi muốn có limits (mặc định không có, như file cũ)
        # memoryLimit: 4Gi
      config: |               # cnf ghép vào cả master.cnf lẫn slave.cnf (ConfigMap `mysql` cũ)
        [mysqld]
        character-set-server=utf8
        collation-server=utf8_general_ci
      backup:
        enabled: true         # mysqldump định kỳ (độc lập với clone xtrabackup của replication)
  api:
    type: route
    params:
      host: api-otm.example.com   # TODO: đổi domain thật
      port: 1080
      bodySize: 100M              # demo annotation proxy-body-size (khuôn okr/otm cũ)

# APP MẪU MIGRATION — feedback360/backend (từ cụm 1.19, ns feedback360)
# Chứng minh: postgres + app-config (pattern `be-secret` cũ) + route riêng cho BE.
# Nguồn đối chiếu: out/old/manifests/feedback360/Deployment.feedback360-backend.yaml
#
# QUY TẮC XẾP BIẾN (áp dụng cho mọi app) — câu hỏi không phải "có bí mật không"
# mà là "giá trị này ai biết, và nó đổi theo cái gì":
#   1. Không đổi bao giờ            -> literal ngay dưới đây
#   2. Do resource khác sinh ra     -> ${resources.<tên>.<output>}
#   3. Đổi theo môi trường / bí mật -> type: app-config, ops điền 1 lần/namespace
apiVersion: score.dev/v1b1

metadata:
  name: feedback360-backend

containers:
  main:                       # convention platform: container chính tên 'main', image do CI điền
    image: "."
    variables:
      # ---- (1) hằng số: giống nhau ở mọi môi trường, không phải secret.
      # PORT để literal vì nó phải khớp service.ports bên dưới — đưa vào app-config
      # thì một con số có hai nguồn sự thật, và mặc định là "CHANGE_ME" -> pod chết.
      NODE_ENV: production
      PORT: "8000"
      JWT_EXPIRES_IN: "7d"    # TODO: đối chiếu giá trị thật trong be-secret cũ

      # ---- (2) từ provisioner postgres: connection string ĐẦY ĐỦ, đã có password.
      # Provisioner ghép chuỗi (nơi duy nhất còn thấy password dạng plaintext) rồi
      # xuất ra dưới dạng secretKeyRef -> ops KHÔNG phải chép password lần thứ hai.
      DATABASE_URL: ${resources.db.url}

      # ---- (3) đổi theo môi trường hoặc bí mật -> ops điền 1 lần/namespace:
      #   kubectl -n <ns> patch secret feedback360-backend-app-config \
      #     -p '{"stringData":{"JWT_SECRET":"..."}}'
      FRONTEND_URL: ${resources.config.FRONTEND_URL}
      DEFAULT_PASSWORD: ${resources.config.DEFAULT_PASSWORD}
      JWT_SECRET: ${resources.config.JWT_SECRET}
      KEYCLOAK_URL: ${resources.config.KEYCLOAK_URL}
      KEYCLOAK_REALM: ${resources.config.KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${resources.config.KEYCLOAK_CLIENT_ID}

service:
  ports:
    http:
      port: 8000              # cụm cũ: feedback360-be-service port 8000
      targetPort: 8000

resources:
  db:
    type: postgres            # onprem/do -> StatefulSet; cloud -> RDS. App không đổi.
    params:
      database: feedback360   # giữ đúng tên DB cụm cũ để restore dump không phải đổi app
      image: postgres:16-alpine
      urlQuery: "?schema=public"   # Prisma: schema mặc định — bỏ dòng này nếu app không dùng Prisma
      resources:              # bỏ trống = 100m/256Mi + limit 512Mi (default catalog)
        cpu: 200m
        memory: 512Mi
        memoryLimit: 1Gi
  config:
    type: app-config          # chỉ còn các key thuộc nhóm (3) — càng ít càng đỡ sai sót
    params:
      keys:
        - FRONTEND_URL
        - DEFAULT_PASSWORD
        - JWT_SECRET
        - KEYCLOAK_URL
        - KEYCLOAK_REALM
        - KEYCLOAK_CLIENT_ID
  api:
    type: route               # cụm cũ: host riêng cho BE (đa host cùng app — xem frontend)
    params:
      host: api-feedback360.example.com   # TODO: đổi domain thật
      port: 8000

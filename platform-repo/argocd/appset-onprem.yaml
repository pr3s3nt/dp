# =============================================================================
# ApplicationSet — ONPREM
# Quy ước: mỗi app có 1 config repo tên <app>-config, bên trong:
#   onprem/staging/manifests.yaml
#   onprem/prod/manifests.yaml      (manifest ĐÃ render sẵn bởi CI — không Kustomize/Helm)
#
# SCM Provider generator tự quét org tìm repo *-config
# -> THÊM APP MỚI = TẠO REPO <app>-config, KHÔNG sửa file này.
#
# staging: sync tự động (prune + selfHeal)
# prod:    manual sync (bấm Sync trong ArgoCD sau khi commit promote đã vào repo)
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: onprem-apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          # Quét mọi repo *-config trong org. Cần Secret 'github-token' trong ns argocd.
          - scmProvider:
              github:
                organization: your-org            # TODO: thay your-org
                tokenRef:
                  secretName: github-token
                  key: token
              filters:
                - repositoryMatch: .*-config$
          # --- Nếu chưa muốn cấp token quét org, thay scmProvider bằng list: ---
          # - list:
          #     elements:
          #       - url: https://github.com/your-org/shop-app-config.git
          #         repository: shop-app-config
          #         branch: main
          - list:
              elements:
                - env: staging
                - env: prod
  template:
    metadata:
      name: '{{ .repository | trimSuffix "-config" }}-{{ .env }}-onprem'
      labels:
        platform: onprem
        env: '{{ .env }}'
    spec:
      project: idp
      source:
        repoURL: '{{ .url }}'
        targetRevision: '{{ .branch }}'
        path: 'onprem/{{ .env }}'
        directory:
          recurse: false
      destination:
        # Cụm onprem = cụm đang chạy ArgoCD:
        server: https://kubernetes.default.svc
        namespace: '{{ .repository | trimSuffix "-config" }}-{{ .env }}'
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
  # Chỉ staging được sync tự động; prod giữ manual để gate.
  templatePatch: |
    {{ if eq .env "staging" }}
    spec:
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
    {{ end }}

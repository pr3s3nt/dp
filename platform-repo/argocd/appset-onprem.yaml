# =============================================================================
# ApplicationSet — ONPREM (đa cụm: mỗi app một cụm k8s riêng)
#
# ArgoCD chạy trên CỤM QUẢN LÝ; app deploy sang cụm ghi trong
# platform-repo/clusters/placement/<app>.yaml (nguồn sự thật duy nhất — xem clusters/README.md).
#
# THÊM APP = tạo repo <app>-config + thêm 1 file placement (PR vào platform-repo).
# ĐỔI CỤM CỦA APP = sửa file placement — không đụng file này.
#
# Config repo giữ nguyên khuôn: <app>-config/onprem/{staging,prod}/manifests.yaml
# staging: sync tự động (prune + selfHeal) | prod: manual sync
#
# Yêu cầu:
#   - Cụm app đã `argocd cluster add <ctx> --name <tên>` (destination dùng NAME).
#   - ArgoCD đọc được platform-repo (thêm repo credential nếu private).
#   - `in-cluster` = cụm quản lý (tên có sẵn của ArgoCD).
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: onprem-apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          # Mỗi file placement -> 1 app (nội dung file thành params: .app, .clusters.*)
          - git:
              repoURL: https://github.com/your-org/platform-repo.git   # TODO: thay your-org
              revision: main            # placement là dữ liệu vận hành — LUÔN đọc main, không theo platform.lock
              files:
                - path: "clusters/placement/*.yaml"
          - list:
              elements:
                - env: staging
                - env: prod
  template:
    metadata:
      name: '{{ .app }}-{{ .env }}-onprem'
      labels:
        platform: onprem
        env: '{{ .env }}'
        cluster: '{{ index .clusters .env }}'
    spec:
      project: idp
      source:
        repoURL: 'https://github.com/your-org/{{ .app }}-config.git'   # TODO: thay your-org
        targetRevision: main
        path: 'onprem/{{ .env }}'
        directory:
          recurse: false
      destination:
        # Deploy chéo cụm theo placement (destination.name — cluster đã đăng ký với ArgoCD)
        name: '{{ index .clusters .env }}'
        namespace: '{{ .app }}-{{ .env }}'
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
  # Chỉ staging được sync tự động; prod giữ manual để gate.
  templatePatch: |
    {{ if eq .env "staging" }}
    spec:
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
    {{ end }}

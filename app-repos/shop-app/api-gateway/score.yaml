# API-GATEWAY — cửa ngõ /api, gọi 2 service nội bộ.
# Thể hiện quan hệ Service -> Service: chỉ khai `type: service`, nhận host/port qua biến.
apiVersion: score.dev/v1b1

metadata:
  name: api-gateway

containers:
  main:               # convention platform: container chính tên 'main', image do CI điền
    image: "."
    variables:
      PORT: "8080"
      ORDERS_URL: http://${resources.orders.host}:${resources.orders.port}
      PAYMENTS_URL: http://${resources.payments.host}:${resources.payments.port}

service:
  ports:
    http:
      port: 8080
      targetPort: 8080

resources:
  orders:
    type: service
    params: { workload: order-service, port: 8080 }
  payments:
    type: service
    params: { workload: payment-service, port: 8080 }
  api:
    type: route
    params:
      host: shop.example.com   # TODO: đổi domain thật
      path: /api
      port: 8080

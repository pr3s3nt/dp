# BACKEND — Express + Postgres.
# Route /api lộ ra ngoài qua Traefik (PathPrefix KHÔNG strip prefix,
# nên backend tự serve các route dưới /api).
apiVersion: score.dev/v1b1

metadata:
  name: backend

containers:
  main:               # convention platform: container chính tên 'main', image do CI/script điền
    image: "."
    variables:
      PORT: "8080"
      DB_HOST: ${resources.db.host}
      DB_PORT: ${resources.db.port}
      DB_NAME: ${resources.db.name}
      DB_USER: ${resources.db.username}
      DB_PASSWORD: ${resources.db.password}

service:
  ports:
    http:
      port: 8080
      targetPort: 8080

resources:
  db:
    type: postgres    # onprem -> StatefulSet Postgres trên rook-ceph-block, password qua secretKeyRef
  api:
    type: route
    params:
      host: notes.local   # TODO: đổi domain thật; test nhanh thì trỏ /etc/hosts vào node Traefik
      path: /api
      port: 8080

metadata:
  name: pod-manager
  namespace: argocd
  labels:
    app.kubernetes.io/instance: argocd-workflow
  annotations:
    workflows.argoproj.io/description: 'This is an example of the permissions you
      would need if you wanted to use a resource template to create and manage

      other pods. The same pattern would be suitable for other resurces, e.g. a service

      '
rules:
- verbs:
  - create
  - get
  - patch
  apiGroups:
  - ''
  resources:
  - pods
apiVersion: <DOMAIN_776>/v1
kind: Role

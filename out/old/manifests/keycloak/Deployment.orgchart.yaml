metadata:
  name: orgchart
  namespace: keycloak
  labels:
    app: orgchart
  annotations: {}
spec:
  replicas: 0
  selector:
    matchLabels:
      app: orgchart
  template:
    metadata:
      labels:
        app: orgchart
      annotations:
        vault.hashicorp.com/agent-image: <COMPANY>-<DOMAIN_690>/vault:1.7.0
        vault.hashicorp.com/agent-inject: 'true'
        vault.hashicorp.com/agent-inject-secret-ca.crt: <REDACTED:env>
        vault.hashicorp.com/agent-inject-secret-ca.pem: <REDACTED:env>
        vault.hashicorp.com/agent-inject-secret-client.pem: <REDACTED:env>
        vault.hashicorp.com/agent-inject-secret-clientkey.pem: <REDACTED:env>
        vault.hashicorp.com/agent-inject-secret-server.crt: <REDACTED:env>
        vault.hashicorp.com/agent-inject-secret-server.key: <REDACTED:env>
        vault.hashicorp.com/agent-inject-template-ca.crt: '{{- with secret "secret/prod/logging/certs"
          -}}

          {{ .<DOMAIN_696>.ca_crt }}

          {{- end -}}

          '
        vault.hashicorp.com/agent-inject-template-ca.pem: '{{- with secret "secret/prod/logging/niffler"
          -}}

          {{ .<DOMAIN_696>.ca_pem }}

          {{- end -}}

          '
        vault.hashicorp.com/agent-inject-template-client.pem: '{{- with secret "secret/prod/logging/niffler"
          -}}

          {{ .<DOMAIN_696>.client_pem }}

          {{- end -}}

          '
        vault.hashicorp.com/agent-inject-template-clientkey.pem: '{{- with secret
          "secret/prod/logging/niffler" -}}

          {{ .<DOMAIN_696>.clientkey_pem }}

          {{ end }}

          '
        vault.hashicorp.com/agent-inject-template-server.crt: '{{- with secret "secret/prod/logging/certs"
          -}}

          {{ .<DOMAIN_696>.server_crt }}

          {{- end -}}

          '
        vault.hashicorp.com/agent-inject-template-server.key: '{{- with secret "secret/prod/logging/certs"
          -}}

          {{ .<DOMAIN_696>.server_key }}

          {{- end -}}

          '
        vault.hashicorp.com/auth-path: <REDACTED:env>
        vault.hashicorp.com/role: <COMPANY>-prd-keycloak
        vault.hashicorp.com/secret-volume-path: <REDACTED:env>
        vault.hashicorp.com/service: http://<CLEANUP_IP_5>:18200
    spec:
      containers:
      - name: orgchart
        image: <COMPANY>-<DOMAIN_690>/passbolt/mysql:5.6
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      serviceAccountName: vault-auth
      serviceAccount: vault-auth
      securityContext: {}
      imagePullSecrets:
      - name: registrypullsecret
      schedulerName: default-scheduler
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
apiVersion: apps/v1
kind: Deployment

metadata:
  name: mysql-keycloak
  namespace: keycloak
  labels:
    app: mysql-keycloak
    app.kubernetes.io/managed-by: spinnaker
    app.kubernetes.io/name: keycloak
  annotations:
    artifact.spinnaker.io/location: <REDACTED:env>
    artifact.spinnaker.io/name: <REDACTED:env>
    artifact.spinnaker.io/type: <REDACTED:env>
    moniker.spinnaker.io/application: <REDACTED:env>
    moniker.spinnaker.io/cluster: <REDACTED:env>
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql-keycloak
  template:
    metadata:
      labels:
        app: mysql-keycloak
        app.kubernetes.io/managed-by: spinnaker
        app.kubernetes.io/name: keycloak
      annotations:
        artifact.spinnaker.io/location: <REDACTED:env>
        artifact.spinnaker.io/name: <REDACTED:env>
        artifact.spinnaker.io/type: <REDACTED:env>
        moniker.spinnaker.io/application: <REDACTED:env>
        moniker.spinnaker.io/cluster: <REDACTED:env>
    spec:
      volumes:
      - name: mysql-time
        hostPath:
          path: /usr/share/zoneinfo/Asia/Ho_Chi_Minh
          type: File
      containers:
      - name: mysql-keycloak
        image: <COMPANY>-<DOMAIN_607>/keycloak/mysql:5.6
        ports:
        - name: mysql
          containerPort: 3306
          protocol: TCP
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-root-password
              key: password
        - name: MYSQL_DATABASE
          value: keycloak
        - name: MYSQL_USER
          valueFrom:
            secretKeyRef:
              name: mysql-keycloak
              key: username
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-keycloak
              key: password
        resources: {}
        volumeMounts:
        - name: mysql-keycloak
          mountPath: /var/lib/mysql
        - name: mysql-time
          mountPath: /etc/localtime
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      securityContext: {}
      imagePullSecrets:
      - name: registrypullsecret
      schedulerName: default-scheduler
  volumeClaimTemplates:
  - kind: PersistentVolumeClaim
    apiVersion: v1
    metadata:
      name: mysql-keycloak
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi
      storageClassName: ceph-block-replica-2
      volumeMode: Filesystem
  serviceName: mysql-keycloak
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0
  revisionHistoryLimit: 10
apiVersion: apps/v1
kind: StatefulSet

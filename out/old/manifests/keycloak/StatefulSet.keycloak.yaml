metadata:
  name: keycloak
  namespace: keycloak
  labels:
    app: keycloak
    app.kubernetes.io/managed-by: spinnaker
    app.kubernetes.io/name: keycloak
  annotations:
    artifact.spinnaker.io/location: <REDACTED:env>
    artifact.spinnaker.io/name: <REDACTED:env>
    artifact.spinnaker.io/type: <REDACTED:env>
    moniker.spinnaker.io/application: <REDACTED:env>
    moniker.spinnaker.io/cluster: <REDACTED:env>
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
        app.kubernetes.io/managed-by: spinnaker
        app.kubernetes.io/name: keycloak
      annotations:
        artifact.spinnaker.io/location: <REDACTED:env>
        artifact.spinnaker.io/name: <REDACTED:env>
        artifact.spinnaker.io/type: <REDACTED:env>
        moniker.spinnaker.io/application: <REDACTED:env>
        moniker.spinnaker.io/cluster: <REDACTED:env>
    spec:
      volumes:
      - name: keycloak-time
        hostPath:
          path: /usr/share/zoneinfo/Asia/Ho_Chi_Minh
          type: File
      containers:
      - name: keycloak
        image: <COMPANY>-<DOMAIN_607>/keycloak/keycloak:11.0.3
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: https
          containerPort: 8443
          protocol: TCP
        env:
        - name: KEYCLOAK_USER
          valueFrom:
            secretKeyRef:
              name: keycloak-admin
              key: username
        - name: KEYCLOAK_PASSWORD
          valueFrom:
            secretKeyRef:
              name: keycloak-admin
              key: password
        - name: DB_VENDOR
          value: mysql
        - name: DB_ADDR
          value: mysql-keycloak-svc
        - name: DB_PORT
          value: '13306'
        - name: DB_DATABASE
          value: keycloak
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: keycloak-database
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: keycloak-database
              key: password
        - name: DB_SCHEMA
          value: public
        - name: JDBC_PARAMS
          value: useSSL=FALSE
        resources: {}
        volumeMounts:
        - name: plugin-keycloak
          mountPath: /opt/jboss/keycloak/standalone/deployments
        - name: keycloak-time
          mountPath: /etc/localtime
        readinessProbe:
          httpGet:
            path: /auth/realms/master
            port: 8080
            scheme: HTTP
          timeoutSeconds: 1
          periodSeconds: 10
          successThreshold: 1
          failureThreshold: 3
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      nodeSelector:
        kubernetes.io/hostname: <CLEANUP_HOST_4>
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
      imagePullSecrets:
      - name: registrypullsecret
      schedulerName: default-scheduler
  volumeClaimTemplates:
  - kind: PersistentVolumeClaim
    apiVersion: v1
    metadata:
      name: plugin-keycloak
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 20Gi
      storageClassName: ceph-block-replica-2
      volumeMode: Filesystem
  serviceName: keycloak
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0
  revisionHistoryLimit: 10
apiVersion: apps/v1
kind: StatefulSet

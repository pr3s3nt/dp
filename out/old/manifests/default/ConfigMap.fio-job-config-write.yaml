metadata:
  name: fio-job-config-write
  namespace: default
  annotations: {}
data:
  fio.job: '[global]

    ioengine=psync

    direct=1

    buffered=0

    size=5G

    iodepth=1000

    numjobs=4

    group_reporting

    refill_buffers

    rwmixread=80

    norandommap

    randrepeat=0

    percentage_random=0

    bs=512K

    buffer_compress_percentage=50

    rw=write

    [testjob]'
apiVersion: v1
kind: ConfigMap

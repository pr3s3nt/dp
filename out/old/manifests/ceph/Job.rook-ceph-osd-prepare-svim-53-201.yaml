metadata:
  name: rook-ceph-osd-prepare-<CLEANUP_HOST_4>
  namespace: ceph
  labels:
    app: rook-ceph-osd-prepare
    ceph-version: 15.2.4-0
    rook-version: v1.4.2
    rook_cluster: ceph
spec:
  parallelism: 1
  completions: 1
  backoffLimit: 6
  selector:
    matchLabels:
      controller-uid: dce68aab-8380-4e5b-ab94-b6d857d826f4
  template:
    metadata:
      name: rook-ceph-osd
      labels:
        app: rook-ceph-osd-prepare
        ceph.rook.io/pvc: ''
        controller-uid: dce68aab-8380-4e5b-ab94-b6d857d826f4
        job-name: rook-ceph-osd-prepare-<CLEANUP_HOST_4>
        rook_cluster: ceph
    spec:
      volumes:
      - name: rook-data
        hostPath:
          path: /var/lib/rook
          type: ''
      - name: ceph-conf-emptydir
        emptyDir: {}
      - name: rook-ceph-log
        hostPath:
          path: /var/lib/rook/ceph/log
          type: ''
      - name: rook-ceph-crash
        hostPath:
          path: /var/lib/rook/ceph/crash
          type: ''
      - name: rook-binaries
        emptyDir: {}
      - name: devices
        hostPath:
          path: /dev
          type: ''
      - name: udev
        hostPath:
          path: /run/udev
          type: ''
      - name: rootfs
        hostPath:
          path: /
          type: ''
      initContainers:
      - name: copy-bins
        image: rook/ceph:v1.4.2
        args:
        - copy-binaries
        - --copy-to-dir
        - /rook
        resources: {}
        volumeMounts:
        - name: rook-binaries
          mountPath: /rook
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      containers:
      - name: provision
        image: ceph/ceph:v15.2.4
        command:
        - /rook/tini
        args:
        - --
        - /rook/rook
        - ceph
        - osd
        - provision
        env:
        - name: ROOK_NODE_NAME
          value: <CLEANUP_HOST_4>
        - name: ROOK_CLUSTER_ID
          value: e00e0f95-2d72-4c1e-8b09-fd824f04c347
        - name: ROOK_PRIVATE_IP
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: <DOMAIN_165>
        - name: ROOK_PUBLIC_IP
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: <DOMAIN_165>
        - name: POD_NAMESPACE
          value: ceph
        - name: ROOK_MON_ENDPOINTS
          valueFrom:
            configMapKeyRef:
              name: rook-ceph-mon-endpoints
              key: data
        - name: ROOK_MON_SECRET
          valueFrom:
            secretKeyRef:
              name: rook-ceph-mon
              key: mon-secret
        - name: ROOK_CEPH_USERNAME
          valueFrom:
            secretKeyRef:
              name: rook-ceph-mon
              key: ceph-username
        - name: ROOK_CEPH_SECRET
          valueFrom:
            secretKeyRef:
              name: rook-ceph-mon
              key: ceph-secret
        - name: ROOK_CONFIG_DIR
          value: /var/lib/rook
        - name: ROOK_CEPH_CONFIG_OVERRIDE
          value: /etc/rook/config/<DOMAIN_677>
        - name: ROOK_FSID
          valueFrom:
            secretKeyRef:
              name: rook-ceph-mon
              key: fsid
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: <DOMAIN_162>
        - name: ROOK_CRUSHMAP_HOSTNAME
          value: <CLEANUP_HOST_4>
        - name: CEPH_VOLUME_DEBUG
          value: '1'
        - name: CEPH_VOLUME_SKIP_RESTORECON
          value: '1'
        - name: DM_DISABLE_UDEV
          value: '1'
        - name: ROOK_OSDS_PER_DEVICE
          value: '1'
        - name: ROOK_LOG_LEVEL
          value: DEBUG
        - name: ROOK_DATA_DEVICES
          value: '[{"id":"sda4","storeConfig":{"osdsPerDevice":1}}]'
        - name: ROOK_CEPH_VERSION
          value: ceph version 15.2.4-0 octopus
        resources: {}
        volumeMounts:
        - name: rook-data
          mountPath: /var/lib/rook
        - name: ceph-conf-emptydir
          mountPath: /etc/ceph
        - name: rook-ceph-log
          mountPath: /var/log/ceph
        - name: rook-ceph-crash
          mountPath: /var/lib/ceph/crash
        - name: devices
          mountPath: /dev
        - name: udev
          mountPath: /run/udev
        - name: rook-binaries
          mountPath: /rook
        - name: rootfs
          readOnly: true
          mountPath: /rootfs
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
        securityContext:
          privileged: true
          runAsUser: 0
          runAsNonRoot: false
          readOnlyRootFilesystem: false
      restartPolicy: OnFailure
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      nodeSelector:
        kubernetes.io/hostname: <CLEANUP_HOST_4>
      serviceAccountName: rook-ceph-osd
      serviceAccount: rook-ceph-osd
      securityContext: {}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: role
                operator: In
                values:
                - storage-ceph
      schedulerName: default-scheduler
apiVersion: batch/v1
kind: Job

        securityContext:
          privileged: true
          runAsUser: 0
          readOnlyRootFilesystem: false
      containers:
      - name: osd
        image: ceph/ceph:v15.2.4
        command:
        - ceph-osd
        args:
        - --foreground
        - --id
        - '0'
        - --fsid

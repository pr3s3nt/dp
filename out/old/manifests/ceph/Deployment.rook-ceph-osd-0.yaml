        command:
        - /bin/bash
        - -c
        - "\nset -ex\n\nOSD_ID=0\nOSD_UUID=f9408647-e722-47d6-b5a5-1f303885d7e1\n\
          OSD_STORE_FLAG=\"--bluestore\"\nOSD_DATA_DIR=/var/lib/ceph/osd/ceph-\"$OSD_ID\"\
          \nCV_MODE=lvm\nDEVICE=/dev/ceph-16bcdb8b-6cc7-43b2-973b-2513bfcfe8a7/osd-data-f06239da-ac8f-4738-8034-c22f1717ebc0\n\
          METADATA_DEVICE=\"$ROOK_METADATA_DEVICE\"\nWAL_DEVICE=\"$ROOK_WAL_DEVICE\"\
          \n\n# active the osd with ceph-volume\nif [[ \"$CV_MODE\" == \"lvm\" ]];\
          \ then\n\tTMP_DIR=$(mktemp -d)\n\n\t# activate osd\n\tceph-volume \"$CV_MODE\"\
          \ activate --no-systemd \"$OSD_STORE_FLAG\" \"$OSD_ID\" \"$OSD_UUID\"\n\n\
          \t# copy the tmpfs directory to a temporary directory\n\t# this is needed\
          \ because when the init container exits, the tmpfs goes away and its content\
          \ with it\n\t# this will result in the emptydir to be empty when accessed\
          \ by the main osd container\n\tcp --verbose --no-dereference \"$OSD_DATA_DIR\"\
          /* \"$TMP_DIR\"/\n\n\t# unmount the tmpfs since we don't need it anymore\n\
          \tumount \"$OSD_DATA_DIR\"\n\n\t# copy back the content of the tmpfs into\
          \ the original osd directory\n\tcp --verbose --no-dereference \"$TMP_DIR\"\
          /* \"$OSD_DATA_DIR\"\n\n\t# retain ownership of files to the ceph user/group\n\
          \tchown --verbose --recursive ceph:ceph \"$OSD_DATA_DIR\"\n\n\t# remove\
          \ the temporary directory\n\trm --recursive --force \"$TMP_DIR\"\nelse\n\
          \tARGS=(--device ${DEVICE} --no-systemd --no-tmpfs)\n\tif [ -n \"$METADATA_DEVICE\"\
          \ ]; then\n\t\tARGS+=(--<DOMAIN_679> ${METADATA_DEVICE})\n\tfi\n\tif [ -n\
          \ \"$WAL_DEVICE\" ]; then\n\t\tARGS+=(--<DOMAIN_680> ${WAL_DEVICE})\n\t\
          fi\n\t# ceph-volume raw mode only supports bluestore so we don't need to\
          \ pass a store flag\n\tceph-volume \"$CV_MODE\" activate \"${ARGS[@]}\"\n\
          fi\n\n"

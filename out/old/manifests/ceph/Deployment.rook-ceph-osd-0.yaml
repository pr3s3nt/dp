        - ceph
        - --setgroup
        - ceph
        - --crush-location=root=default host=<CLEANUP_HOST_4>
        - --log-to-stderr=true
        - --err-to-stderr=true
        - --mon-cluster-log-to-stderr=true
        - '--log-stderr-prefix=debug '
        - --default-log-to-file=false
        - --default-mon-cluster-log-to-file=false
        - --ms-learn-addr-from-peer=false
        env:
        - name: ROOK_NODE_NAME

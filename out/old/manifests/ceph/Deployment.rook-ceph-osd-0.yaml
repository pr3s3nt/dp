            memory: 5Gi
        volumeMounts:
        - name: activate-osd
          mountPath: /var/lib/ceph/osd/ceph-0
        - name: devices
          mountPath: /dev
        - name: rook-config-override
          readOnly: true
          mountPath: /etc/ceph
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
        securityContext:
          privileged: true

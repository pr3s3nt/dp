    protocol: TCP
    port: 8443
    targetPort: 8443
  selector:
    app: rook-ceph-mgr
    rook_cluster: ceph
  clusterIP: <IP_55>
  type: ClusterIP
  externalIPs:
  - <CLEANUP_IP_5>
  sessionAffinity: <REDACTED:env>

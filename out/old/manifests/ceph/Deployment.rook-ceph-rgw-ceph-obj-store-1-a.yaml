        - --keyring=/etc/ceph/keyring-store/keyring
        - --log-to-stderr=true
        - --err-to-stderr=true
        - --mon-cluster-log-to-stderr=true
        - '--log-stderr-prefix=debug '
        - --default-log-to-file=false
        - --default-mon-cluster-log-to-file=false
        - --mon-host=$(ROOK_CEPH_MON_HOST)
        - --mon-initial-members=$(ROOK_CEPH_MON_INITIAL_MEMBERS)
        - --id=<DOMAIN_686>.1.a
        - --setuser=ceph
        - --setgroup=ceph
        - --foreground
        - --rgw-frontends=beast port=8080
        - --host=$(POD_NAME)
        - --rgw-mime-types-file=/etc/ceph/rgw/<DOMAIN_143>
        - --rgw-realm=ceph-obj-store-1
        - --rgw-zonegroup=ceph-obj-store-1
        - --rgw-zone=ceph-obj-store-1
        env:
        - name: CONTAINER_IMAGE
          value: ceph/ceph:v15.2.4
        - name: POD_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: <DOMAIN_21>
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: <DOMAIN_20>
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: <DOMAIN_162>
        - name: POD_MEMORY_LIMIT
          valueFrom:
            resourceFieldRef:
              resource: <DOMAIN_168>
              divisor: '0'
        - name: POD_MEMORY_REQUEST
          valueFrom:
            resourceFieldRef:
              resource: <DOMAIN_171>
              divisor: '0'
        - name: POD_CPU_LIMIT
          valueFrom:
            resourceFieldRef:
              resource: <DOMAIN_167>
              divisor: '1'
        - name: POD_CPU_REQUEST
          valueFrom:
            resourceFieldRef:
              resource: <DOMAIN_170>
              divisor: '0'
        - name: ROOK_CEPH_MON_HOST
          valueFrom:
            secretKeyRef:
              name: rook-ceph-config
              key: mon_host
        - name: ROOK_CEPH_MON_INITIAL_MEMBERS
          valueFrom:
            secretKeyRef:
              name: rook-ceph-config
              key: mon_initial_members
        resources: {}
        volumeMounts:
        - name: rook-config-override
          readOnly: true
          mountPath: /etc/ceph
        - name: rook-ceph-rgw-ceph-obj-store-1-a-keyring
          readOnly: true
          mountPath: /etc/ceph/keyring-store/
        - name: rook-ceph-log
          mountPath: /var/log/ceph
        - name: rook-ceph-crash
          mountPath: /var/lib/ceph/crash
        - name: ceph-daemon-data
          mountPath: /var/lib/ceph/rgw/ceph-ceph-obj-store-1
        - name: rook-ceph-rgw-ceph-obj-store-1-mime-types
          readOnly: true
          mountPath: /etc/ceph/rgw
        livenessProbe:
          httpGet:
            path: /swift/healthcheck
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 10
          timeoutSeconds: 1
          periodSeconds: 10
          successThreshold: 1
          failureThreshold: 3
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
        securityContext:
          privileged: false
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      securityContext: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 50
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: rook-ceph-rgw
                  ceph_daemon_id: ceph-obj-store-1
                  rgw: ceph-obj-store-1
                  rook_cluster: ceph
                  rook_object_store: ceph-obj-store-1
              topologyKey: <DOMAIN_138>/hostname
      schedulerName: default-scheduler
      tolerations:
      - key: <DOMAIN_667>/unreachable
        operator: Exists
        effect: NoExecute
        tolerationSeconds: 5

spec:
  replicas: 1
  selector:
    matchLabels:
      app: rook-ceph-rgw
      ceph_daemon_id: ceph-obj-store-1
      rgw: ceph-obj-store-1
      rook_cluster: ceph
      rook_object_store: ceph-obj-store-1
  template:
    metadata:
      name: rook-ceph-rgw-ceph-obj-store-1-a
      labels:
        app: rook-ceph-rgw
        ceph_daemon_id: ceph-obj-store-1
        ceph_daemon_type: rgw
        rgw: ceph-obj-store-1
        rook_cluster: ceph
        rook_object_store: ceph-obj-store-1
    spec:
      volumes:
      - name: rook-config-override
        configMap:
          name: rook-config-override
          items:
          - key: config
            path: <DOMAIN_666>
            mode: 292
          defaultMode: 420
      - name: rook-ceph-rgw-ceph-obj-store-1-a-keyring
        secret:
          secretName: <REDACTED:env>
          defaultMode: 420
      - name: rook-ceph-log
        hostPath:
          path: /var/lib/rook/ceph/log
          type: ''
      - name: rook-ceph-crash
        hostPath:
          path: /var/lib/rook/ceph/crash
          type: ''
      - name: ceph-daemon-data
        emptyDir: {}
      - name: rook-ceph-rgw-ceph-obj-store-1-mime-types
        configMap:
          name: rook-ceph-rgw-ceph-obj-store-1-mime-types
          defaultMode: 420
      initContainers:
      - name: chown-container-data-dir
        image: ceph/ceph:v15.2.4
        command:
        - chown
        args:
        - --verbose
        - --recursive
        - ceph:ceph
        - /var/log/ceph
        - /var/lib/ceph/crash
        - /var/lib/ceph/rgw/ceph-ceph-obj-store-1
        resources: {}
        volumeMounts:
        - name: rook-config-override
          readOnly: true
          mountPath: /etc/ceph
        - name: rook-ceph-rgw-ceph-obj-store-1-a-keyring
          readOnly: true
          mountPath: /etc/ceph/keyring-store/
        - name: rook-ceph-log
          mountPath: /var/log/ceph
        - name: rook-ceph-crash
          mountPath: /var/lib/ceph/crash
        - name: ceph-daemon-data
          mountPath: /var/lib/ceph/rgw/ceph-ceph-obj-store-1
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
        securityContext:
          privileged: false
      containers:

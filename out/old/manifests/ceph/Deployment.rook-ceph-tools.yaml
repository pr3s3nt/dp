metadata:
  name: rook-ceph-tools
  namespace: ceph
  labels:
    app: rook-ceph-tools
  annotations: {}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rook-ceph-tools
  template:
    metadata:
      labels:
        app: rook-ceph-tools
    spec:
      volumes:
      - name: mon-endpoint-volume
        configMap:
          name: rook-ceph-mon-endpoints
          items:
          - key: data
            path: mon-endpoints
          defaultMode: 420
      - name: ceph-config
        emptyDir: {}
      containers:
      - name: rook-ceph-tools
        image: rook/ceph:v1.4.2
        command:
        - /tini
        args:
        - -g
        - --
        - /usr/local/bin/<DOMAIN_687>
        env:
        - name: ROOK_CEPH_USERNAME
          valueFrom:
            secretKeyRef:
              name: rook-ceph-mon
              key: ceph-username
        - name: ROOK_CEPH_SECRET
          valueFrom:
            secretKeyRef:
              name: rook-ceph-mon
              key: ceph-secret
        resources: {}
        volumeMounts:
        - name: ceph-config
          mountPath: /etc/ceph
        - name: mon-endpoint-volume
          mountPath: /etc/rook
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirstWithHostNet
      securityContext: {}
      schedulerName: default-scheduler
      tolerations:
      - key: <DOMAIN_667>/unreachable
        operator: Exists
        effect: NoExecute
        tolerationSeconds: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
apiVersion: apps/v1
kind: Deployment

metadata:
  name: face-reco-be
  namespace: face-reco
  labels:
    appname: face-reco
  annotations: {}
spec:
  replicas: 0
  selector:
    matchLabels:
      app: face-reco-be
  template:
    metadata:
      labels:
        app: face-reco-be
    spec:
      volumes:
      - name: face-reco-be-storage
        hostPath:
          path: /sservices/FaceReco/be_storage
          type: DirectoryOrCreate
      - name: face-reco-be-log
        hostPath:
          path: /sservices/FaceReco/be_logs
          type: DirectoryOrCreate
      - name: tz-config
        hostPath:
          path: /usr/share/zoneinfo/Asia/Ho_Chi_Minh
          type: ''
      containers:
      - name: face-reco-be
        image: <COMPANY>-<DOMAIN_607>/face_reco/prod_<COMPANY>/face_reco_be:v1.0.5.0-<COMPANY>
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        envFrom:
        - secretRef:
            name: face-reco-be-secret
        env:
        - name: TZ
          value: Asia/Ho_Chi_Minh
        resources: {}
        volumeMounts:
        - name: face-reco-be-storage
          mountPath: /var/share
        - name: face-reco-be-log
          mountPath: /usr/local/tomcat/logs
        - name: tz-config
          mountPath: /etc/localtime
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      nodeSelector:
        acs: 'yes'
      securityContext: {}
      imagePullSecrets:
      - name: regcred-bart
      schedulerName: default-scheduler
      tolerations:
      - key: service
        operator: Equal
        value: acs
        effect: NoSchedule
  strategy:
    type: Recreate
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
apiVersion: apps/v1
kind: Deployment

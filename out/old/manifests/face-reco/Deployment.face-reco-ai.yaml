metadata:
  name: face-reco-ai
  namespace: face-reco
  labels:
    app.kubernetes.io/managed-by: spinnaker
    app.kubernetes.io/name: face
    appname: face-reco
  annotations:
    artifact.spinnaker.io/location: <REDACTED:env>
    artifact.spinnaker.io/name: <REDACTED:env>
    artifact.spinnaker.io/type: <REDACTED:env>
    moniker.spinnaker.io/application: <REDACTED:env>
    moniker.spinnaker.io/cluster: <REDACTED:env>
spec:
  replicas: 0
  selector:
    matchLabels:
      app: face-reco-ai
  template:
    metadata:
      labels:
        app: face-reco-ai
        app.kubernetes.io/managed-by: spinnaker
        app.kubernetes.io/name: face
      annotations:
        artifact.spinnaker.io/location: <REDACTED:env>
        artifact.spinnaker.io/name: <REDACTED:env>
        artifact.spinnaker.io/type: <REDACTED:env>
        moniker.spinnaker.io/application: <REDACTED:env>
        moniker.spinnaker.io/cluster: <REDACTED:env>
    spec:
      volumes:
      - name: face-reco-ai-model
        hostPath:
          path: /sservices/FaceReco/ai_model
          type: DirectoryOrCreate
      - name: face-reco-ai-train-data
        hostPath:
          path: /sservices/FaceReco/ai_train_data
          type: DirectoryOrCreate
      - name: tz-config
        hostPath:
          path: /usr/share/zoneinfo/Asia/Ho_Chi_Minh
          type: ''
      initContainers:
      - name: init-cp-data
        image: <COMPANY>-<DOMAIN_690>/face_reco/prod_<COMPANY>/face_reco_ai:v1.0.3-<COMPANY>
        command:
        - sh
        - -c
        - cp -R /apps/<DOMAIN_691>/* /temp_model && cp -R /apps/2.train_data/* /temp_train_data
        resources: {}
        volumeMounts:
        - name: face-reco-ai-model
          mountPath: /temp_model
        - name: face-reco-ai-train-data
          mountPath: /temp_train_data
        - name: tz-config
          mountPath: /etc/localtime
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      containers:
      - name: face-reco-ai
        image: <COMPANY>-<DOMAIN_690>/face_reco/prod_<COMPANY>/face_reco_ai:v1.0.3-<COMPANY>
        envFrom:
        - configMapRef:
            name: face-reco-ai-cm
        env:
        - name: TZ
          value: Asia/Ho_Chi_Minh
        resources:
          limits:
            cpu: '6'
            memory: 12Gi
          requests:
            cpu: '1'
            memory: 2Gi
        volumeMounts:
        - name: face-reco-ai-model
          mountPath: /apps/<DOMAIN_691>
        - name: face-reco-ai-train-data
          mountPath: /apps/2.train_data
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      nodeSelector:
        acs: 'yes'
      securityContext: {}
      imagePullSecrets:
      - name: regcred
      schedulerName: default-scheduler
      tolerations:
      - key: service
        operator: Equal
        value: acs
        effect: NoSchedule
  strategy:
    type: Recreate
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
apiVersion: apps/v1
kind: Deployment

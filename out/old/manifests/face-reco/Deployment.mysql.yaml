metadata:
  name: mysql
  namespace: face-reco
  labels:
    appname: face-reco
  annotations: {}
spec:
  replicas: 0
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      volumes:
      - name: mysql-config
        configMap:
          name: mysql-cm
          defaultMode: 420
      - name: mysql-storage
        hostPath:
          path: /sservices/FaceReco/mysql_data
          type: DirectoryOrCreate
      - name: tz-config
        hostPath:
          path: /usr/share/zoneinfo/Asia/Ho_Chi_Minh
          type: ''
      containers:
      - name: mysql
        image: <COMPANY>-<DOMAIN_690>/face_reco/mysql:5.7.35
        args:
        - --ignore-db-dir=lost+found
        ports:
        - name: default
          containerPort: 3306
          protocol: TCP
        envFrom:
        - secretRef:
            name: mysql-secret
        env:
        - name: TZ
          value: Asia/Ho_Chi_Minh
        resources: {}
        volumeMounts:
        - name: mysql-storage
          mountPath: /var/lib/mysql
        - name: mysql-config
          mountPath: /etc/mysql/<DOMAIN_692>.d/<DOMAIN_693>
          subPath: <DOMAIN_693>
        - name: tz-config
          mountPath: /etc/localtime
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      nodeSelector:
        acs: 'yes'
      securityContext: {}
      imagePullSecrets:
      - name: regcred
      schedulerName: default-scheduler
      tolerations:
      - key: service
        operator: Equal
        value: acs
        effect: NoSchedule
  strategy:
    type: Recreate
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
apiVersion: apps/v1
kind: Deployment

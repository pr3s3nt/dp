metadata:
  name: rancher-logging-fluentd-linux
  namespace: cattle-logging
  labels:
    app: fluentd
    chart: fluentd-0.0.2
    heritage: Tiller
    io.cattle.field/appId: rancher-logging
    release: rancher-logging
  annotations:
    deprecated.daemonset.template.generation: '3'
spec:
  selector:
    matchLabels:
      app: fluentd
      release: rancher-logging
  template:
    metadata:
      labels:
        app: fluentd
        chart: fluentd-0.0.2
        heritage: Tiller
        release: rancher-logging
    spec:
      volumes:
      - name: custom
        hostPath:
          path: /var/lib/rancher/fluentd/etc/config/custom
          type: ''
      - name: dockerroot
        hostPath:
          path: /var/lib/docker
          type: ''
      - name: varlogcontainers
        hostPath:
          path: /var/log/containers
          type: ''
      - name: varlogpods
        hostPath:
          path: /var/log/pods
          type: ''
      - name: rkelog
        hostPath:
          path: /var/lib/rancher/rke/log
          type: ''
      - name: customlog
        hostPath:
          path: /var/lib/rancher/log-volumes
          type: ''
      - name: fluentdlog
        hostPath:
          path: /var/lib/rancher/fluentd/log
          type: ''
      - name: config
        secret:
          secretName: <REDACTED:env>
          defaultMode: 420
      - name: entry
        secret:
          secretName: <REDACTED:env>
          defaultMode: 420
      - name: ssl
        secret:
          secretName: <REDACTED:env>
          defaultMode: 420
      - name: libsystemddir
        hostPath:
          path: /usr/lib64
          type: ''
      containers:
      - name: rancher-logging-fluentd
        image: rancher/fluentd:v0.1.19
        command:
        - fluentd
        - -c
        - /fluentd/etc/config/entry/<DOMAIN_558>
        ports:
        - name: metric
          containerPort: 24231
          protocol: TCP
        env:
        - name: K8S_NODE_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: <DOMAIN_162>
        resources: {}
        volumeMounts:
        - name: custom
          mountPath: /fluentd/etc/config/custom
        - name: config
          mountPath: /fluentd/etc/config/precan
        - name: entry
          mountPath: /fluentd/etc/config/entry
        - name: ssl
          mountPath: /fluentd/etc/config/ssl
        - name: dockerroot
          mountPath: /var/lib/docker
        - name: varlogcontainers
          mountPath: /var/log/containers
        - name: varlogpods
          mountPath: /var/log/pods
        - name: rkelog
          mountPath: /var/lib/rancher/rke/log
        - name: customlog
          mountPath: /var/lib/rancher/log-volumes
        - name: fluentdlog
          mountPath: /fluentd/log
        - name: libsystemddir
          readOnly: true
          mountPath: /host/lib
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - "LIVENESS_THRESHOLD_SECONDS=${LIVENESS_THRESHOLD_SECONDS:-300}; STUCK_THRESHOLD_SECONDS=${LIVENESS_THRESHOLD_SECONDS:-900};\
              \ if [ ! -e /fluentd/log/buffer ]; then\n  exit 1;\nfi; touch -d \"\
              ${STUCK_THRESHOLD_SECONDS} seconds ago\" /tmp/marker-stuck; if [[ -z\
              \ \"$(find /fluentd/log/buffer -type f -newer /tmp/marker-stuck -print\
              \ -quit)\" ]]; then\n  rm -rf /fluentd/log/buffer;\n  exit 1;\nfi; touch\
              \ -d \"${LIVENESS_THRESHOLD_SECONDS} seconds ago\" /tmp/marker-liveness;\
              \ if [[ -z \"$(find /fluentd/log/buffer -type f -newer /tmp/marker-liveness\
              \ -print -quit)\" ]]; then\n  exit 1;\nfi;\n"
          initialDelaySeconds: 600
          timeoutSeconds: 1
          periodSeconds: 60
          successThreshold: 1
          failureThreshold: 3
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      - name: rancher-logging-fluentd-reloader
        image: rancher/configmap-reload:v0.3.0-rancher2
        args:
        - --volume-dir=/fluentd/etc/config/custom
        - --volume-dir=/fluentd/etc/config/precan
        - --volume-dir=/fluentd/etc/config/ssl
        - --volume-dir=/fluentd/etc/config/entry
        - --webhook-method=GET
        - --webhook-url=http://127.0.0.1:24444/api/<DOMAIN_559>
        resources: {}
        volumeMounts:
        - name: custom
          mountPath: /fluentd/etc/config/custom
        - name: config
          mountPath: /fluentd/etc/config/precan
        - name: entry
          mountPath: /fluentd/etc/config/entry
        - name: ssl
          mountPath: /fluentd/etc/config/ssl
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      nodeSelector:
        kubernetes.io/os: linux
      serviceAccountName: rancher-logging-fluentd
      serviceAccount: rancher-logging-fluentd
      securityContext: {}
      schedulerName: default-scheduler
      tolerations:
      - operator: Exists
        effect: NoSchedule
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  revisionHistoryLimit: 10
apiVersion: apps/v1
kind: DaemonSet

metadata:
  name: rancher-logging-log-aggregator-linux
  namespace: cattle-logging
  labels:
    app: log-aggregator
    chart: log-aggregator-0.0.1
    heritage: Tiller
    io.cattle.field/appId: rancher-logging
    release: rancher-logging
  annotations:
    deprecated.daemonset.template.generation: '3'
spec:
  selector:
    matchLabels:
      app: log-aggregator
      release: rancher-logging
  template:
    metadata:
      labels:
        app: log-aggregator
        chart: log-aggregator-0.0.1
        release: rancher-logging
    spec:
      volumes:
      - name: flexvolume-driver
        hostPath:
          path: /usr/libexec/kubernetes/kubelet-plugins/volume/exec
          type: ''
      containers:
      - name: log-aggregator
        image: rancher/log-aggregator:v0.1.6
        resources: {}
        volumeMounts:
        - name: flexvolume-driver
          mountPath: /flexmnt
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      restartPolicy: Always
      terminationGracePeriodSeconds: 10
      dnsPolicy: ClusterFirst
      nodeSelector:
        kubernetes.io/os: linux
      serviceAccountName: rancher-logging-log-aggregator
      serviceAccount: rancher-logging-log-aggregator
      securityContext: {}
      schedulerName: default-scheduler
      tolerations:
      - operator: Exists
        effect: NoSchedule
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  revisionHistoryLimit: 10
apiVersion: apps/v1
kind: DaemonSet

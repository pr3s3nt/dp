metadata:
  name: spin-orca
  namespace: spinnaker
  labels:
    app: spin
    app.kubernetes.io/managed-by: halyard
    app.kubernetes.io/name: orca
    app.kubernetes.io/part-of: spinnaker
    app.kubernetes.io/version: local1.21.3
    cluster: spin-orca
  annotations:
    moniker.spinnaker.io/application: <REDACTED:env>
    moniker.spinnaker.io/cluster: <REDACTED:env>
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spin
      cluster: spin-orca
  template:
    metadata:
      labels:
        app: spin
        app.kubernetes.io/managed-by: halyard
        app.kubernetes.io/name: orca
        app.kubernetes.io/part-of: spinnaker
        app.kubernetes.io/version: local1.21.3
        cluster: spin-orca
    spec:
      volumes:
      - name: spin-orca-files-771631936
        secret:
          secretName: <REDACTED:env>
          defaultMode: 420
      - name: spin-orca-files-795629369
        secret:
          secretName: <REDACTED:env>
          defaultMode: 420
      containers:
      - name: orca
        image: <COMPANY>-<DOMAIN_607>/spinnaker/orca:2.15.2-20200806164929
        ports:
        - containerPort: 8083
          protocol: TCP
        env:
        - name: JAVA_OPTS
          value: -XX:MaxRAMPercentage=50.0
        - name: SPRING_PROFILES_ACTIVE
          value: local
        resources: {}
        volumeMounts:
        - name: spin-orca-files-771631936
          mountPath: /opt/spinnaker/config
        - name: spin-orca-files-795629369
          mountPath: /opt/spinnaker/scripts
        readinessProbe:
          exec:
            command:
            - wget
            - --no-check-certificate
            - --spider
            - -q
            - http://localhost:8083/health
          timeoutSeconds: 1
          periodSeconds: 10
          successThreshold: 1
          failureThreshold: 3
        lifecycle:
          preStop:
            exec:
              command:
              - bash
              - /opt/spinnaker/scripts/<DOMAIN_702>
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      restartPolicy: Always
      terminationGracePeriodSeconds: 60
      dnsPolicy: ClusterFirst
      securityContext: {}
      imagePullSecrets:
      - name: registrypullsecret
      affinity: {}
      schedulerName: default-scheduler
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
apiVersion: apps/v1
kind: Deployment

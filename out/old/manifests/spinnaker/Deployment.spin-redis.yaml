metadata:
  name: spin-redis
  namespace: spinnaker
  labels:
    app: spin
    app.kubernetes.io/managed-by: halyard
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: spinnaker
    app.kubernetes.io/version: local1.21.3
    cluster: spin-redis
  annotations:
    moniker.spinnaker.io/application: <REDACTED:env>
    moniker.spinnaker.io/cluster: <REDACTED:env>
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spin
      cluster: spin-redis
  template:
    metadata:
      labels:
        app: spin
        app.kubernetes.io/managed-by: halyard
        app.kubernetes.io/name: redis
        app.kubernetes.io/part-of: spinnaker
        app.kubernetes.io/version: local1.21.3
        cluster: spin-redis
    spec:
      containers:
      - name: redis
        image: <COMPANY>-<DOMAIN_607>/spinnaker/redis-cluster:v2
        ports:
        - containerPort: 6379
          protocol: TCP
        env:
        - name: MASTER
          value: 'true'
        resources: {}
        readinessProbe:
          tcpSocket:
            port: 6379
          timeoutSeconds: 1
          periodSeconds: 10
          successThreshold: 1
          failureThreshold: 3
        lifecycle: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      restartPolicy: Always
      terminationGracePeriodSeconds: 60
      dnsPolicy: ClusterFirst
      securityContext: {}
      imagePullSecrets:
      - name: registrypullsecret
      affinity: {}
      schedulerName: default-scheduler
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
apiVersion: apps/v1
kind: Deployment

      cluster: spin-front50
  template:
    metadata:
      labels:
        app: spin
        app.kubernetes.io/managed-by: halyard
        app.kubernetes.io/name: front50
        app.kubernetes.io/part-of: spinnaker
        app.kubernetes.io/version: local1.21.3
        cluster: spin-front50
    spec:
      volumes:
      - name: spin-front50-files-1822566069
        secret:
          secretName: <REDACTED:env>
          defaultMode: 420
      - name: spin-front50-files-1253799442
        secret:
          secretName: <REDACTED:env>
          defaultMode: 420
      containers:
      - name: front50
        image: <COMPANY>-<DOMAIN_607>/spinnaker/front50:0.24.0-20200625140019

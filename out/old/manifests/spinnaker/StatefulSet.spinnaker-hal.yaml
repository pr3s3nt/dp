metadata:
  name: spinnaker-hal
  namespace: spinnaker
  annotations: {}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spinnaker-hal
  template:
    metadata:
      labels:
        app: spinnaker-hal
    spec:
      volumes:
      - name: halyard-read-bom
        configMap:
          name: halyard-read-bom
          defaultMode: 420
      - name: spinnaker-hal-persistent-storage
        persistentVolumeClaim:
          claimName: halyard-storage
      - name: spinnaker-kube-persistent-storage
        persistentVolumeClaim:
          claimName: kube-storage
      containers:
      - name: spinnaker-halyard
        image: <COMPANY>-<DOMAIN_607>/spinnaker/halyard:stable
        resources: {}
        volumeMounts:
        - name: spinnaker-hal-persistent-storage
          mountPath: /home/spinnaker/.hal
        - name: spinnaker-kube-persistent-storage
          mountPath: /home/spinnaker/.kube
        - name: halyard-read-bom
          readOnly: true
          mountPath: /opt/spinnaker/config/<DOMAIN_760>
          subPath: <DOMAIN_760>
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      securityContext: {}
      imagePullSecrets:
      - name: registrypullsecret
      schedulerName: default-scheduler
  serviceName: spinnaker-hal
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0
  revisionHistoryLimit: 10
apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: feedback360-backend
  namespace: feedback360
  annotations:
    field.cattle.io/publicEndpoints: '[{"addresses":["<IP_72>"],"port":80,"protocol":"HTTP","serviceName":"feedback360:feedback360-be-service","ingressName":"feedback360:feedback360","hostname":"<DOMAIN_556>.<COMPANY_DOMAIN>","path":"/","allNodes":false}]'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: feedback360-backend
  template:
    metadata:
      labels:
        app: feedback360-backend
    spec:
      containers:
      - name: feedback360-be
        image: artifactory.<COMPANY><DOMAIN_14>:30807/docker-local/feedback360/backend/backend_9:latest
        env:
        - name: NODE_ENV
          valueFrom:
            secretKeyRef:
              name: be-secret
              key: NODE_ENV
        - name: PORT
          valueFrom:
            secretKeyRef:
              name: be-secret
              key: PORT
        - name: FRONTEND_URL
          valueFrom:
            secretKeyRef:
              name: be-secret
              key: FRONTEND_URL
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: be-secret
              key: DATABASE_URL
        - name: DEFAULT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: be-secret
              key: DEFAULT_PASSWORD
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: be-secret
              key: JWT_SECRET
        - name: JWT_EXPIRES_IN
          valueFrom:
            secretKeyRef:
              name: be-secret
              key: JWT_EXPIRES_IN
        - name: KEYCLOAK_URL
          valueFrom:
            secretKeyRef:
              name: be-secret
              key: KEYCLOAK_URL
        - name: KEYCLOAK_REALM
          valueFrom:
            secretKeyRef:
              name: be-secret
              key: KEYCLOAK_REALM
        - name: KEYCLOAK_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: be-secret
              key: KEYCLOAK_CLIENT_ID
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      securityContext: {}
      imagePullSecrets:
      - name: jfrog-registry-secret
      schedulerName: default-scheduler
  strategy:
    type: Recreate
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
apiVersion: apps/v1
kind: Deployment

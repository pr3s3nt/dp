metadata:
  name: grafana
  namespace: svms
  labels:
    app: grafana
  annotations:
    field.cattle.io/publicEndpoints: '[{"addresses":["<IP_72>"],"port":80,"protocol":"HTTP","serviceName":"svms:grafana-svc","ingressName":"svms:svms-ingress","hostname":"svms.<COMPANY><DOMAIN_14>","path":"/","allNodes":false}]'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      volumes:
      - name: config
        configMap:
          name: grafana-ini
          defaultMode: 420
      containers:
      - name: grafana
        image: <COMPANY>-<DOMAIN_607>/svms/grafana:6.4.3
        ports:
        - name: grafana
          containerPort: 3000
          protocol: TCP
        resources: {}
        volumeMounts:
        - name: config
          mountPath: /etc/grafana/
        - name: plugin-volume
          mountPath: /var/lib/grafana/plugins
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      securityContext:
        fsGroup: 472
      imagePullSecrets:
      - name: registrypullsecret
      schedulerName: default-scheduler
  volumeClaimTemplates:
  - kind: PersistentVolumeClaim
    apiVersion: v1
    metadata:
      name: plugin-volume
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi
      storageClassName: ceph-block-replica-2
      volumeMode: Filesystem
  serviceName: grafana
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  revisionHistoryLimit: 10
apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: alertmanager
  namespace: svms
  labels:
    app: alertmanager
  annotations: {}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      volumes:
      - name: config-volume
        configMap:
          name: alertmanager-config
          defaultMode: 420
      containers:
      - name: prometheus-alertmanager
        image: <COMPANY>-<DOMAIN_607>/svms/alertmanager:0.19.0
        args:
        - --<DOMAIN_722>=/etc/config/<DOMAIN_761>
        - --<DOMAIN_762>=/data
        - --<DOMAIN_560>-address=:9093
        - --<DOMAIN_728>-prefix=/
        - --<DOMAIN_763>=debug
        ports:
        - name: http
          containerPort: 9093
          protocol: TCP
        resources: {}
        volumeMounts:
        - name: config-volume
          mountPath: /etc/config
        - name: alertmanager-data
          mountPath: /data
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      securityContext:
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
      imagePullSecrets:
      - name: registrypullsecret
      schedulerName: default-scheduler
  volumeClaimTemplates:
  - kind: PersistentVolumeClaim
    apiVersion: v1
    metadata:
      name: alertmanager-data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi
      storageClassName: ceph-block-replica-2
      volumeMode: Filesystem
  serviceName: alertmanager
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  revisionHistoryLimit: 10
apiVersion: apps/v1
kind: StatefulSet

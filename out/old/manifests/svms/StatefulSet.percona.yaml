metadata:
  name: percona
  namespace: svms
  labels:
    app: percona
    chart: pmm-server-2.26.1
    heritage: Helm
    release: percona
  annotations: {}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: percona
      component: pmm
  template:
    metadata:
      labels:
        app: percona
        component: pmm
    spec:
      containers:
      - name: percona
        image: <COMPANY>-<DOMAIN_607>/percona/pmm-server:2.26.0
        command:
        - bash
        args:
        - -c
        - "set -ex\n\n\nif [[ $EUID != 1000 ]]; then\n    # logrotate requires UID\
          \ in /etc/passwd\n    sed -e \"s^x:1000:^x:$EUID:^\" /etc/passwd > /tmp/passwd\n\
          \    cat /tmp/passwd > /etc/passwd\n    rm -rf /tmp/passwd\nfi\nif [ ! -f\
          \ /pmmdata/app-init ]; then\n    # the PV hasn't been initialized, so copy\
          \ over default\n    # pmm-server directories before symlinking\n    mkdir\
          \ -p /pmmdata\n\n    rsync -a --owner=$EUID /<COMPANY>/prometheus/data/\
          \  /pmmdata/prometheus-data/\n    rsync -a --owner=$EUID /<COMPANY>/prometheus/rules/\
          \ /pmmdata/prometheus-rules/\n    rsync -a --owner=$EUID /<COMPANY>/postgres/\
          \         /pmmdata/postgres/\n    rsync -a --owner=$EUID /<COMPANY>/grafana/\
          \          /pmmdata/grafana/\n    rsync -a --owner=$EUID /<COMPANY>/clickhouse/\
          \       /pmmdata/clickhouse/\n    rsync -a --owner=$EUID /<COMPANY>/victoriametrics/\
          \  /pmmdata/victoriametrics/\n\n    # initialize the PV and then mark it\
          \ complete\n    touch /pmmdata/app-init\nfi\n\n# remove the default directories\
          \ so we can symlink the\n# existing PV directories\nrm -Rf /<COMPANY>/prometheus/data\n\
          rm -Rf /<COMPANY>/prometheus/rules\nrm -Rf /<COMPANY>/postgres\nrm -Rf /<COMPANY>/grafana\n\
          rm -Rf /<COMPANY>/clickhouse\nrm -Rf /<COMPANY>/victoriametrics\n\n# symlink\
          \ pmm-server paths to point to our PV\nln -s /pmmdata/prometheus-data  /<COMPANY>/prometheus/data\n\
          ln -s /pmmdata/prometheus-rules /<COMPANY>/prometheus/rules\nln -s /pmmdata/postgres\
          \         /<COMPANY>/\nln -s /pmmdata/grafana          /<COMPANY>/\nln -s\
          \ /pmmdata/clickhouse       /<COMPANY>/\nln -s /pmmdata/victoriametrics\
          \  /<COMPANY>/\n\nsed -ri \"s/(^log_directory = ).*/\\1\\'\\/<COMPANY>\\\
          /logs\\'/g\" /pmmdata/postgres/<DOMAIN_764>\nchmod 700 /pmmdata/postgres\n\
          \n\n\n\nln -s /<COMPANY>/grafana /usr/share/grafana/data\n\nbash -x /opt/<DOMAIN_619>\n"
        ports:
        - name: https
          containerPort: 443
          protocol: TCP
        env:
        - name: DISABLE_UPDATES
          value: 'true'
        - name: METRICS_RESOLUTION
          value: 1s
        - name: METRICS_RETENTION
          value: 720h
        - name: QUERIES_RETENTION
          value: '8'
        - name: METRICS_MEMORY
          value: '600000'
        - name: ADMIN_PASSWORD
          value: <REDACTED:env>
        resources:
          limits:
            cpu: '3'
            memory: 8Gi
          requests:
            cpu: '1'
            memory: 4Gi
        volumeMounts:
        - name: pmmdata
          mountPath: /pmmdata
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      serviceAccountName: default
      serviceAccount: default
      securityContext:
        supplementalGroups:
        - 1000
        fsGroup: 1000
      imagePullSecrets:
      - name: registrypullsecret
      schedulerName: default-scheduler
  volumeClaimTemplates:
  - kind: PersistentVolumeClaim
    apiVersion: v1
    metadata:
      name: pmmdata
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 200Gi
      storageClassName: ceph-block-replica-2
      volumeMode: Filesystem
  serviceName: percona
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  revisionHistoryLimit: 10
apiVersion: apps/v1
kind: StatefulSet

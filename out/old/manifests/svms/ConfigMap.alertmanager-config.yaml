metadata:
  name: alertmanager-config
  namespace: svms
  annotations: {}
data:
  alertmanager.yml: "global: null\nreceivers:\n- name: \"alerta\"\n  webhook_configs:\n\
    \  - url: 'http://alerta-web-svc:38080/api/webhooks/prometheus'\n    send_resolved:\
    \ true\n    http_config:\n      basic_auth:\n        username: admin\n       \
    \ password: <REDACTED:password>\n- name: \"alert-email\"\n  email_configs:\n  - send_resolved:\
    \ true\n    to: <EMAIL_2>\n    from: <COMPANY><EMAIL_3>\n    smarthost: <CLEANUP_IP_4>:9906\n\
    \    auth_username: gateway/svms_admin\n    auth_password: <REDACTED:password>\n- name: \"\
    slack-notification\"\n  slack_configs:\n  - send_resolved: true\n    channel:\
    \ svms-ops-noti\n    api_url: https://<DOMAIN_502>/services/<REDACTED:slack-token>\
    \ \n    http_config:\n      tls_config:\n        insecure_skip_verify: true\n\
    \      proxy_url: 'http://<CLEANUP_IP_13>:3128'\n    title: |-\n      [{{ .Status\
    \ | toUpper }}{{ if eq .Status \"firing\" }}:{{ .<DOMAIN_503> | len }}{{ end }}]\
    \ {{ .<DOMAIN_504> }} for {{ .<DOMAIN_505> }}\n      {{- if gt (len .CommonLabels)\
    \ (len .GroupLabels) -}}\n        {{\" \"}}(\n        {{- with .<DOMAIN_506> .<DOMAIN_507>\
    \ }}\n          {{- range $index, $label := .SortedPairs -}}\n            {{ if\
    \ $index }}, {{ end }}\n            {{- $<DOMAIN_508> }}=\"{{ $<DOMAIN_509> -}}\"\
    \n          {{- end }}\n        {{- end -}}\n        )\n      {{- end }}\n   \
    \ text: >-\n      {{ with index .Alerts 0 -}}\n        :chart_with_upwards_trend:\
    \ *<{{ .GeneratorURL }}|Graph>*\n        {{- if .<DOMAIN_510> }}   :notebook:\
    \ *<{{ .<DOMAIN_510> }}|Runbook>*{{ end }}\n      {{ end }}\n\n      *Alert details*:\n\
    \n      {{ range .Alerts -}}\n        *Alert:* {{ .<DOMAIN_511> }}{{ if .<DOMAIN_512>\
    \ }} - `{{ .<DOMAIN_512> }}`{{ end }}\n      *Description:* {{ .<DOMAIN_513> }}\n\
    \      *Details:*\n        {{ range .<DOMAIN_514> }} • *{{ .Name }}:* `{{ .Value\
    \ }}`\n        {{ end }}\n      {{ end }}\nroute:\n  receiver: \"slack-notification\"\
    \n  group_interval: 10s\n  group_wait: 10s\n  repeat_interval: 4h\n#  routes:\n\
    #  - receiver: \"alert-email\"\n#    group_interval: 10s\n#    group_wait: 10s\n\
    #    repeat_interval: 10s\n"
apiVersion: v1
kind: ConfigMap

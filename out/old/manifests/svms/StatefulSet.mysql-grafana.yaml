metadata:
  name: mysql-grafana
  namespace: svms
  annotations: {}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql-grafana
  template:
    metadata:
      labels:
        app: mysql-grafana
    spec:
      containers:
      - name: mysql-grafana
        image: <COMPANY>-<DOMAIN_607>/svms/mysql:5.6
        ports:
        - name: mysql
          containerPort: 3306
          protocol: TCP
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-root-password
              key: password
        - name: MYSQL_DATABASE
          value: grafana
        - name: MYSQL_USER
          valueFrom:
            secretKeyRef:
              name: mysql-grafana-password
              key: username
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-grafana-password
              key: password
        resources: {}
        volumeMounts:
        - name: mysql-grafana
          mountPath: /var/lib/mysql
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      - name: mysql-exporter-grafana
        image: <COMPANY>-<DOMAIN_607>/svms/mysqld-exporter:dev
        args:
        - --collect.info_schema.processlist
        - --collect.info_schema.innodb_metrics
        - --collect.info_schema.tablestats
        - --collect.info_schema.tables
        - --collect.info_schema.userstats
        - --collect.engine_innodb_status
        ports:
        - name: mysql-exporter
          containerPort: 9104
          protocol: TCP
        env:
        - name: DATA_SOURCE_NAME
          valueFrom:
            secretKeyRef:
              name: mysql-exporter-password
              key: password
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      securityContext: {}
      imagePullSecrets:
      - name: registrypullsecret
      schedulerName: default-scheduler
  volumeClaimTemplates:
  - kind: PersistentVolumeClaim
    apiVersion: v1
    metadata:
      name: mysql-grafana
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi
      storageClassName: ceph-block-replica-2
      volumeMode: Filesystem
  serviceName: mysql-grafana
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0
  revisionHistoryLimit: 10
apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: mongodb-cleanup-backup
  namespace: shift-handover
  annotations: {}
spec:
  schedule: 0 19 * * *
  concurrencyPolicy: Allow
  suspend: false
  jobTemplate:
    metadata: {}
    spec:
      template:
        metadata: {}
        spec:
          volumes:
          - name: backup-storage
            persistentVolumeClaim:
              claimName: mongodb-backup-pvc
          containers:
          - name: cleanup
            image: artifactory.<COMPANY><DOMAIN_14>:30807/docker-local/fb360/base-images/mongo:6.0.5
            command:
            - /bin/sh
            - -c
            - 'echo "Starting backup cleanup at $(date)"

              echo "Removing backups older than 7 days..."


              # Đếm số backup trước khi cleanup

              echo "Backups before cleanup:"

              ls -la /backup/ | grep backup- | wc -l


              # Xóa các backup cũ hơn 7 ngày

              find /backup -name "backup-*" -type d -mtime +7 -exec rm -rf {} + 2>/dev/null
              || true


              echo "Cleanup completed"

              echo "Backups remaining:"

              ls -la /backup/ | grep backup-

              '
            resources: {}
            volumeMounts:
            - name: backup-storage
              mountPath: /backup
            terminationMessagePath: /dev/termination-log
            terminationMessagePolicy: File
            imagePullPolicy: IfNotPresent
          restartPolicy: OnFailure
          terminationGracePeriodSeconds: 30
          dnsPolicy: ClusterFirst
          securityContext: {}
          imagePullSecrets:
          - name: secret-registry-image
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                - matchExpressions:
                  - key: <DOMAIN_138>/hostname
                    operator: In
                    values:
                    - <CLEANUP_HOST_4>
          schedulerName: default-scheduler
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
apiVersion: batch/v1beta1
kind: CronJob

metadata:
  name: prometheus-operated
  namespace: cattle-prometheus
  labels:
    monitoring.coreos.com: 'true'
    operated-prometheus: 'true'
spec:
  ports:
  - name: web
    protocol: TCP
    port: 9090
    targetPort: web
  selector:
    app: prometheus
  clusterIP: None
  type: ClusterIP
  sessionAffinity: <REDACTED:env>
apiVersion: v1
kind: Service

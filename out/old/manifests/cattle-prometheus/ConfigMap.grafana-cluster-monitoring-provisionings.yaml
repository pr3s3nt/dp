metadata:
  name: grafana-cluster-monitoring-provisionings
  namespace: cattle-prometheus
  labels:
    app: grafana
    chart: grafana-0.0.1
    heritage: Tiller
    io.cattle.field/appId: cluster-monitoring
    release: cluster-monitoring
data:
  dashboards.yaml: "- name: RANCHER_MONITORING\n  orgId: 1\n  folder: ''\n  type:\
    \ file\n  disableDeletion: false\n  updateIntervalSeconds: 0 #never\n  options:\n\
    \    path: /var/lib/grafana/rancher-dashboards\n- name: RANCHER_ISTIO_MONITORING\n\
    \  orgId: 2\n  folder: 'istio'\n  type: file\n  disableDeletion: false\n  updateIntervalSeconds:\
    \ 0 #never\n  options:\n    path: /var/lib/grafana/rancher-istio-dashboards\n\n\
    \n"
  datasources.yaml: "apiVersion: 1\n\ndatasources:\n- name: RANCHER_MONITORING\n \
    \ type: prometheus\n  access: proxy\n  basicAuth: false\n  editable: false\n \
    \ isDefault: true\n  url: http://prometheus-operated:9090\n"
apiVersion: v1
kind: ConfigMap

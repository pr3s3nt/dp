metadata:
  name: expose-grafana-metrics
  namespace: cattle-prometheus
  labels:
    app: grafana
    chart: grafana-0.0.1
    heritage: Tiller
    io.cattle.field/appId: cluster-monitoring
    monitoring.coreos.com: 'true'
    release: cluster-monitoring
spec:
  ports:
  - name: metrics
    protocol: TCP
    port: 3000
    targetPort: web
  selector:
    app: grafana
    chart: grafana-0.0.1
    release: cluster-monitoring
  clusterIP: None
  type: ClusterIP
  sessionAffinity: <REDACTED:env>
apiVersion: v1
kind: Service

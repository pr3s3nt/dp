metadata:
  name: grafana-cluster-monitoring
  namespace: cattle-prometheus
  labels:
    app: grafana
    chart: grafana-0.0.1
    heritage: Tiller
    io.cattle.field/appId: cluster-monitoring
    release: cluster-monitoring
  annotations: {}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
      chart: grafana-0.0.1
      release: cluster-monitoring
  template:
    metadata:
      labels:
        app: grafana
        chart: grafana-0.0.1
        release: cluster-monitoring
    spec:
      volumes:
      - name: grafana-static-contents
        emptyDir: {}
      - name: grafana-storage
        persistentVolumeClaim:
          claimName: grafana-cluster-monitoring
      - name: grafana-nginx
        configMap:
          name: grafana-cluster-monitoring-nginx
          items:
          - key: <DOMAIN_192>
            path: <DOMAIN_192>
            mode: 438
          - key: <DOMAIN_659>
            path: <DOMAIN_659>
            mode: 511
          - key: <DOMAIN_660>
            path: <DOMAIN_660>
            mode: 511
          defaultMode: 420
      - name: grafana-dashboards
        configMap:
          name: grafana-cluster-monitoring-dashboards
          defaultMode: 420
      - name: grafana-istio-dashboards
        configMap:
          name: grafana-istio-cluster-monitoring-dashboards
          defaultMode: 420
      - name: grafana-provisionings
        configMap:
          name: grafana-cluster-monitoring-provisionings
          defaultMode: 420
      - name: nginx-home
        emptyDir: {}
      initContainers:
      - name: grafana-init-plugin-json-copy
        image: rancher/grafana-grafana:7.1.5
        resources:
          limits:
            cpu: 50m
            memory: 50Mi
          requests:
            cpu: 50m
            memory: 50Mi
        volumeMounts:
        - name: grafana-nginx
          mountPath: /<DOMAIN_661>
          subPath: <DOMAIN_659>
        - name: grafana-static-contents
          mountPath: /host
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      - name: grafana-init-plugin-json-modify
        image: rancher/prometheus-auth:v0.2.0
        command:
        - /<DOMAIN_661>
        resources:
          limits:
            cpu: 50m
            memory: 50Mi
          requests:
            cpu: 50m
            memory: 50Mi
        volumeMounts:
        - name: grafana-nginx
          mountPath: /<DOMAIN_661>
          subPath: <DOMAIN_660>
        - name: grafana-static-contents
          mountPath: /host
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      containers:
      - name: grafana
        image: rancher/grafana-grafana:7.1.5
        ports:
        - name: web
          containerPort: 3000
          protocol: TCP
        env:
        - name: GF_AUTH_BASIC_ENABLED
          value: <REDACTED:env>
        - name: GF_AUTH_ANONYMOUS_ENABLED
          value: <REDACTED:env>
        resources:
          limits:
            cpu: 200m
            memory: 200Mi
          requests:
            cpu: 100m
            memory: 100Mi
        volumeMounts:
        - name: grafana-storage
          mountPath: /var/lib/grafana
        - name: grafana-static-contents
          mountPath: /usr/share/grafana/public/app/plugins/datasource/prometheus/<DOMAIN_140>
          subPath: grafana/<DOMAIN_140>
        - name: grafana-dashboards
          mountPath: /var/lib/grafana/rancher-dashboards
        - name: grafana-istio-dashboards
          mountPath: /var/lib/grafana/rancher-istio-dashboards
        - name: grafana-provisionings
          mountPath: /etc/grafana/provisioning/dashboards/<DOMAIN_662>
          subPath: <DOMAIN_663>
        - name: grafana-provisionings
          mountPath: /etc/grafana/provisioning/datasources/<DOMAIN_662>
          subPath: <DOMAIN_664>
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
            scheme: HTTP
          initialDelaySeconds: 30
          timeoutSeconds: 1
          periodSeconds: 1
          successThreshold: 1
          failureThreshold: 10
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      - name: grafana-proxy
        image: rancher/library-nginx:1.19.2-alpine
        args:
        - nginx
        - -g
        - daemon off;
        - -c
        - /nginx/<DOMAIN_192>
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        resources:
          limits:
            cpu: 100m
            memory: 100Mi
          requests:
            cpu: 50m
            memory: 50Mi
        volumeMounts:
        - name: grafana-nginx
          mountPath: /nginx/
        - name: nginx-home
          mountPath: /var/cache/nginx
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
        securityContext:
          runAsUser: 101
          runAsGroup: 101
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      nodeSelector:
        kubernetes.io/os: linux
      serviceAccountName: cluster-monitoring
      serviceAccount: cluster-monitoring
      securityContext:
        runAsUser: 472
        runAsGroup: 472
        fsGroup: 472
      schedulerName: default-scheduler
      tolerations:
      - key: <DOMAIN_658>/os
        operator: Equal
        value: linux
        effect: NoSchedule
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
apiVersion: apps/v1
kind: Deployment

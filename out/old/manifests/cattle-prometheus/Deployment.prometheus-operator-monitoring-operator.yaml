metadata:
  name: prometheus-operator-monitoring-operator
  namespace: cattle-prometheus
  labels:
    app: prometheus-operator
    chart: prometheus-operator-0.0.2
    heritage: Tiller
    io.cattle.field/appId: monitoring-operator
    release: monitoring-operator
  annotations: {}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus-operator
      chart: prometheus-operator-0.0.2
      release: monitoring-operator
  template:
    metadata:
      labels:
        app: prometheus-operator
        chart: prometheus-operator-0.0.2
        release: monitoring-operator
    spec:
      containers:
      - name: prometheus-operator
        image: rancher/coreos-prometheus-operator:v0.38.1
        args:
        - --kubelet-service=cattle-prometheus/expose-kubelets-metrics
        - --log-format=logfmt
        - --log-level=info
        - --prometheus-config-reloader=rancher/coreos-prometheus-config-reloader:v0.38.1
        - --config-reloader-image=rancher/jimmidyson-configmap-reload:v0.3.0
        - --labels=<DOMAIN_157>=true
        - --manage-crds=false
        - --with-validation=true
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        resources:
          limits:
            cpu: 200m
            memory: 500Mi
          requests:
            cpu: 100m
            memory: 50Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      nodeSelector:
        kubernetes.io/os: linux
      serviceAccountName: prometheus-operator-monitoring-operator
      serviceAccount: prometheus-operator-monitoring-operator
      securityContext: {}
      schedulerName: default-scheduler
      tolerations:
      - key: <DOMAIN_658>/os
        operator: Equal
        value: linux
        effect: NoSchedule
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
apiVersion: apps/v1
kind: Deployment

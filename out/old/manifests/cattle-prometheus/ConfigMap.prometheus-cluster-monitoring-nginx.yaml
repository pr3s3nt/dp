metadata:
  name: prometheus-cluster-monitoring-nginx
  namespace: cattle-prometheus
  labels:
    app: prometheus
    chart: prometheus-0.0.1
    heritage: Tiller
    io.cattle.field/appId: cluster-monitoring
    release: cluster-monitoring
data:
  nginx-conf.tmpl: "worker_processes      auto;\nerror_log             /dev/stdout\
    \ warn;\npid                   /var/cache/nginx/<DOMAIN_142>;\n\nevents {\n  \
    \ worker_connections 1024;\n}\n\nhttp {\n  include       /etc/nginx/<DOMAIN_143>;\n\
    \  log_format    main '[$time_local - $status] $remote_addr - $remote_user $request\
    \ ($http_referer)';\n\n  proxy_connect_timeout       10;\n  proxy_read_timeout\
    \          180;\n  proxy_send_timeout          5;\n  proxy_buffering         \
    \    off;\n  proxy_cache_path            /var/cache/nginx/cache levels=1:2 keys_zone=my_zone:100m\
    \ inactive=1d max_size=10g;\n\n  server {\n    listen          8080;\n    access_log\
    \      off;\n\n    gzip            on;\n    gzip_min_length 1k;\n    gzip_comp_level\
    \ 2;\n    gzip_types      text/plain application/javascript application/x-javascript\
    \ text/css application/xml text/javascript image/jpeg image/gif image/png;\n \
    \   gzip_vary       on;\n    gzip_disable    \"MSIE [1-6]\\.\";\n\n    proxy_set_header\
    \    Host $host;\n    proxy_set_header    Authorization \"REPLACE_PARAM_AUTHORIZATION\"\
    ;\n    proxy_pass_header   Authorization;\n\n    location / {\n      proxy_cache\
    \         my_zone;\n      proxy_cache_valid   200 302 1d;\n      proxy_cache_valid\
    \   301 30d;\n      proxy_cache_valid   any 5m;\n      proxy_cache_bypass  $http_cache_control;\n\
    \      add_header          X-Proxy-Cache $upstream_cache_status;\n      add_header\
    \          Cache-Control \"public\";\n\n      proxy_pass          http://REPLACE_PARAM_IP:9090/;\n\
    \n      sub_filter_types    text/html;\n      sub_filter_once     off;\n     \
    \ sub_filter          'var PATH_PREFIX = \"\";' 'var PATH_PREFIX = \".\";';\n\n\
    \      if ($request_filename ~ .*\\.(?:js|css|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm)$)\
    \ {\n        expires             90d;\n      }\n    }\n  }\n}"
  run-sh.tmpl: "#!/bin/sh\nset -e\n\nsrcpath=\"/nginx/<DOMAIN_191>\"\ndstpath=\"/var/cache/nginx/<DOMAIN_192>\"\
    \n\nif ! [ -f $srcpath ]; then\n  exit 1\nfi\n\nmkdir -p /var/cache/nginx/cache\n\
    \ntoken=$(cat /var/run/secrets/<DOMAIN_138>/serviceaccount/token)\nsed \"s/REPLACE_PARAM_AUTHORIZATION/Bearer\
    \ ${token}/g\" $srcpath | sed \"s/REPLACE_PARAM_IP/${POD_IP}/g\" > $dstpath\n\n\
    exec nginx -g \"daemon off;\" -c /var/cache/nginx/<DOMAIN_192>"
apiVersion: v1
kind: ConfigMap

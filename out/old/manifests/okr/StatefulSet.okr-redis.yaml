metadata:
  name: okr-redis
  namespace: okr
  annotations: {}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: okr-redis
  template:
    metadata:
      labels:
        app: okr-redis
    spec:
      containers:
      - name: okr-redis
        image: <COMPANY>-<DOMAIN_607>/okr/base-images/redis:6.2.4
        ports:
        - name: okr-redis
          containerPort: 6379
          protocol: TCP
        resources:
          limits:
            cpu: '1'
            memory: 4Gi
          requests:
            cpu: 100m
            memory: 1Gi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      securityContext: {}
      imagePullSecrets:
      - name: registrypullsecret
      schedulerName: default-scheduler
  serviceName: okr-redis
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0
  revisionHistoryLimit: 10
apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: moodle
  namespace: moodle
  labels:
    app.kubernetes.io/instance: moodle
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: moodle
    helm.sh/chart: moodle-10.0.0
  annotations:
    field.cattle.io/publicEndpoints: 'null'
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/instance: moodle
      app.kubernetes.io/name: moodle
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: moodle
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: moodle
        helm.sh/chart: moodle-10.0.0
      annotations:
        prometheus.io/port: '9117'
        prometheus.io/scrape: 'true'
    spec:
      volumes:
      - name: moodle-data
        persistentVolumeClaim:
          claimName: moodle-moodle
      - name: time-zone
        hostPath:
          path: /usr/share/zoneinfo/Asia/Ho_Chi_Minh
          type: ''
      containers:
      - name: moodle
        image: artifactory.<COMPANY><DOMAIN_14>:30807/docker-local/moodle:3.10.0-debian-10-r5
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: https
          containerPort: 8443
          protocol: TCP
        env:
        - name: BITNAMI_DEBUG
          value: 'true'
        - name: ALLOW_EMPTY_PASSWORD
          value: <REDACTED:env>
        - name: APACHE_HTTP_PORT_NUMBER
          value: '8080'
        - name: APACHE_HTTPS_PORT_NUMBER
          value: '8443'
        - name: MOODLE_DATABASE_HOST
          value: moodle-mariadb
        - name: MOODLE_DATABASE_PORT_NUMBER
          value: '49222'
        - name: MOODLE_DATABASE_NAME
          value: bitnami_moodle
        - name: MOODLE_DATABASE_USER
          value: bn_moodle
        - name: MOODLE_DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: moodle-mariadb
              key: mariadb-password
        - name: MOODLE_SKIP_BOOTSTRAP
          value: 'no'
        - name: MOODLE_USERNAME
          value: admin
        - name: MOODLE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: moodle
              key: moodle-password
        - name: MOODLE_EMAIL
          value: <EMAIL_4>
        resources: {}
        volumeMounts:
        - name: moodle-data
          mountPath: /bitnami/moodle
          subPath: moodle
        - name: moodle-data
          mountPath: /bitnami/moodledata
          subPath: moodledata
        - name: time-zone
          mountPath: /etc/localtime
        livenessProbe:
          httpGet:
            path: /login/<DOMAIN_8>
            port: http
            scheme: HTTP
          initialDelaySeconds: 2400
          timeoutSeconds: 5
          periodSeconds: 10
          successThreshold: 1
          failureThreshold: 6
        readinessProbe:
          httpGet:
            path: /login/<DOMAIN_8>
            port: http
            scheme: HTTP
          initialDelaySeconds: 30
          timeoutSeconds: 3
          periodSeconds: 5
          successThreshold: 1
          failureThreshold: 6
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
        securityContext:
          runAsUser: 1001
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      securityContext:
        fsGroup: 1001
      imagePullSecrets:
      - name: registrypullsecret
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 1
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/instance: moodle
                  app.kubernetes.io/name: moodle
              namespaces:
              - moodle
              topologyKey: <DOMAIN_138>/hostname
      schedulerName: default-scheduler
      hostAliases:
      - ip: 127.0.0.1
        hostnames:
        - <DOMAIN_698>
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
apiVersion: apps/v1
kind: Deployment

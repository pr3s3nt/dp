metadata:
  name: otm-be
  namespace: otm
  labels:
    app.kubernetes.io/instance: otm-be
  annotations:
    field.cattle.io/publicEndpoints: '[{"addresses":["<CLEANUP_IP_10>"],"port":31080,"protocol":"TCP","serviceName":"otm:otm-be","allNodes":true},{"addresses":["<IP_72>"],"port":80,"protocol":"HTTP","serviceName":"otm:otm-be","ingressName":"otm:otm-be","hostname":"otmbe.<COMPANY_DOMAIN>","path":"/","allNodes":false}]'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otm-be
  template:
    metadata:
      labels:
        app: otm-be
    spec:
      containers:
      - name: otm-be
        image: artifactory.<COMPANY><DOMAIN_14>:30807/docker-local/otm/prd/be:22
        ports:
        - containerPort: 1080
          protocol: TCP
        envFrom:
        - configMapRef:
            name: be-env-vars-v001
        env:
        - name: db_name
          valueFrom:
            secretKeyRef:
              name: otm-prd-be-secret-v000
              key: db_name
        - name: db_user
          valueFrom:
            secretKeyRef:
              name: otm-prd-be-secret-v000
              key: db_user
        - name: db_password
          valueFrom:
            secretKeyRef:
              name: otm-prd-be-secret-v000
              key: db_password
        - name: db_host
          valueFrom:
            secretKeyRef:
              name: otm-prd-be-secret-v000
              key: db_host
        - name: db_port
          valueFrom:
            secretKeyRef:
              name: otm-prd-be-secret-v000
              key: db_port
        - name: email_service_user
          valueFrom:
            secretKeyRef:
              name: otm-prd-be-secret-v000
              key: email_service_user
        - name: email_service_password
          valueFrom:
            secretKeyRef:
              name: otm-prd-be-secret-v000
              key: email_service_password
        - name: email_service_auth_token
          valueFrom:
            secretKeyRef:
              name: otm-prd-be-secret-v000
              key: email_service_auth_token
        - name: AES_KEY
          valueFrom:
            secretKeyRef:
              name: otm-prd-be-secret-v000
              key: AES_KEY
        - name: ENCRYPT_KEY
          valueFrom:
            secretKeyRef:
              name: otm-prd-be-secret-v000
              key: ENCRYPT_KEY
        resources:
          limits:
            cpu: '4'
            memory: 4Gi
          requests:
            cpu: '2'
            memory: 2Gi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      securityContext: {}
      imagePullSecrets:
      - name: secret-registry-image
      schedulerName: default-scheduler
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
apiVersion: apps/v1
kind: Deployment

metadata:
  name: acs-redis
  namespace: acs
  annotations: {}
spec:
  replicas: 0
  selector:
    matchLabels:
      app: acs-redis
  template:
    metadata:
      labels:
        app: acs-redis
    spec:
      containers:
      - name: acs-redis
        image: <COMPANY>-<DOMAIN_607>/anticovid/base-images/redis:4.0.9
        command:
        - /bin/sh
        args:
        - -c
        - redis-server --requirepass $REDIS_PASSWORD
        ports:
        - name: acs-redis
          containerPort: 6379
          protocol: TCP
        env:
        - name: TZ
          value: Asia/Ho_Chi_Minh
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: password-secret
              key: password-redis
        resources:
          limits:
            cpu: '1'
            memory: 4086Mi
          requests:
            cpu: 100m
            memory: 1Gi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      nodeSelector:
        acs: 'yes'
      securityContext: {}
      imagePullSecrets:
      - name: registrypullsecret
      schedulerName: default-scheduler
      tolerations:
      - key: service
        operator: Equal
        value: acs
        effect: NoSchedule
  serviceName: acs-redis
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0
  revisionHistoryLimit: 10
apiVersion: apps/v1
kind: StatefulSet

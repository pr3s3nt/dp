metadata:
  name: acs-backend
  namespace: acs
  labels:
    app: acs-backend
    app.kubernetes.io/managed-by: spinnaker
    app.kubernetes.io/name: acs
  annotations:
    artifact.spinnaker.io/location: <REDACTED:env>
    artifact.spinnaker.io/name: <REDACTED:env>
    artifact.spinnaker.io/type: <REDACTED:env>
    moniker.spinnaker.io/application: <REDACTED:env>
    moniker.spinnaker.io/cluster: <REDACTED:env>
spec:
  replicas: 0
  selector:
    matchLabels:
      app: acs-backend
  template:
    metadata:
      labels:
        app: acs-backend
        app.kubernetes.io/managed-by: spinnaker
        app.kubernetes.io/name: acs
      annotations:
        artifact.spinnaker.io/location: <REDACTED:env>
        artifact.spinnaker.io/name: <REDACTED:env>
        artifact.spinnaker.io/type: <REDACTED:env>
        moniker.spinnaker.io/application: <REDACTED:env>
        moniker.spinnaker.io/cluster: <REDACTED:env>
    spec:
      containers:
      - name: acs-backend
        image: <COMPANY>-<DOMAIN_607>/anticovid/<COMPANY>/backend:2143
        ports:
        - containerPort: 8080
          protocol: TCP
        env:
        - name: JAVA_OPTS
          value: -<DOMAIN_614>=true -<DOMAIN_615>=file:/dev/./urandom
        - name: CATALINA_OPTS
          value: -Xms4096M -Xmx4096M -server -XX:+UseParallelGC
        - name: TZ
          value: Asia/Ho_Chi_Minh
        resources:
          limits:
            cpu: '2'
            memory: 5Gi
          requests:
            cpu: 400m
            memory: 5Gi
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 360
          timeoutSeconds: 3
          periodSeconds: 60
          successThreshold: 1
          failureThreshold: 6
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 30
          timeoutSeconds: 3
          periodSeconds: 30
          successThreshold: 1
          failureThreshold: 6
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      nodeSelector:
        acs: 'yes'
      securityContext: {}
      imagePullSecrets:
      - name: registrypullsecret
      schedulerName: default-scheduler
      tolerations:
      - key: service
        operator: Equal
        value: acs
        effect: NoSchedule
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
apiVersion: apps/v1
kind: Deployment

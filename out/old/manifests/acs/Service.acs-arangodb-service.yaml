    protocol: TCP
    port: 8529
    targetPort: 8529
  selector:
    app: acs-arangodb
  clusterIP: <IP_30>
  type: ClusterIP
  sessionAffinity: <REDACTED:env>
apiVersion: v1
kind: Service

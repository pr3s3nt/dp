metadata:
  name: acs-fe
  namespace: acs
  labels:
    app: acs-fe
    app.kubernetes.io/managed-by: spinnaker
    app.kubernetes.io/name: acs
  annotations:
    artifact.spinnaker.io/location: <REDACTED:env>
    artifact.spinnaker.io/name: <REDACTED:env>
    artifact.spinnaker.io/type: <REDACTED:env>
    moniker.spinnaker.io/application: <REDACTED:env>
    moniker.spinnaker.io/cluster: <REDACTED:env>
spec:
  replicas: 0
  selector:
    matchLabels:
      app: acs-fe
  template:
    metadata:
      labels:
        app: acs-fe
        app.kubernetes.io/managed-by: spinnaker
        app.kubernetes.io/name: acs
      annotations:
        artifact.spinnaker.io/location: <REDACTED:env>
        artifact.spinnaker.io/name: <REDACTED:env>
        artifact.spinnaker.io/type: <REDACTED:env>
        moniker.spinnaker.io/application: <REDACTED:env>
        moniker.spinnaker.io/cluster: <REDACTED:env>
    spec:
      volumes:
      - name: acs-config-volume
        configMap:
          name: acs-frontend-conf
          defaultMode: 420
      containers:
      - name: acs-fe
        image: <COMPANY>-<DOMAIN_607>/anticovid/<COMPANY>/frontend:327
        ports:
        - containerPort: 80
          protocol: TCP
        resources:
          limits:
            cpu: '2'
            memory: 5Gi
          requests:
            cpu: 700m
            memory: 2Gi
        volumeMounts:
        - name: acs-config-volume
          mountPath: /etc/nginx/conf.d/
        livenessProbe:
          tcpSocket:
            port: 80
          initialDelaySeconds: 360
          timeoutSeconds: 3
          periodSeconds: 60
          successThreshold: 1
          failureThreshold: 6
        readinessProbe:
          tcpSocket:
            port: 80
          initialDelaySeconds: 5
          timeoutSeconds: 3
          periodSeconds: 10
          successThreshold: 1
          failureThreshold: 6
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      nodeSelector:
        acs: 'yes'
      securityContext: {}
      imagePullSecrets:
      - name: registrypullsecret
      schedulerName: default-scheduler
      tolerations:
      - key: service
        operator: Equal
        value: acs
        effect: NoSchedule
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
apiVersion: apps/v1
kind: Deployment

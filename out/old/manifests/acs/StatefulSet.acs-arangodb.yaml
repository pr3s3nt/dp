metadata:
  name: acs-arangodb
  namespace: acs
  annotations: {}
spec:
  replicas: 0
  selector:
    matchLabels:
      app: acs-arangodb
  template:
    metadata:
      labels:
        app: acs-arangodb
    spec:
      volumes:
      - name: time-zone
        hostPath:
          path: /etc/timezone
          type: ''
      - name: local-time
        hostPath:
          path: /etc/localtime
          type: ''
      - name: acs-arangodb-data
        hostPath:
          path: /sservices/acs/arangodb/data
          type: ''
      containers:
      - name: acs-arangodb
        image: <COMPANY>-<DOMAIN_607>/anticovid/base-images/arangodb:3.7.12
        ports:
        - name: acs-arangodb
          containerPort: 8529
          protocol: TCP
        env:
        - name: ARANGO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: password-secret
              key: password-arangodb
        resources:
          limits:
            cpu: '2'
            memory: 4086Mi
          requests:
            cpu: 400m
            memory: 2Gi
        volumeMounts:
        - name: acs-arangodb-data
          mountPath: /var/lib/arangodb3
        - name: time-zone
          mountPath: /etc/timezone
        - name: local-time
          mountPath: /etc/localtime
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      nodeSelector:
        acs: 'yes'
      securityContext: {}
      imagePullSecrets:
      - name: registrypullsecret
      schedulerName: default-scheduler
      tolerations:
      - key: service
        operator: Equal
        value: acs
        effect: NoSchedule
  serviceName: acs-arangodb
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0
  revisionHistoryLimit: 10
apiVersion: apps/v1
kind: StatefulSet

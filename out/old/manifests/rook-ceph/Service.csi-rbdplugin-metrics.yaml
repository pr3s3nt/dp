metadata:
  name: csi-rbdplugin-metrics
  namespace: rook-ceph
  labels:
    app: csi-metrics
spec:
  ports:
  - name: csi-http-metrics
    protocol: TCP
    port: 8080
    targetPort: 9080
  - name: csi-grpc-metrics
    protocol: TCP
    port: 8081
    targetPort: 9090
  selector:
    contains: csi-rbdplugin-metrics
  clusterIP: <IP_102>
  type: ClusterIP
  sessionAffinity: <REDACTED:env>
apiVersion: v1
kind: Service

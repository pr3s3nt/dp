metadata:
  name: csi-cephfsplugin
  namespace: rook-ceph
  annotations:
    deprecated.daemonset.template.generation: '1'
spec:
  selector:
    matchLabels:
      app: csi-cephfsplugin
  template:
    metadata:
      labels:
        app: csi-cephfsplugin
        contains: csi-cephfsplugin-metrics
    spec:
      volumes:
      - name: plugin-dir
        hostPath:
          path: /var/lib/kubelet/plugins/<DOMAIN_530>/
          type: DirectoryOrCreate
      - name: csi-plugins-dir
        hostPath:
          path: /var/lib/kubelet/plugins
          type: Directory
      - name: registration-dir
        hostPath:
          path: /var/lib/kubelet/plugins_registry/
          type: Directory
      - name: pods-mount-dir
        hostPath:
          path: /var/lib/kubelet/pods
          type: Directory
      - name: host-sys
        hostPath:
          path: /sys
          type: ''
      - name: lib-modules
        hostPath:
          path: /lib/modules
          type: ''
      - name: host-dev
        hostPath:
          path: /dev
          type: ''
      - name: ceph-csi-config
        configMap:
          name: rook-ceph-csi-config
          items:
          - key: csi-cluster-config-json
            path: <DOMAIN_612>
          defaultMode: 420
      - name: keys-tmp-dir
        emptyDir:
          medium: Memory
      - name: host-run-mount
        hostPath:
          path: /run/mount
          type: ''
      containers:
      - name: driver-registrar
        image: quay.io/k8scsi/csi-node-driver-registrar:v1.2.0
        args:
        - --v=0
        - --csi-address=/csi/<DOMAIN_613>
        - --kubelet-registration-path=/var/lib/kubelet/plugins/<DOMAIN_530>/<DOMAIN_613>
        env:
        - name: KUBE_NODE_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: <DOMAIN_162>
        resources: {}
        volumeMounts:
        - name: plugin-dir
          mountPath: /csi
        - name: registration-dir
          mountPath: /registration
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
        securityContext:
          privileged: true
      - name: csi-cephfsplugin
        image: quay.io/cephcsi/cephcsi:v3.1.0
        args:
        - --nodeid=$(NODE_ID)
        - --type=cephfs
        - --endpoint=$(CSI_ENDPOINT)
        - --v=0
        - --nodeserver=true
        - --drivername=<DOMAIN_530>
        - --pidlimit=-1
        - --metricsport=9091
        - --forcecephkernelclient=true
        - --metricspath=/metrics
        - --enablegrpcmetrics=true
        env:
        - name: POD_IP
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: <DOMAIN_165>
        - name: NODE_ID
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: <DOMAIN_162>
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: <DOMAIN_20>
        - name: CSI_ENDPOINT
          value: unix:///csi/<DOMAIN_613>
        resources: {}
        volumeMounts:
        - name: plugin-dir
          mountPath: /csi
        - name: csi-plugins-dir
          mountPath: /var/lib/kubelet/plugins
          mountPropagation: Bidirectional
        - name: pods-mount-dir
          mountPath: /var/lib/kubelet/pods
          mountPropagation: Bidirectional
        - name: host-sys
          mountPath: /sys
        - name: lib-modules
          readOnly: true
          mountPath: /lib/modules
        - name: host-dev
          mountPath: /dev
        - name: ceph-csi-config
          mountPath: /etc/ceph-csi-config/
        - name: keys-tmp-dir
          mountPath: /tmp/csi/keys
        - name: host-run-mount
          mountPath: /run/mount
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
        securityContext:
          capabilities:
            add:
            - SYS_ADMIN
          privileged: true
          allowPrivilegeEscalation: true
      - name: liveness-prometheus
        image: quay.io/cephcsi/cephcsi:v3.1.0
        args:
        - --type=liveness
        - --endpoint=$(CSI_ENDPOINT)
        - --metricsport=9081
        - --metricspath=/metrics
        - --polltime=60s
        - --timeout=3s
        env:
        - name: CSI_ENDPOINT
          value: unix:///csi/<DOMAIN_613>
        - name: POD_IP
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: <DOMAIN_165>
        resources: {}
        volumeMounts:
        - name: plugin-dir
          mountPath: /csi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
        securityContext:
          privileged: true
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: rook-csi-cephfs-plugin-sa
      serviceAccount: rook-csi-cephfs-plugin-sa
      hostNetwork: true
      securityContext: {}
      affinity:
        nodeAffinity: {}
      schedulerName: default-scheduler
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  revisionHistoryLimit: 10
apiVersion: apps/v1
kind: DaemonSet

metadata:
  name: rook-discover
  namespace: rook-ceph
  annotations:
    deprecated.daemonset.template.generation: '1'
spec:
  selector:
    matchLabels:
      app: rook-discover
  template:
    metadata:
      labels:
        app: rook-discover
    spec:
      volumes:
      - name: dev
        hostPath:
          path: /dev
          type: ''
      - name: sys
        hostPath:
          path: /sys
          type: ''
      - name: udev
        hostPath:
          path: /run/udev
          type: ''
      containers:
      - name: rook-discover
        image: rook/ceph:v1.4.2
        args:
        - discover
        - --discover-interval
        - 60m
        - --use-ceph-volume
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: <DOMAIN_20>
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: <DOMAIN_162>
        - name: POD_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: <DOMAIN_21>
        resources: {}
        volumeMounts:
        - name: dev
          mountPath: /dev
        - name: sys
          readOnly: true
          mountPath: /sys
        - name: udev
          readOnly: true
          mountPath: /run/udev
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
        securityContext:
          privileged: true
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      serviceAccountName: rook-ceph-system
      serviceAccount: rook-ceph-system
      securityContext: {}
      schedulerName: default-scheduler
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  revisionHistoryLimit: 10
apiVersion: apps/v1
kind: DaemonSet

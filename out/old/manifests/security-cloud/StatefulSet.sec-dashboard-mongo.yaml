metadata:
  name: sec-dashboard-mongo
  namespace: security-cloud
  annotations:
    cattle.io/timestamp: '2025-05-28T10:57:08Z'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sec-dashboard-mongo
  template:
    metadata:
      labels:
        app: sec-dashboard-mongo
    spec:
      volumes:
      - name: config-volume
        configMap:
          name: mongodb-config
          defaultMode: 420
      containers:
      - name: mongodb
        image: artifactory.<COMPANY><DOMAIN_14>:30807/docker-local/fb360/base-images/mongo:6.0.5
        ports:
        - name: mongodb
          containerPort: 27017
          protocol: TCP
        resources:
          limits:
            cpu: '1'
            memory: 1536Mi
          requests:
            cpu: 100m
            memory: 1Gi
        volumeMounts:
        - name: sec-dashboard-storage
          mountPath: /data/
        - name: config-volume
          mountPath: /etc/<DOMAIN_759>
          subPath: <DOMAIN_759>
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      securityContext: {}
      imagePullSecrets:
      - name: secret-registry-image
      schedulerName: default-scheduler
  volumeClaimTemplates:
  - kind: PersistentVolumeClaim
    apiVersion: v1
    metadata:
      name: sec-dashboard-storage
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 30Gi
      storageClassName: ceph-block-replica-2
      volumeMode: Filesystem
  serviceName: sec-dashboard-mongo
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0
  revisionHistoryLimit: 10
apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: fleet-controller
  namespace: cattle-fleet-system
  labels:
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: fleet
    meta.helm.sh/release-namespace: cattle-fleet-system
data:
  config: "{\n  \"agentImage\": \"rancher/fleet-agent:v0.3.9\",\n  \"agentImagePullPolicy\"\
    : \"IfNotPresent\",\n  \"apiServerURL\": \"https://<CLEANUP_IP_5>\",\n  \"apiServerCA\"\
    : \"\"\
    ,\n  \"agentCheckinInterval\": \"15m\",\n  \"ignoreClusterRegistrationLabels\"\
    : false,\n  \"bootstrap\": {\n    \"paths\": \"\",\n    \"repo\": \"\",\n    \"\
    secret\": \"\",\n    \"branch\":  \"master\",\n    \"namespace\": \"fleet-local\"\
    ,\n    \"agentNamespace\": \"cattle-fleet-local-system\",\n  },\n  \"webhookReceiverURL\"\
    : \"\",\n  \"githubURLPrefix\": \"\"\n}\n"
apiVersion: v1
kind: ConfigMap

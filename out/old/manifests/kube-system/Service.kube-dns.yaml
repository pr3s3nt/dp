metadata:
  name: kube-dns
  namespace: kube-system
  labels:
    k8s-app: kube-dns
    kubernetes.io/cluster-service: 'true'
    kubernetes.io/name: KubeDNS
  annotations:
    prometheus.io/port: '9153'
    prometheus.io/scrape: 'true'
spec:
  ports:
  - name: dns
    protocol: UDP
    port: 53
    targetPort: 53
  - name: dns-tcp
    protocol: TCP
    port: 53
    targetPort: 53
  - name: metrics
    protocol: TCP
    port: 9153
    targetPort: 9153
  selector:
    k8s-app: kube-dns
  clusterIP: <IP_10>
  type: ClusterIP
  sessionAffinity: <REDACTED:env>
apiVersion: v1
kind: Service

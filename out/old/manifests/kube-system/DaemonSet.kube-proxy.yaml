metadata:
  name: kube-proxy
  namespace: kube-system
  labels:
    k8s-app: kube-proxy
  annotations:
    deprecated.daemonset.template.generation: '3'
spec:
  selector:
    matchLabels:
      k8s-app: kube-proxy
  template:
    metadata:
      labels:
        k8s-app: kube-proxy
    spec:
      volumes:
      - name: kube-proxy
        configMap:
          name: kube-proxy
          defaultMode: 420
      - name: xtables-lock
        hostPath:
          path: /run/<DOMAIN_609>
          type: FileOrCreate
      - name: lib-modules
        hostPath:
          path: /lib/modules
          type: ''
      containers:
      - name: kube-proxy
        image: k8s.gcr.io/kube-proxy:v1.19.0
        command:
        - /usr/local/bin/kube-proxy
        - --config=/var/lib/kube-proxy/<DOMAIN_611>
        - --hostname-override=$(NODE_NAME)
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: <DOMAIN_162>
        resources: {}
        volumeMounts:
        - name: kube-proxy
          mountPath: /var/lib/kube-proxy
        - name: xtables-lock
          mountPath: /run/<DOMAIN_609>
        - name: lib-modules
          readOnly: true
          mountPath: /lib/modules
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
        securityContext:
          privileged: true
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      nodeSelector:
        kubernetes.io/os: linux
      serviceAccountName: kube-proxy
      serviceAccount: kube-proxy
      hostNetwork: true
      securityContext: {}
      schedulerName: default-scheduler
      tolerations:
      - key: CriticalAddonsOnly
        operator: Exists
      - operator: Exists
      priorityClassName: system-node-critical
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  revisionHistoryLimit: 10
apiVersion: apps/v1
kind: DaemonSet

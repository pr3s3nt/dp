metadata:
  name: cerebro
  namespace: kube-system
  annotations: {}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cerebro
  template:
    metadata:
      labels:
        app: cerebro
    spec:
      volumes:
      - name: cerebro-config
        configMap:
          name: cerebro-conf
          defaultMode: 420
      containers:
      - name: cerebro
        image: <COMPANY>-<DOMAIN_690>/cerebro:0.9.2
        args:
        - -<DOMAIN_750>=/opt/config/<DOMAIN_751>
        ports:
        - containerPort: 9000
          protocol: TCP
        env:
        - name: CEREBRO_PORT
          value: '9000'
        - name: AUTH_TYPE
          value: <REDACTED:env>
        - name: BASIC_AUTH_USER
          value: <REDACTED:env>
        - name: BASIC_AUTH_PWD
          value: <REDACTED:env>
        resources:
          limits:
            cpu: 500m
            memory: 500Mi
          requests:
            cpu: 100m
            memory: 200Mi
        volumeMounts:
        - name: cerebro-config
          mountPath: /opt/config
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      securityContext: {}
      schedulerName: default-scheduler
  serviceName: cerebro
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  revisionHistoryLimit: 10
apiVersion: apps/v1
kind: StatefulSet

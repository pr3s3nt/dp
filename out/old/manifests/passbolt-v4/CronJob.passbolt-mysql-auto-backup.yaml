metadata:
  name: passbolt-mysql-auto-backup
  namespace: passbolt-v4
spec:
  schedule: 0 18 * * *
  concurrencyPolicy: Allow
  suspend: false
  jobTemplate:
    metadata: {}
    spec:
      template:
        metadata: {}
        spec:
          volumes:
          - name: backup-storage
            persistentVolumeClaim:
              claimName: passbolt-mysql-backup-pvc
          containers:
          - name: backup
            image: <COMPANY>-<DOMAIN_607>/passbolt/mysql:5.6
            command:
            - /bin/sh
            - -c
            - "TIMESTAMP=$(date +%Y%m%d-%H%M%S)\nBACKUP_FILE=\"/backup/passbolt-backup-$<DOMAIN_774>\"\
              \n\necho \"Starting MySQL backup at $(date)\"\n\nmysqldump \\\n  -h\
              \ mysql.passbolt-v4.svc.cluster.local \\\n  -u passbolt \\\n  -p'passbolt'\
              \ \\\n  --all-databases \\\n  > $BACKUP_FILE\n\necho \"Backup completed:\
              \ $BACKUP_FILE\"\nls -la /backup/\n"
            resources: {}
            volumeMounts:
            - name: backup-storage
              mountPath: /backup
            terminationMessagePath: /dev/termination-log
            terminationMessagePolicy: File
            imagePullPolicy: IfNotPresent
          restartPolicy: OnFailure
          terminationGracePeriodSeconds: 30
          dnsPolicy: ClusterFirst
          securityContext: {}
          imagePullSecrets:
          - name: registrypullsecret
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                - matchExpressions:
                  - key: <DOMAIN_138>/hostname
                    operator: In
                    values:
                    - <CLEANUP_HOST_4>
          schedulerName: default-scheduler
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
apiVersion: batch/v1beta1
kind: CronJob

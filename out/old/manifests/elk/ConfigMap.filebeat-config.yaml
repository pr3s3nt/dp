metadata:
  name: filebeat-config
  namespace: elk
  labels:
    k8s-app: filebeat
  annotations: {}
data:
  filebeat.yml: "<DOMAIN_464>:\n- type: container\n  paths:\n    - /var/log/containers/fem*.log\n\
    \  fields:\n    log_type: \"fem-logs\"\n    index_name: \"fem-logs\"\n  processors:\n\
    \    - add_kubernetes_metadata:\n        host: ${NODE_NAME}\n        matchers:\n\
    \        - logs_path:\n            logs_path: \"/var/log/containers/\"\n- type:\
    \ container\n  paths:\n    - /var/log/containers/okr*.log\n  fields:\n    log_type:\
    \ \"okr-logs\"\n    index_name: \"okr-logs\"\n  processors:\n    - add_kubernetes_metadata:\n\
    \        host: ${NODE_NAME}\n        matchers:\n        - logs_path:\n       \
    \     logs_path: \"/var/log/containers/\"\n- type: container\n  paths:\n    -\
    \ /var/log/containers/acs*.log\n  fields:\n    log_type: \"acs-logs\"\n    index_name:\
    \ \"acs-logs\"\n  processors:\n    - add_kubernetes_metadata:\n        host: ${NODE_NAME}\n\
    \        matchers:\n        - logs_path:\n            logs_path: \"/var/log/containers/\"\
    \nprocessors:\n  - add_cloud_metadata:\n  - add_host_metadata:\n\n\n<DOMAIN_465>:\
    \ ${ELASTIC_CLOUD_ID}\n<DOMAIN_466>: ${ELASTIC_CLOUD_AUTH}\n\n<DOMAIN_467>:\n\
    \  hosts: [\"logstash-service:5044\"]"
apiVersion: v1
kind: ConfigMap

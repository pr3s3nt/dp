metadata:
  name: els
  namespace: elk
  annotations: {}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: els
  template:
    metadata:
      labels:
        app: els
    spec:
      volumes:
      - name: elasticsearch-tls
        secret:
          secretName: <REDACTED:env>
          defaultMode: 420
      initContainers:
      - name: configure-sysctl
        image: <COMPANY>-<DOMAIN_607>/elk/elasticsearch:7.16.2
        command:
        - sysctl
        - -w
        - vm.max_map_count=262144
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
        securityContext:
          privileged: true
          runAsUser: 0
      containers:
      - name: els
        image: <COMPANY>-<DOMAIN_607>/elk/elasticsearch:7.16.2
        ports:
        - containerPort: 9200
          protocol: TCP
        env:
        - name: <DOMAIN_732>
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: <DOMAIN_21>
        - name: cluster.initial_master_nodes
          value: els-0
        - name: <DOMAIN_733>
          value: elasticsearch
        - name: <DOMAIN_734>
          value: 0.0.0.0
        - name: ES_JAVA_OPTS
          value: -Xmx12g -Xms12g
        - name: <DOMAIN_735>
          value: 'true'
        - name: <DOMAIN_736>
          value: 'true'
        - name: <DOMAIN_737>
          value: 'true'
        - name: <DOMAIN_738>
          value: 'true'
        - name: <DOMAIN_739>
          value: 'true'
        - name: <DOMAIN_740>
          value: /usr/share/elasticsearch/config/certs/<DOMAIN_741>
        - name: <DOMAIN_742>
          value: /usr/share/elasticsearch/config/certs/<DOMAIN_743>
        - name: <DOMAIN_744>.certificate_authorities
          value: <REDACTED:env>
        - name: <DOMAIN_745>
          value: /usr/share/elasticsearch/config/certs/<DOMAIN_741>
        - name: <DOMAIN_746>
          value: /usr/share/elasticsearch/config/certs/<DOMAIN_743>
        - name: <DOMAIN_747>.certificate_authorities
          value: <REDACTED:env>
        resources:
          requests:
            cpu: '8'
            memory: 16Gi
        volumeMounts:
        - name: elasticsearch-pvc
          mountPath: /usr/share/elasticsearch/data
        - name: elasticsearch-tls
          mountPath: /usr/share/elasticsearch/config/certs
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
        securityContext:
          runAsUser: 1000
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      nodeSelector:
        node-master: 'true'
      securityContext: {}
      imagePullSecrets:
      - name: registrypullsecret
      schedulerName: default-scheduler
  volumeClaimTemplates:
  - kind: PersistentVolumeClaim
    apiVersion: v1
    metadata:
      name: elasticsearch-pvc
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 100Gi
      storageClassName: ceph-block-replica-2
      volumeMode: Filesystem
  serviceName: els
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  revisionHistoryLimit: 10
apiVersion: apps/v1
kind: StatefulSet

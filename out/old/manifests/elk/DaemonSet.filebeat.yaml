metadata:
  name: filebeat
  namespace: elk
  labels:
    k8s-app: filebeat
  annotations:
    deprecated.daemonset.template.generation: '4'
spec:
  selector:
    matchLabels:
      k8s-app: filebeat
  template:
    metadata:
      labels:
        k8s-app: filebeat
    spec:
      volumes:
      - name: config
        configMap:
          name: filebeat-config
          defaultMode: 416
      - name: varlibdockercontainers
        hostPath:
          path: /var/lib/docker/containers
          type: ''
      - name: varlog
        hostPath:
          path: /var/log
          type: ''
      - name: data
        hostPath:
          path: /var/lib/filebeat-data
          type: DirectoryOrCreate
      containers:
      - name: filebeat
        image: <COMPANY>-<DOMAIN_607>/elk/filebeat:7.16.2
        args:
        - -c
        - /etc/<DOMAIN_608>
        - -e
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: <DOMAIN_162>
        resources:
          limits:
            memory: 200Mi
          requests:
            cpu: 100m
            memory: 100Mi
        volumeMounts:
        - name: config
          readOnly: true
          mountPath: /etc/<DOMAIN_608>
          subPath: <DOMAIN_608>
        - name: data
          mountPath: /usr/share/filebeat/data
        - name: varlibdockercontainers
          readOnly: true
          mountPath: /var/lib/docker/containers
        - name: varlog
          readOnly: true
          mountPath: /var/log
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
        securityContext:
          runAsUser: 0
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: filebeat
      serviceAccount: filebeat
      hostNetwork: true
      securityContext: {}
      imagePullSecrets:
      - name: registrypullsecret
      schedulerName: default-scheduler
      tolerations:
      - key: service
        operator: Equal
        value: acs
        effect: NoSchedule
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  revisionHistoryLimit: 10
apiVersion: apps/v1
kind: DaemonSet

metadata:
  name: kibana
  namespace: elk
  labels:
    app: kibana
  annotations: {}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kibana
  template:
    metadata:
      labels:
        app: kibana
    spec:
      volumes:
      - name: kibana-cert
        secret:
          secretName: <REDACTED:env>
          defaultMode: 420
      - name: kibana-config
        configMap:
          name: kibana-conf
          defaultMode: 420
      containers:
      - name: kibana
        image: <COMPANY>-<DOMAIN_607>/elk/kibana:7.16.2
        ports:
        - containerPort: 5601
          protocol: TCP
        env:
        - name: ELASTICSEARCH_HOSTS
          value: https://els:9200
        - name: SERVER_HOST
          value: 0.0.0.0
        - name: NODE_OPTIONS
          value: --max-old-space-size=1800
        - name: SERVER_SSL_ENABLED
          value: 'true'
        - name: SERVER_SSL_CERTIFICATE
          value: /usr/share/kibana/config/certs/<DOMAIN_748>
        - name: SERVER_SSL_KEY
          value: /usr/share/kibana/config/certs/<DOMAIN_749>
        - name: ELASTICSEARCH_SSL_CERTIFICATEAUTHORITIES
          value: <REDACTED:env>
        - name: ELASTICSEARCH_SSL_VERIFICATIONMODE
          value: none
        - name: ELASTICSEARCH_USERNAME
          valueFrom:
            secretKeyRef:
              name: kibana-useraccess
              key: username
        - name: ELASTICSEARCH_PASSWORD
          valueFrom:
            secretKeyRef:
              name: kibana-useraccess
              key: password
        resources:
          limits:
            cpu: '1'
            memory: 2Gi
          requests:
            cpu: '1'
            memory: 2Gi
        volumeMounts:
        - name: kibana-cert
          mountPath: /usr/share/kibana/config/certs
        - name: kibana-config
          mountPath: /usr/share/kibana/config/
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
        securityContext:
          capabilities:
            drop:
            - ALL
          runAsUser: 1000
          runAsNonRoot: true
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      securityContext:
        fsGroup: 1000
      imagePullSecrets:
      - name: registrypullsecret
      schedulerName: default-scheduler
  serviceName: kibana
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  revisionHistoryLimit: 10
apiVersion: apps/v1
kind: StatefulSet

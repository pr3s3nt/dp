metadata:
  name: survey-doe-runner
  namespace: actions-runner
  labels:
    app: survey-doe-runner
  annotations: {}
spec:
  replicas: 0
  selector:
    matchLabels:
      app: survey-doe-runner
  template:
    metadata:
      labels:
        app: survey-doe-runner
    spec:
      volumes:
      - name: dockersock
        hostPath:
          path: /var/run/<DOMAIN_616>
          type: Socket
      - name: apt-source
        hostPath:
          path: /etc/apt/<DOMAIN_617>
          type: File
      containers:
      - name: survey-doe-runner
        image: artifactory.<COMPANY><DOMAIN_14>:30807/docker-local/<COMPANY>-actions-runner:2.328.0
        env:
        - name: GH_TOKEN
          valueFrom:
            secretKeyRef:
              name: actions-runner-secret
              key: PAT_SURVEY
        - name: GH_REPOSITORY
          value: https://<DOMAIN_9>/<COMPANY>-sre/survey_doe
        - name: LABELS
          value: survey-doe-runner,code-default,base-image-runner
        - name: RUNNER_NAME
          value: survey-doe-runner
        resources:
          limits:
            cpu: '2'
            memory: 2Gi
          requests:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: dockersock
          mountPath: /var/run/<DOMAIN_616>
        - name: apt-source
          readOnly: true
          mountPath: /etc/apt/<DOMAIN_617>
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      serviceAccountName: runner-account
      serviceAccount: runner-account
      securityContext:
        runAsUser: 1000
        runAsGroup: 1006
      imagePullSecrets:
      - name: secret-registry-image
      schedulerName: default-scheduler
  strategy:
    type: Recreate
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
apiVersion: apps/v1
kind: Deployment

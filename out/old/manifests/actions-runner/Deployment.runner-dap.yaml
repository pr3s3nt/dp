metadata:
  name: runner-dap
  namespace: actions-runner
  annotations:
    cattle.io/timestamp: '2026-02-10T07:35:04Z'
spec:
  replicas: 0
  selector:
    matchLabels:
      app: runner-dap
  template:
    metadata:
      labels:
        app: runner-dap
    spec:
      volumes:
      - name: dockersock
        hostPath:
          path: /var/run/<DOMAIN_616>
          type: Socket
      - name: apt-source
        hostPath:
          path: /etc/apt/<DOMAIN_617>
          type: ''
      - name: deamon
        hostPath:
          path: /etc/docker/<DOMAIN_618>
          type: ''
      containers:
      - name: <COMPANY>-sre-runner
        image: artifactory.<COMPANY><DOMAIN_14>:30807/docker-local/<COMPANY>-actions-runner:2.328.0
        env:
        - name: GH_TOKEN
          valueFrom:
            secretKeyRef:
              name: actions-runner-secret
              key: PAT_DAP
        - name: GH_REPOSITORY
          value: https://<DOMAIN_9>/<COMPANY>-sre/DAP
        - name: LABELS
          value: runner-dap
        - name: RUNNER_NAME
          value: k8s-dap
        resources: {}
        volumeMounts:
        - name: dockersock
          mountPath: /var/run/<DOMAIN_616>
        - name: apt-source
          mountPath: /etc/apt/<DOMAIN_617>
        - name: deamon
          mountPath: /etc/docker/<DOMAIN_618>
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      serviceAccountName: runner-account
      serviceAccount: runner-account
      securityContext:
        runAsUser: 1000
        runAsGroup: 1006
      imagePullSecrets:
      - name: secret-registry-image
      schedulerName: default-scheduler
  strategy:
    type: Recreate
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
apiVersion: apps/v1
kind: Deployment

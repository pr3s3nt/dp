metadata:
  name: runner-feedback360
  namespace: actions-runner
  annotations: {}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: runner-feedback360
  template:
    metadata:
      labels:
        app: runner-feedback360
    spec:
      volumes:
      - name: dockersock
        hostPath:
          path: /var/run/<DOMAIN_616>
          type: Socket
      - name: apt-source
        hostPath:
          path: /etc/apt/<DOMAIN_617>
          type: ''
      - name: deamon
        hostPath:
          path: /etc/docker/<DOMAIN_618>
          type: ''
      - name: docker-config
        hostPath:
          path: /home/<CLEANUP_USER_1>/.docker/<DOMAIN_612>
          type: ''
      containers:
      - name: <COMPANY>-sre-runner
        image: artifactory.<COMPANY><DOMAIN_14>:30807/docker-local/<COMPANY>-actions-runner:2.328.0
        env:
        - name: GH_TOKEN
          valueFrom:
            secretKeyRef:
              name: actions-runner-secret
              key: PAT_FB360
        - name: GH_REPOSITORY
          value: https://<DOMAIN_9>/<COMPANY>-sre/feedback360
        - name: LABELS
          value: runner-feedback360
        - name: RUNNER_NAME
          value: k8s-feedback360
        resources: {}
        volumeMounts:
        - name: dockersock
          mountPath: /var/run/<DOMAIN_616>
        - name: apt-source
          mountPath: /etc/apt/<DOMAIN_617>
        - name: deamon
          mountPath: /etc/docker/<DOMAIN_618>
        - name: docker-config
          mountPath: .docker/<DOMAIN_612>
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      serviceAccountName: runner-account
      serviceAccount: runner-account
      securityContext:
        runAsUser: 1000
        runAsGroup: 1012
      imagePullSecrets:
      - name: secret-registry-image
      schedulerName: default-scheduler
  strategy:
    type: Recreate
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
apiVersion: apps/v1
kind: Deployment

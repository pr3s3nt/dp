metadata:
  name: knox2fem
  namespace: knox2fem
  annotations: {}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: <COMPANY>-sre-knox2fem
  template:
    metadata:
      labels:
        app: <COMPANY>-sre-knox2fem
    spec:
      volumes:
      - name: log
        hostPath:
          path: /knox2fem/log
          type: ''
      containers:
      - name: knox2fem
        image: artifactory.<COMPANY><DOMAIN_14>:30807/docker-local/knox2fem/stg:18
        env:
        - name: NODE_ENV
          valueFrom:
            secretKeyRef:
              name: knox2fem-secret
              key: NODE_ENV
        - name: KNOX_USERNAME
          valueFrom:
            secretKeyRef:
              name: knox2fem-secret
              key: KNOX_USERNAME
        - name: FEM_BASEURL
          valueFrom:
            secretKeyRef:
              name: knox2fem-secret
              key: FEM_BASEURL
        - name: FEM_USERNAME
          valueFrom:
            secretKeyRef:
              name: knox2fem-secret
              key: FEM_USERNAME
        - name: FEM_PASSWORD
          valueFrom:
            secretKeyRef:
              name: knox2fem-secret
              key: FEM_PASSWORD
        - name: KNOX_PASSWORD
          valueFrom:
            secretKeyRef:
              name: knox2fem-secret
              key: KNOX_PASSWORD
        resources: {}
        volumeMounts:
        - name: log
          mountPath: /app/knox2fem/log
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: Always
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      nodeSelector:
        kubernetes.io/hostname: <CLEANUP_HOST_4>
      securityContext: {}
      imagePullSecrets:
      - name: secret-registry-image
      schedulerName: default-scheduler
  strategy:
    type: Recreate
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
apiVersion: apps/v1
kind: Deployment

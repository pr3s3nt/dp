metadata:
  name: survey-pv
  annotations:
    pv.kubernetes.io/bound-by-controller: 'yes'
spec:
  capacity:
    storage: 5Gi
  hostPath:
    path: /data/survey-uploads
    type: DirectoryOrCreate
  accessModes:
  - ReadWriteOnce
  claimRef:
    kind: PersistentVolumeClaim
    namespace: survey-doe
    name: survey-pvc
    apiVersion: v1
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  volumeMode: Filesystem
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: <DOMAIN_138>/hostname
          operator: In
          values:
          - <CLEANUP_HOST_4>
apiVersion: v1
kind: PersistentVolume

metadata:
  name: passbolt-mysql-backup-pv
  annotations:
    pv.kubernetes.io/bound-by-controller: 'yes'
spec:
  capacity:
    storage: 1Gi
  hostPath:
    path: /home/<CLEANUP_USER_1>/ptt.hang2/passbolt/backup
    type: ''
  accessModes:
  - ReadWriteMany
  claimRef:
    kind: PersistentVolumeClaim
    namespace: passbolt-v4
    name: passbolt-mysql-backup-pvc
    apiVersion: v1
  persistentVolumeReclaimPolicy: Retain
  volumeMode: Filesystem
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: <DOMAIN_138>/hostname
          operator: In
          values:
          - <CLEANUP_HOST_4>
apiVersion: v1
kind: PersistentVolume

metadata:
  name: opn
  namespace: opn
  annotations: {}
spec:
  replicas: 0
  selector:
    matchLabels:
      app: <COMPANY>-sre-opn
  template:
    metadata:
      labels:
        app: <COMPANY>-sre-opn
    spec:
      volumes:
      - name: log
        hostPath:
          path: /opn-stg/log
          type: ''
      containers:
      - name: opn
        image: artifactory.<COMPANY><DOMAIN_14>:30807/docker-local/opn/stg:34
        env:
        - name: NODE_ENV
          valueFrom:
            secretKeyRef:
              name: opn-secret
              key: NODE_ENV
        - name: GHRP_USERNAME
          valueFrom:
            secretKeyRef:
              name: opn-secret
              key: GHRP_USERNAME
        - name: CIP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: opn-secret
              key: CIP_PASSWORD
        - name: CIP_USERNAME
          valueFrom:
            secretKeyRef:
              name: opn-secret
              key: CIP_USERNAME
        - name: CIP_BASEURL
          valueFrom:
            secretKeyRef:
              name: opn-secret
              key: CIP_BASEURL
        resources: {}
        volumeMounts:
        - name: log
          mountPath: /app/opn/log
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      securityContext: {}
      imagePullSecrets:
      - name: secret-registry-image
      schedulerName: default-scheduler
  strategy:
    type: Recreate
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
apiVersion: apps/v1
kind: Deployment

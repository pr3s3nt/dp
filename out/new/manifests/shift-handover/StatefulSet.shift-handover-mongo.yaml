metadata:
  name: shift-handover-mongo
  namespace: shift-handover
  labels:
    app.kubernetes.io/managed-by: Helm
    objectset.rio.cattle.io/hash: f6c18b7826d97af6598f63b54624be8cc919b4f4
  annotations:
    meta.helm.sh/release-name: shift-handover
    meta.helm.sh/release-namespace: shift-handover
    objectset.rio.cattle.io/id: default-shift-handover-cattle-fleet-local-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shift-handover-mongo
  template:
    metadata:
      labels:
        app: shift-handover-mongo
    spec:
      volumes:
      - name: config-volume
        configMap:
          name: mongodb-config
          defaultMode: 420
      containers:
      - name: mongodb
        image: <DOMAIN_30>.<COMPANY_DOMAIN>/shift-handover/mongodb:6.0.5
        ports:
        - name: mongodb
          containerPort: 27017
          protocol: TCP
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: mongo-secret
              key: USERNAME
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongo-secret
              key: PASSWORD
        resources:
          limits:
            cpu: '1'
            memory: 1536Mi
          requests:
            cpu: 100m
            memory: 1Gi
        volumeMounts:
        - name: shift-handover-storage
          mountPath: /data/db/
        - name: config-volume
          mountPath: /etc/<DOMAIN_126>
          subPath: <DOMAIN_126>
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      securityContext: {}
      schedulerName: default-scheduler
  volumeClaimTemplates:
  - kind: PersistentVolumeClaim
    apiVersion: v1
    metadata:
      name: shift-handover-storage
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 30Gi
      storageClassName: rook-ceph-block
      volumeMode: Filesystem
  serviceName: shift-handover-mongo
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0
      maxUnavailable: 1
  revisionHistoryLimit: 10
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: rancher-turtles-controller-manager
  namespace: cattle-turtles-system
  labels:
    app.kubernetes.io/managed-by: Helm
    control-plane: controller-manager
  annotations:
    meta.helm.sh/release-name: rancher-turtles
    meta.helm.sh/release-namespace: cattle-turtles-system
spec:
  replicas: 1
  selector:
    matchLabels:
      control-plane: controller-manager
  template:
    metadata:
      labels:
        control-plane: controller-manager
      annotations:
        kubectl.kubernetes.io/default-container: manager
    spec:
      volumes:
      - name: clusterctl-config
        configMap:
          name: clusterctl-config
          defaultMode: 420
      containers:
      - name: manager
        image: rancher/turtles:v0.26.2
        command:
        - /manager
        args:
        - --leader-elect
        - --feature-gates=agent-tls-mode=true,no-cert-manager=true,use-rancher-default-registry=true,use-caapf=false
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: <DOMAIN_72>
        - name: POD_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: <DOMAIN_24>
        - name: POD_UID
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: <DOMAIN_93>
        resources:
          limits:
            cpu: 500m
            memory: 600Mi
          requests:
            cpu: 10m
            memory: 128Mi
        volumeMounts:
        - name: clusterctl-config
          mountPath: /config
        livenessProbe:
          httpGet:
            path: /healthz
            port: 9440
            scheme: HTTP
          initialDelaySeconds: 15
          timeoutSeconds: 1
          periodSeconds: 20
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: 9440
            scheme: HTTP
          initialDelaySeconds: 5
          timeoutSeconds: 1
          periodSeconds: 10
          successThreshold: 1
          failureThreshold: 3
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
        securityContext:
          capabilities:
            drop:
            - ALL
          runAsUser: 65532
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
      restartPolicy: Always
      terminationGracePeriodSeconds: 10
      dnsPolicy: ClusterFirst
      serviceAccountName: rancher-turtles-manager
      serviceAccount: rancher-turtles-manager
      securityContext: {}
      schedulerName: default-scheduler
      tolerations:
      - key: <DOMAIN_94>/master
        effect: NoSchedule
      - key: <DOMAIN_94>/control-plane
        effect: NoSchedule
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
apiVersion: apps/v1
kind: Deployment

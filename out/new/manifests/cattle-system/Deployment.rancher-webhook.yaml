metadata:
  name: rancher-webhook
  namespace: cattle-system
  labels:
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: rancher-webhook
    meta.helm.sh/release-namespace: cattle-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rancher-webhook
  template:
    metadata:
      labels:
        app: rancher-webhook
    spec:
      containers:
      - name: rancher-webhook
        image: rancher/rancher-webhook:v0.10.6
        ports:
        - name: https
          containerPort: 9443
          protocol: TCP
        env:
        - name: STAMP
        - name: ENABLE_MCM
          value: 'true'
        - name: CATTLE_PORT
          value: '9443'
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: <DOMAIN_72>
        resources: {}
        livenessProbe:
          httpGet:
            path: /healthz
            port: https
            scheme: HTTPS
          timeoutSeconds: 1
          periodSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /healthz
            port: https
            scheme: HTTPS
          timeoutSeconds: 1
          periodSeconds: 5
          successThreshold: 1
          failureThreshold: 60
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      nodeSelector:
        kubernetes.io/os: linux
      serviceAccountName: rancher-webhook
      serviceAccount: rancher-webhook
      securityContext: {}
      schedulerName: default-scheduler
      tolerations:
      - key: <DOMAIN_96>/os
        operator: Equal
        value: linux
        effect: NoSchedule
      priorityClassName: rancher-critical
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
apiVersion: apps/v1
kind: Deployment

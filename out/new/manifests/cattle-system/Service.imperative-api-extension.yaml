metadata:
  name: imperative-api-extension
  namespace: cattle-system
spec:
  ports:
  - protocol: TCP
    port: 6666
    targetPort: 6666
  selector:
    app: rancher
  clusterIP: <IP_15>
  clusterIPs:
  - <IP_15>
  type: ClusterIP
  sessionAffinity: <REDACTED:env>
  ipFamilies:
  - IPv4
  ipFamilyPolicy: SingleStack
  internalTrafficPolicy: Cluster
apiVersion: v1
kind: Service

metadata:
  name: rke2-machineconfig-cleanup-script
  namespace: fleet-local
  labels:
    objectset.rio.cattle.io/hash: dd9dbcfd7c38885d30e78acb65a58e5962640802
  annotations:
    objectset.rio.cattle.io/applied: 
    objectset.rio.cattle.io/id: rke2-machine-config-cleanup
data:
  cleanup.sh: "#!/bin/bash\n\n\t\t\t# Fetch and save all CRD names containing '<DOMAIN_23>'\n\
    \t\t\tcrds=$(kubectl get crds -o custom-columns=NAME:.<DOMAIN_24> --no-headers\
    \ | grep 'rke-machine-config\\.cattle\\.io')\n\t\t\t\n\t\t\t# Collect all namespaces\
    \ from fleetWorkspaceName field of provisioning clusters\n\t\t\tnamespaces=$(kubectl\
    \ get <DOMAIN_25> -A -o json | jq -r '.items[].<DOMAIN_26> // empty' | sort -u)\n\
    \t\t\t\n\t\t\tif [ -z \"$namespaces\" ]; then\n  \t\t\t\tnamespaces=\"fleet-default\"\
    \n\t\t\tfi\n\n\t\t\t# Loop through each namespace\n\t\t\tfor ns in $namespaces;\
    \ do\n\t\n\t\t\t  # Loop through each CRD name\n\t\t\t  for crd in $crds; do\n\
    \n\t\t\t\t# Get resources of the current CRD and collect those with no ownerReferences\
    \ and older than 1 hour\n\t\t\t\tresources=$(kubectl get $crd -n $ns -o json |\
    \ \\\n\t\t\t\t  jq -r '\n\t\t\t\t\t.items[] |\n\t\t\t\t\tselect(.<DOMAIN_27> ==\
    \ null) |\n\t\t\t\t\tselect((now - (.<DOMAIN_28> | fromdateiso8601)) > 3600) |\n\
    \t\t\t\t\t.<DOMAIN_24>' | \\\n\t\t\t\t  xargs)\n\n\t\t\t\tif [ -n \"$resources\"\
    \ ]; then\n\t\t\t\t  echo \"Deleting resources: $resources in namespace: $ns\"\
    \n\t\t\t\t  kubectl delete $crd -n $ns $resources\n\t\t\t\tfi\n\t\t\t  done\n\t\
    \t\tdone"
apiVersion: v1
kind: ConfigMap

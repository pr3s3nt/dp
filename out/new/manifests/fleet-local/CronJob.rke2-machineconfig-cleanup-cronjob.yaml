metadata:
  name: rke2-machineconfig-cleanup-cronjob
  namespace: fleet-local
  labels:
    objectset.rio.cattle.io/hash: dd9dbcfd7c38885d30e78acb65a58e5962640802
  annotations:
    objectset.rio.cattle.io/applied: 
    objectset.rio.cattle.io/id: rke2-machine-config-cleanup
spec:
  schedule: 5 0 * * *
  concurrencyPolicy: Allow
  suspend: false
  jobTemplate:
    metadata: {}
    spec:
      backoffLimit: 10
      template:
        metadata: {}
        spec:
          volumes:
          - name: config-volume
            configMap:
              name: rke2-machineconfig-cleanup-script
              defaultMode: 420
          containers:
          - name: rke2-machineconfig-cleanup-pod
            image: rancher/rancher-agent:v2.14.2
            command:
            - /bin/sh
            args:
            - /helper/<DOMAIN_127>
            env:
            - name: CATTLE_SERVER
              value: https://<DOMAIN_8>.<COMPANY_DOMAIN>
            - name: CATTLE_CA_CHECKSUM
            - name: CATTLE_TOKEN
              value: <REDACTED:env>
            resources: {}
            volumeMounts:
            - name: config-volume
              mountPath: /helper
            terminationMessagePath: /dev/termination-log
            terminationMessagePolicy: File
            imagePullPolicy: IfNotPresent
            securityContext:
              runAsUser: 65534
              runAsGroup: 65534
          restartPolicy: Never
          terminationGracePeriodSeconds: 30
          dnsPolicy: ClusterFirst
          serviceAccountName: rke2-machineconfig-cleanup-sa
          serviceAccount: rke2-machineconfig-cleanup-sa
          securityContext: {}
          schedulerName: default-scheduler
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
apiVersion: batch/v1
kind: CronJob

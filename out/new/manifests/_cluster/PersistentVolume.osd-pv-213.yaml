metadata:
  name: osd-pv-213
  annotations:
    pv.kubernetes.io/bound-by-controller: 'yes'
spec:
  capacity:
    storage: 2500Gi
  local:
    path: /dev/mapper/ubuntu--vg-ceph--osd0
  accessModes:
  - ReadWriteOnce
  claimRef:
    kind: PersistentVolumeClaim
    namespace: rook-ceph
    name: ceph-osd-set-data-0rxxds
    apiVersion: v1
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-blk
  volumeMode: Block
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: <DOMAIN_43>/hostname
          operator: In
          values:
          - <CLEANUP_HOST_1>
apiVersion: v1
kind: PersistentVolume

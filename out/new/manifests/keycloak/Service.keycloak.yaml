metadata:
  name: keycloak
  namespace: keycloak
  labels:
    app: keycloak
  annotations: {}
spec:
  ports:
  - name: http
    protocol: TCP
    port: 8080
    targetPort: http
  selector:
    app: keycloak
  clusterIP: <IP_27>
  clusterIPs:
  - <IP_27>
  type: ClusterIP
  sessionAffinity: <REDACTED:env>
  ipFamilies:
  - IPv4
  ipFamilyPolicy: SingleStack
  internalTrafficPolicy: Cluster
apiVersion: v1
kind: Service

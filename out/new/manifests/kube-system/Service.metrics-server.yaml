metadata:
  name: metrics-server
  namespace: kube-system
  labels:
    k8s-app: metrics-server
  annotations: {}
spec:
  ports:
  - name: https
    protocol: TCP
    appProtocol: https
    port: 443
    targetPort: https
  selector:
    k8s-app: metrics-server
  clusterIP: <IP_29>
  clusterIPs:
  - <IP_29>
  type: ClusterIP
  sessionAffinity: <REDACTED:env>
  ipFamilies:
  - IPv4
  ipFamilyPolicy: SingleStack
  internalTrafficPolicy: Cluster
apiVersion: v1
kind: Service

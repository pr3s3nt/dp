metadata:
  name: fleet-controller
  namespace: cattle-fleet-system
  labels:
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: fleet
    meta.helm.sh/release-namespace: cattle-fleet-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fleet-controller
  template:
    metadata:
      labels:
        app: fleet-controller
        fleet.cattle.io/shard-default: 'true'
        fleet.cattle.io/shard-id: ''
      annotations:
        cattle.io/timestamp: '2026-07-14T03:19:41Z'
    spec:
      volumes:
      - name: tmp
        emptyDir: {}
      containers:
      - name: fleet-controller
        image: rancher/fleet:v0.15.2
        command:
        - fleetcontroller
        ports:
        - name: metrics
          containerPort: 8080
          protocol: TCP
        env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: <DOMAIN_72>
        - name: CATTLE_ELECTION_LEASE_DURATION
          value: 30s
        - name: CATTLE_ELECTION_RETRY_PERIOD
          value: 10s
        - name: CATTLE_ELECTION_RENEW_DEADLINE
          value: 25s
        - name: BUNDLE_RECONCILER_WORKERS
          value: '50'
        - name: BUNDLEDEPLOYMENT_RECONCILER_WORKERS
          value: '50'
        - name: CLUSTER_RECONCILER_WORKERS
          value: '50'
        - name: CLUSTERGROUP_RECONCILER_WORKERS
          value: '50'
        - name: SCHEDULE_RECONCILER_WORKERS
          value: '50'
        - name: CONTENT_RECONCILER_WORKERS
          value: '50'
        resources: {}
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
        securityContext:
          capabilities:
            drop:
            - ALL
          privileged: false
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
      - name: fleet-cleanup
        image: rancher/fleet:v0.15.2
        command:
        - fleetcontroller
        - cleanup
        env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: <DOMAIN_72>
        - name: CATTLE_ELECTION_LEASE_DURATION
          value: 30s
        - name: CATTLE_ELECTION_RETRY_PERIOD
          value: 10s
        - name: CATTLE_ELECTION_RENEW_DEADLINE
          value: 25s
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
        securityContext:
          capabilities:
            drop:
            - ALL
          privileged: false
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
      - name: fleet-agentmanagement
        image: rancher/fleet:v0.15.2
        command:
        - fleetcontroller
        - agentmanagement
        - --disable-bootstrap
        env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: <DOMAIN_72>
        - name: FLEET_PROPAGATE_DEBUG_SETTINGS_TO_AGENTS
          value: 'true'
        - name: FLEET_DEBUG_DISABLE_SECURITY_CONTEXT
          value: 'false'
        - name: CATTLE_ELECTION_LEASE_DURATION
          value: 30s
        - name: CATTLE_ELECTION_RETRY_PERIOD
          value: 10s
        - name: CATTLE_ELECTION_RENEW_DEADLINE
          value: 25s
        - name: FLEET_AGENT_REPLICA_COUNT
          value: '1'
        - name: FLEET_AGENT_ELECTION_LEASE_DURATION
          value: 30s
        - name: FLEET_AGENT_ELECTION_RETRY_PERIOD
          value: 10s
        - name: FLEET_AGENT_ELECTION_RENEW_DEADLINE
          value: 25s
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
        securityContext:
          capabilities:
            drop:
            - ALL
          privileged: false
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      nodeSelector:
        kubernetes.io/os: linux
      serviceAccountName: fleet-controller
      serviceAccount: fleet-controller
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
      schedulerName: default-scheduler
      tolerations:
      - key: <DOMAIN_96>/os
        operator: Equal
        value: linux
        effect: NoSchedule
      priorityClassName: rancher-critical
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
apiVersion: apps/v1
kind: Deployment

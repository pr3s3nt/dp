metadata:
  name: <DOMAIN_69>-nodeplugin
  namespace: rook-ceph
  annotations:
    deprecated.daemonset.template.generation: '3'
spec:
  selector:
    matchLabels:
      app: <DOMAIN_69>-nodeplugin
  template:
    metadata:
      labels:
        app: <DOMAIN_69>-nodeplugin
    spec:
      volumes:
      - name: host-dev
        hostPath:
          path: /dev
          type: ''
      - name: host-sys
        hostPath:
          path: /sys
          type: ''
      - name: host-run-mount
        hostPath:
          path: /run/mount
          type: ''
      - name: lib-modules
        hostPath:
          path: /lib/modules
          type: ''
      - name: keys-tmp-dir
        emptyDir:
          medium: Memory
      - name: ceph-csi-config
        configMap:
          name: ceph-csi-config
          defaultMode: 420
      - name: plugin-dir
        hostPath:
          path: /var/lib/kubelet/plugins/<DOMAIN_69>
          type: DirectoryOrCreate
      - name: plugin-mount-dir
        hostPath:
          path: /var/lib/kubelet/plugins
          type: Directory
      - name: pods-mount-dir
        hostPath:
          path: /var/lib/kubelet/pods
          type: Directory
      - name: registration-dir
        hostPath:
          path: /var/lib/kubelet/plugins_registry
          type: Directory
      - name: ceph-csi-mountinfo
        hostPath:
          path: /var/lib/kubelet/plugins/<DOMAIN_69>/mountinfo
          type: DirectoryOrCreate
      containers:
      - name: csi-cephfsplugin
        image: quay.io/cephcsi/cephcsi:v3.16.1
        args:
        - --v=0
        - --type=cephfs
        - --nodeserver=true
        - --nodeid=$(NODE_ID)
        - --drivername=<DOMAIN_69>
        - --endpoint=unix:///csi/<DOMAIN_70>
        - --pidlimit=-1
        - --forcecephkernelclient=true
        env:
        - name: POD_IP
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: <DOMAIN_71>
        - name: NODE_ID
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: <DOMAIN_66>
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: <DOMAIN_72>
        resources: {}
        volumeMounts:
        - name: host-dev
          mountPath: /dev
        - name: host-sys
          mountPath: /sys
        - name: host-run-mount
          mountPath: /run/mount
        - name: lib-modules
          readOnly: true
          mountPath: /lib/modules
        - name: keys-tmp-dir
          mountPath: /tmp/csi/keys
        - name: plugin-dir
          mountPath: /csi
        - name: ceph-csi-config
          mountPath: /etc/ceph-csi-config
        - name: plugin-mount-dir
          mountPath: /var/lib/kubelet/plugins
          mountPropagation: Bidirectional
        - name: pods-mount-dir
          mountPath: /var/lib/kubelet/pods
          mountPropagation: Bidirectional
        - name: ceph-csi-mountinfo
          mountPath: /csi/mountinfo
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
        securityContext:
          capabilities:
            add:
            - SYS_ADMIN
            drop:
            - All
          privileged: true
          allowPrivilegeEscalation: true
      - name: driver-registrar
        image: registry.k8s.io/sig-storage/csi-node-driver-registrar:v2.15.0
        args:
        - --v=0
        - --kubelet-registration-path=/var/lib/kubelet/plugins/<DOMAIN_69>/<DOMAIN_70>
        - --csi-address=unix:///csi/<DOMAIN_70>
        resources: {}
        volumeMounts:
        - name: plugin-dir
          mountPath: /csi
        - name: registration-dir
          mountPath: /registration
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
        securityContext:
          capabilities:
            drop:
            - All
          privileged: true
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: ceph-csi-cephfs-nodeplugin-sa
      serviceAccount: ceph-csi-cephfs-nodeplugin-sa
      hostNetwork: true
      securityContext: {}
      affinity:
        nodeAffinity: {}
      schedulerName: default-scheduler
      priorityClassName: system-cluster-critical
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  revisionHistoryLimit: 10
apiVersion: apps/v1
kind: DaemonSet

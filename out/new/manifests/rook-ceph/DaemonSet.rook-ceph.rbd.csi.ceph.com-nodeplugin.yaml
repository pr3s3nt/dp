metadata:
  name: <DOMAIN_52>-nodeplugin
  namespace: rook-ceph
  annotations:
    deprecated.daemonset.template.generation: '5'
spec:
  selector:
    matchLabels:
      app: <DOMAIN_52>-nodeplugin
  template:
    metadata:
      labels:
        app: <DOMAIN_52>-nodeplugin
    spec:
      volumes:
      - name: host-dev
        hostPath:
          path: /dev
          type: ''
      - name: host-sys
        hostPath:
          path: /sys
          type: ''
      - name: host-run-mount
        hostPath:
          path: /run/mount
          type: ''
      - name: lib-modules
        hostPath:
          path: /lib/modules
          type: ''
      - name: keys-tmp-dir
        emptyDir:
          medium: Memory
      - name: ceph-csi-config
        configMap:
          name: ceph-csi-config
          defaultMode: 420
      - name: plugin-dir
        hostPath:
          path: /var/lib/kubelet/plugins/<DOMAIN_52>
          type: DirectoryOrCreate
      - name: plugin-mount-dir
        hostPath:
          path: /var/lib/kubelet/plugins
          type: Directory
      - name: pods-mount-dir
        hostPath:
          path: /var/lib/kubelet/pods
          type: Directory
      - name: registration-dir
        hostPath:
          path: /var/lib/kubelet/plugins_registry
          type: Directory
      - name: oidc-token
        projected:
          sources:
          - serviceAccountToken:
              audience: ceph-csi-kms
              expirationSeconds: 3600
              path: oidc-token
          defaultMode: 420
      containers:
      - name: csi-rbdplugin
        image: quay.io/cephcsi/cephcsi:v3.16.1
        args:
        - --v=0
        - --type=rbd
        - --nodeserver=true
        - --nodeid=$(NODE_ID)
        - --drivername=<DOMAIN_52>
        - --endpoint=unix:///csi/<DOMAIN_70>
        - --pidlimit=-1
        - --stagingpath=/var/lib/kubelet/plugins/<DOMAIN_43>/csi/
        env:
        - name: POD_IP
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: <DOMAIN_71>
        - name: NODE_ID
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: <DOMAIN_66>
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: <DOMAIN_72>
        resources: {}
        volumeMounts:
        - name: host-dev
          mountPath: /dev
        - name: host-sys
          mountPath: /sys
        - name: host-run-mount
          mountPath: /run/mount
        - name: lib-modules
          readOnly: true
          mountPath: /lib/modules
        - name: keys-tmp-dir
          mountPath: /tmp/csi/keys
        - name: plugin-dir
          mountPath: /csi
        - name: ceph-csi-config
          mountPath: /etc/ceph-csi-config
        - name: plugin-mount-dir
          mountPath: /var/lib/kubelet/plugins
          mountPropagation: Bidirectional
        - name: pods-mount-dir
          mountPath: /var/lib/kubelet/pods
          mountPropagation: Bidirectional
        - name: oidc-token
          readOnly: true
          mountPath: /run/secrets/tokens
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
        securityContext:
          capabilities:
            add:
            - SYS_ADMIN
            drop:
            - All
          privileged: true
          allowPrivilegeEscalation: true
      - name: driver-registrar
        image: registry.k8s.io/sig-storage/csi-node-driver-registrar:v2.15.0
        args:
        - --v=0
        - --kubelet-registration-path=/var/lib/kubelet/plugins/<DOMAIN_52>/<DOMAIN_70>
        - --csi-address=unix:///csi/<DOMAIN_70>
        resources: {}
        volumeMounts:
        - name: plugin-dir
          mountPath: /csi
        - name: registration-dir
          mountPath: /registration
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
        securityContext:
          capabilities:
            drop:
            - All
          privileged: true
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: ceph-csi-rbd-nodeplugin-sa
      serviceAccount: ceph-csi-rbd-nodeplugin-sa
      hostNetwork: true
      hostPID: true
      securityContext: {}
      affinity:
        nodeAffinity: {}
      schedulerName: default-scheduler
      priorityClassName: system-cluster-critical
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  revisionHistoryLimit: 10
apiVersion: apps/v1
kind: DaemonSet

        - --mon-host=$(ROOK_CEPH_MON_HOST)
        - --mon-initial-members=$(ROOK_CEPH_MON_INITIAL_MEMBERS)
        - --id=a
        - --setuser=ceph
        - --setgroup=ceph
        - --client-mount-uid=0
        - --client-mount-gid=0
        - --foreground
        - --public-addr=$(ROOK_POD_IP)
        workingDir: /var/log/ceph
        ports:
        - name: mgr
          containerPort: 6800
          protocol: TCP
        - name: http-metrics
          containerPort: 9283
          protocol: TCP
        - name: dashboard
          containerPort: 8443
          protocol: TCP
        env:
        - name: CONTAINER_IMAGE
          value: quay.io/ceph/ceph:v19.2.3
        - name: POD_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: <DOMAIN_24>
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: <DOMAIN_72>
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: <DOMAIN_66>
        - name: POD_MEMORY_LIMIT
          valueFrom:
            resourceFieldRef:
              resource: <DOMAIN_101>
              divisor: '0'
        - name: POD_MEMORY_REQUEST
          valueFrom:
            resourceFieldRef:
              resource: <DOMAIN_102>
              divisor: '0'
        - name: POD_CPU_LIMIT
          valueFrom:
            resourceFieldRef:
              resource: <DOMAIN_103>
              divisor: '1'
        - name: POD_CPU_REQUEST
          valueFrom:
            resourceFieldRef:
              resource: <DOMAIN_104>
              divisor: '0'
        - name: CEPH_USE_RANDOM_NONCE
          value: 'true'
        - name: ROOK_MSGR2
          value: msgr2_false_encryption_false_compression_false
        - name: ROOK_CEPH_MON_HOST
          valueFrom:
            secretKeyRef:
              name: rook-ceph-config
              key: mon_host
        - name: ROOK_CEPH_MON_INITIAL_MEMBERS
          valueFrom:
            secretKeyRef:
              name: rook-ceph-config
              key: mon_initial_members
        - name: ROOK_OPERATOR_NAMESPACE
          value: rook-ceph
        - name: ROOK_CEPH_CLUSTER_CRD_VERSION
          value: v1
        - name: ROOK_CEPH_CLUSTER_CRD_NAME
          value: rook-ceph
        - name: CEPH_ARGS
          value: --mon-host $(ROOK_CEPH_MON_HOST) --keyring /etc/ceph/keyring-store/keyring
        - name: ROOK_POD_IP
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: <DOMAIN_71>
        resources: {}
        volumeMounts:
        - name: rook-config-override
          readOnly: true
          mountPath: /etc/ceph
        - name: ceph-daemons-sock-dir
          mountPath: /run/ceph
        - name: rook-ceph-mgr-a-keyring
          readOnly: true
          mountPath: /etc/ceph/keyring-store/
        - name: rook-ceph-log
          mountPath: /var/log/ceph
        - name: rook-ceph-crash
          mountPath: /var/lib/ceph/crash
        - name: ceph-daemon-data
          mountPath: /var/lib/ceph/mgr/ceph-a
        livenessProbe:
          exec:
            command:
            - env
            - -i
            - sh
            - -c
            - "\noutp=\"$(ceph --admin-daemon /run/ceph/<DOMAIN_109> status 2>&1)\"\
              \nrc=$?\nif [ $rc -ne 0 ]; then\n\techo \"ceph daemon health check failed\
              \ with the following output:\"\n\techo \"$outp\" | sed -e 's/^/> /g'\n\
              \texit $rc\nfi\n"
          initialDelaySeconds: 10
          timeoutSeconds: 5
          periodSeconds: 10
          successThreshold: 1
          failureThreshold: 3
        startupProbe:
          exec:
            command:
            - env
            - -i
            - sh
            - -c
            - "\noutp=\"$(ceph --admin-daemon /run/ceph/<DOMAIN_109> status 2>&1)\"\
              \nrc=$?\nif [ $rc -ne 0 ]; then\n\techo \"ceph daemon health check failed\
              \ with the following output:\"\n\techo \"$outp\" | sed -e 's/^/> /g'\n\
              \texit $rc\nfi\n"
          initialDelaySeconds: 10
          timeoutSeconds: 5
          periodSeconds: 10
          successThreshold: 1
          failureThreshold: 6
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
        securityContext:
          capabilities:
            drop:
            - NET_RAW
          privileged: false
      - name: watch-active
        image: docker.io/rook/ceph:v1.19.2
        args:
        - ceph
        - mgr
        - watch-active
        env:
        - name: ROOK_CLUSTER_ID
          value: 6ef43355-6835-4968-90b8-cc50af05aa2c
        - name: ROOK_CLUSTER_NAME
          value: rook-ceph
        - name: ROOK_PRIVATE_IP
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: <DOMAIN_71>
        - name: ROOK_PUBLIC_IP
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: <DOMAIN_71>
        - name: POD_NAMESPACE
          value: rook-ceph
        - name: ROOK_MON_ENDPOINTS
          valueFrom:
            configMapKeyRef:
              name: rook-ceph-mon-endpoints
              key: data
        - name: ROOK_CEPH_USERNAME
          valueFrom:
            secretKeyRef:
              name: rook-ceph-mon
              key: ceph-username
        - name: ROOK_CEPH_CONFIG_OVERRIDE
          value: /etc/rook/config/<DOMAIN_110>
        - name: ROOK_DASHBOARD_ENABLED
          value: 'true'
        - name: ROOK_MONITORING_ENABLED
          value: 'false'
        - name: ROOK_UPDATE_INTERVAL
          value: 15s
        - name: ROOK_DAEMON_NAME
          value: a
        - name: ROOK_CEPH_VERSION
          value: ceph version 19.2.3-0 squid
        resources: {}
        volumeMounts:
        - name: rook-config
          mountPath: /var/lib/rook
        - name: default-config-dir
          mountPath: /etc/ceph
        - name: ceph-admin-secret
          readOnly: true
          mountPath: /var/lib/rook-ceph-mon
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
        securityContext:
          capabilities:
            drop:
            - NET_RAW
          privileged: false
      - name: log-collector
        image: quay.io/ceph/ceph:v19.2.3
        command:
        - /bin/bash
        - -x
        - -e
        - -m
        - -c
        - "\nCEPH_CLIENT_ID=ceph-mgr.a\nPERIODICITY=daily\nLOG_ROTATE_CEPH_FILE=/etc/logrotate.d/ceph\n\
          LOG_MAX_SIZE=500M\nROTATE=7\nADDITIONAL_LOG_FILES=\n\n# edit the logrotate\
          \ file to only rotate a specific daemon log\n# otherwise we will logrotate\
          \ log files without reloading certain daemons\n# this might happen when\
          \ multiple daemons run on the same machine\nsed -i \"s|*.log|$CEPH_CLIENT_ID.log\
          \ $ADDITIONAL_LOG_FILES|\" \"$LOG_ROTATE_CEPH_FILE\"\n\n# replace default\
          \ daily with given user input\nsed --in-place \"s/daily/$PERIODICITY/g\"\
          \ \"$LOG_ROTATE_CEPH_FILE\"\n\n# replace rotate count, default 7 for all\
          \ ceph daemons other than rbd-mirror\nsed --in-place \"s/rotate 7/rotate\
          \ $ROTATE/g\" \"$LOG_ROTATE_CEPH_FILE\"\n\nif [ \"$LOG_MAX_SIZE\" != \"\
          0\" ]; then\n\t# adding maxsize $LOG_MAX_SIZE at the 4th line of the logrotate\
          \ config file with 4 spaces to maintain indentation\n\tsed --in-place \"\
          4i \\ \\ \\ \\ maxsize $LOG_MAX_SIZE\" \"$LOG_ROTATE_CEPH_FILE\"\nfi\n\n\
          while true; do\n\t# we don't force the logrorate but we let the logrotate\
          \ binary handle the rotation based on user's input for periodicity and size\n\
          \tlogrotate --verbose \"$LOG_ROTATE_CEPH_FILE\"\n\tsleep 15m\ndone\n"
        resources: {}
        volumeMounts:
        - name: rook-config-override
          readOnly: true
          mountPath: /etc/ceph
        - name: ceph-daemons-sock-dir
          mountPath: /run/ceph
        - name: rook-ceph-log
          mountPath: /var/log/ceph
        - name: rook-ceph-crash
          mountPath: /var/lib/ceph/crash
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
        securityContext:
          capabilities:
            drop:
            - NET_RAW
          privileged: false
        tty: true
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      serviceAccountName: rook-ceph-mgr
      serviceAccount: rook-ceph-mgr
      shareProcessNamespace: true
      securityContext: {}
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: rook-ceph-mgr
                rook_cluster: rook-ceph
            topologyKey: <DOMAIN_43>/hostname
      schedulerName: default-scheduler
      tolerations:
      - key: <DOMAIN_105>/unreachable
        operator: Exists
        effect: NoExecute
        tolerationSeconds: 5
      priorityClassName: system-cluster-critical
  strategy:
    type: Recreate
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600

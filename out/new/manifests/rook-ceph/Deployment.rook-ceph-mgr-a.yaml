          type: ''
      - name: rook-ceph-crash
        hostPath:
          path: /var/lib/rook/rook-ceph/crash
          type: ''
      - name: ceph-daemon-data
        emptyDir: {}
      - name: rook-config
        emptyDir: {}
      - name: default-config-dir
        emptyDir: {}
      - name: ceph-admin-secret
        secret:
          secretName: <REDACTED:env>
          items:
          - key: ceph-secret
            path: <DOMAIN_108>
          defaultMode: 420
      initContainers:
      - name: chown-container-data-dir
        image: quay.io/ceph/ceph:v19.2.3
        command:
        - chown
        args:
        - --verbose
        - --recursive
        - ceph:ceph
        - /var/log/ceph
        - /var/lib/ceph/crash
        - /run/ceph
        - /var/lib/ceph/mgr/ceph-a
        resources: {}
        volumeMounts:
        - name: rook-config-override
          readOnly: true
          mountPath: /etc/ceph
        - name: ceph-daemons-sock-dir
          mountPath: /run/ceph
        - name: rook-ceph-mgr-a-keyring
          readOnly: true
          mountPath: /etc/ceph/keyring-store/
        - name: rook-ceph-log
          mountPath: /var/log/ceph
        - name: rook-ceph-crash
          mountPath: /var/lib/ceph/crash
        - name: ceph-daemon-data
          mountPath: /var/lib/ceph/mgr/ceph-a
        terminationMessagePath: /dev/termination-log

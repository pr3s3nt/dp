  annotations:
    banzaicloud.com/last-applied: 
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rook-ceph-osd
      ceph-osd-id: '1'
      rook_cluster: rook-ceph
  template:
    metadata:
      name: rook-ceph-osd
      labels:
        app: rook-ceph-osd
        app.kubernetes.io/component: <DOMAIN_64>
        app.kubernetes.io/created-by: rook-ceph-operator
        app.kubernetes.io/instance: '1'
        app.kubernetes.io/managed-by: rook-ceph-operator
        app.kubernetes.io/name: ceph-osd
        app.kubernetes.io/part-of: rook-ceph
        ceph-osd-id: '1'
        ceph.rook.io/DeviceSet: ceph-osd-set
        ceph.rook.io/pvc: ceph-osd-set-data-1hvqrb
        ceph_daemon_id: '1'
        ceph_daemon_type: osd
        device-class: hdd
        encrypted: 'false'
        failure-domain: <CLEANUP_HOST_2>
        osd: '1'
        osd-store: bluestore
        portable: 'false'
        rook.io/operator-namespace: rook-ceph
        rook_cluster: rook-ceph
        topology-location-host: <CLEANUP_HOST_2>
        topology-location-root: default
      annotations:
        cephx-status: '{"keyGeneration":1,"keyCephVersion":"19.2.3-0"}'
    spec:
      volumes:
      - name: rook-data
        emptyDir: {}
      - name: rook-config-override
        projected:
          sources:
          - configMap:
              name: rook-config-override
              items:
              - key: config
                path: <DOMAIN_100>
                mode: 292
          defaultMode: 420
      - name: ceph-daemons-sock-dir
        hostPath:
          path: /var/lib/rook/exporter
          type: DirectoryOrCreate
      - name: rook-ceph-log
        hostPath:
          path: /var/lib/rook/rook-ceph/log
          type: ''
      - name: rook-ceph-crash
        hostPath:
          path: /var/lib/rook/rook-ceph/crash
          type: ''
      - name: ceph-osd-set-data-1hvqrb
        persistentVolumeClaim:
          claimName: ceph-osd-set-data-1hvqrb
      - name: ceph-osd-set-data-1hvqrb-bridge
        hostPath:
          path: /var/lib/rook/rook-ceph/ceph-osd-set-data-1hvqrb
          type: DirectoryOrCreate
      - name: run-udev
        hostPath:
          path: /run/udev
          type: ''
      - name: rook-ceph-admin-keyring
        secret:
          secretName: <REDACTED:env>
          defaultMode: 420
      initContainers:
      - name: blkdevmapper
        image: quay.io/ceph/ceph:v19.2.3
        command:
        - /bin/bash
        - -c
        - "\nset -xe\n\nPVC_SOURCE=/ceph-osd-set-data-1hvqrb\nPVC_DEST=/var/lib/ceph/osd/ceph-1/block\n\
          CP_ARGS=(--archive --dereference --verbose)\n\nif [ -b \"$PVC_DEST\" ];\
          \ then\n\tPVC_SOURCE_MAJ_MIN=$(stat --format '%t%T' $PVC_SOURCE)\n\tPVC_DEST_MAJ_MIN=$(stat\
          \ --format '%t%T' $PVC_DEST)\n\tif [[ \"$PVC_SOURCE_MAJ_MIN\" == \"$PVC_DEST_MAJ_MIN\"\
          \ ]]; then\n\t\techo \"PVC $PVC_DEST already exists and has the same major\
          \ and minor as $PVC_SOURCE: \"$PVC_SOURCE_MAJ_MIN\"\"\n\t\texit 0\n\telse\n\
          \t\techo \"PVC's source major/minor numbers changed\"\n\t\tCP_ARGS+=(--remove-destination)\n\
          \tfi\nfi\n\ncp \"${CP_ARGS[@]}\" \"$PVC_SOURCE\" \"$PVC_DEST\"\n"
        resources: {}
        volumeMounts:
        - name: ceph-osd-set-data-1hvqrb-bridge
          mountPath: /var/lib/ceph/osd/ceph-1
          subPath: ceph-1
        volumeDevices:
        - name: ceph-osd-set-data-1hvqrb
          devicePath: /ceph-osd-set-data-1hvqrb
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
        securityContext:
          capabilities:
            add:
            - MKNOD
            drop:
            - NET_RAW
          privileged: false
      - name: activate
        image: quay.io/ceph/ceph:v19.2.3
        command:
        - ceph-bluestore-tool
        args:
        - prime-osd-dir
        - --dev
        - /var/lib/ceph/osd/ceph-1/block
        - --path
        - /var/lib/ceph/osd/ceph-1
        - --no-mon-config
        resources: {}
        volumeMounts:
        - name: ceph-osd-set-data-1hvqrb-bridge
          mountPath: /var/lib/ceph/osd/ceph-1
          subPath: ceph-1
        volumeDevices:
        - name: ceph-osd-set-data-1hvqrb
          devicePath: /var/lib/ceph/osd/ceph-1/block
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
        securityContext:
          capabilities:
            drop:
            - NET_RAW
          privileged: true
          runAsUser: 0
      - name: expand-bluefs
        image: quay.io/ceph/ceph:v19.2.3
        command:
        - ceph-bluestore-tool
        args:
        - bluefs-bdev-expand
        - --path
        - /var/lib/ceph/osd/ceph-1
        resources: {}
        volumeMounts:
        - name: ceph-osd-set-data-1hvqrb-bridge
          mountPath: /var/lib/ceph/osd/ceph-1
          subPath: ceph-1
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
        securityContext:
          capabilities:
            drop:
            - NET_RAW
          privileged: true
          runAsUser: 0
      - name: cephx-keyring-update
        image: quay.io/ceph/ceph:v19.2.3
        command:
        - /bin/bash
        - -c
        - "\nset -o errexit\nset -o nounset\nset -o pipefail\nset -o xtrace\n\nOSD_ID=\"\
          1\"\nKEYRING_FILE=/var/lib/ceph/osd/ceph-\"${OSD_ID}\"/keyring\n\n# If this\
          \ fails, it still writes to redirected file, so use temp file\nif ! ceph\
          \ --name <DOMAIN_116> auth get-or-create osd.\"${OSD_ID}\" \\\n\t\tmon 'allow\
          \ profile osd' mgr 'allow profile osd' osd 'allow *' \\\n\t\t--keyring /etc/ceph/admin-keyring-store/keyring\
          \ > /tmp/keyring; then\n\techo \"failed to get latest cephx key for OSD.\
          \ continuing OSD startup using on-disk key\" >/dev/stderr\n\texit 0\nfi\n\
          \necho \"got latest cephx key for OSD successfully. updating on-disk key\"\
          \ >/dev/stderr\nmv /tmp/keyring \"$KEYRING_FILE\"\n"
        envFrom:
        - configMapRef:
            name: rook-ceph-osd-env-override
            optional: true
        env:
        - name: ROOK_CEPH_MON_HOST
          valueFrom:
            secretKeyRef:
              name: rook-ceph-config
              key: mon_host
        - name: CEPH_ARGS
          value: --mon-host=$(ROOK_CEPH_MON_HOST)
        resources: {}
        volumeMounts:
        - name: rook-config-override
          readOnly: true
          mountPath: /etc/ceph
        - name: rook-ceph-admin-keyring
          readOnly: true
          mountPath: /etc/ceph/admin-keyring-store/
        - name: ceph-osd-set-data-1hvqrb-bridge
          mountPath: /var/lib/ceph/osd/ceph-1
          subPath: ceph-1
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
        securityContext:
          capabilities:
            drop:
            - NET_RAW
          privileged: true
          runAsUser: 0
      - name: chown-container-data-dir
        image: quay.io/ceph/ceph:v19.2.3
        command:
        - chown
        args:
        - --verbose
        - --recursive
        - ceph:ceph
        - /var/log/ceph
        - /var/lib/ceph/crash
        - /run/ceph
        - /var/lib/ceph/osd/ceph-1
        resources: {}
        volumeMounts:
        - name: rook-data
          mountPath: /var/lib/rook
        - name: rook-config-override
          readOnly: true
          mountPath: /etc/ceph
        - name: ceph-daemons-sock-dir
          mountPath: /run/ceph
        - name: rook-ceph-log
          mountPath: /var/log/ceph
        - name: rook-ceph-crash
          mountPath: /var/lib/ceph/crash
        - name: run-udev
          mountPath: /run/udev
        - name: ceph-osd-set-data-1hvqrb-bridge
          mountPath: /var/lib/ceph/osd/ceph-1
          subPath: ceph-1
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
        securityContext:
          capabilities:
            drop:
            - NET_RAW
          privileged: true
          runAsUser: 0
          readOnlyRootFilesystem: false
      containers:
      - name: osd
        image: quay.io/ceph/ceph:v19.2.3
        command:
        - ceph-osd
        args:
        - --foreground
        - --id
        - '1'
        - --fsid
        - cb383da1-48b5-41ca-83b1-bac1627ea207
        - --setuser
        - ceph
        - --setgroup
        - ceph
        - --crush-location=root=default host=<CLEANUP_HOST_2>
        - --default-log-to-stderr=true
        - --default-err-to-stderr=true
        - --default-mon-cluster-log-to-stderr=true
        - '--default-log-stderr-prefix=debug '
        - --default-log-to-file=false
        - --default-mon-cluster-log-to-file=false
        - --ms-learn-addr-from-peer=false
        workingDir: /var/log/ceph
        envFrom:
        - configMapRef:
            name: rook-ceph-osd-env-override
            optional: true
        env:
        - name: ROOK_NODE_NAME
          value: <CLEANUP_HOST_2>
        - name: ROOK_CLUSTER_ID
          value: 6ef43355-6835-4968-90b8-cc50af05aa2c
        - name: ROOK_CLUSTER_NAME
          value: rook-ceph
        - name: ROOK_PRIVATE_IP
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: <DOMAIN_71>
        - name: ROOK_PUBLIC_IP
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: <DOMAIN_71>
        - name: POD_NAMESPACE
          value: rook-ceph
        - name: ROOK_MON_ENDPOINTS
          valueFrom:
            configMapKeyRef:
              name: rook-ceph-mon-endpoints
              key: data
        - name: ROOK_CONFIG_DIR
          value: /var/lib/rook
        - name: ROOK_CEPH_CONFIG_OVERRIDE
          value: /etc/rook/config/<DOMAIN_110>
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: <DOMAIN_66>
        - name: ROOK_CRUSHMAP_ROOT
          value: default
        - name: ROOK_CRUSHMAP_HOSTNAME
        - name: CEPH_VOLUME_DEBUG
          value: '1'
        - name: CEPH_VOLUME_SKIP_RESTORECON
          value: '1'
        - name: DM_DISABLE_UDEV
          value: '1'
        - name: CONTAINER_IMAGE
          value: quay.io/ceph/ceph:v19.2.3
        - name: POD_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: <DOMAIN_24>
        - name: POD_MEMORY_LIMIT
          valueFrom:
            resourceFieldRef:
              resource: <DOMAIN_101>
              divisor: '0'
        - name: POD_MEMORY_REQUEST
          valueFrom:
            resourceFieldRef:
              resource: <DOMAIN_102>
              divisor: '0'
        - name: POD_CPU_LIMIT
          valueFrom:
            resourceFieldRef:
              resource: <DOMAIN_103>
              divisor: '1'
        - name: POD_CPU_REQUEST
          valueFrom:
            resourceFieldRef:
              resource: <DOMAIN_104>
              divisor: '0'
        - name: CEPH_USE_RANDOM_NONCE
          value: 'true'
        - name: ROOK_OSD_RESTART_INTERVAL
          value: '0'
        - name: ROOK_OSD_UUID
          value: 1f69d4a8-3dcf-4818-97c1-24ac03df12e3
        - name: ROOK_OSD_ID
          value: '1'
        - name: ROOK_CEPH_MON_HOST
          valueFrom:
            secretKeyRef:
              name: rook-ceph-config
              key: mon_host
        - name: CEPH_ARGS
          value: -m $(ROOK_CEPH_MON_HOST)
        - name: ROOK_BLOCK_PATH
          value: /mnt/ceph-osd-set-data-1hvqrb
        - name: ROOK_CV_MODE
          value: raw
        - name: ROOK_OSD_DEVICE_CLASS
          value: hdd
        - name: ROOK_POD_IP
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: <DOMAIN_71>
        - name: ROOK_OSD_PVC_SIZE
          value: 2500Gi
        - name: ROOK_PVC_BACKED_OSD
          value: 'true'
        - name: ROOK_MSGR2
          value: msgr2_false_encryption_false_compression_false
        resources: {}
        volumeMounts:
        - name: rook-data
          mountPath: /var/lib/rook
        - name: rook-config-override
          readOnly: true
          mountPath: /etc/ceph
        - name: ceph-daemons-sock-dir
          mountPath: /run/ceph
        - name: rook-ceph-log
          mountPath: /var/log/ceph
        - name: rook-ceph-crash
          mountPath: /var/lib/ceph/crash
        - name: run-udev
          mountPath: /run/udev
        - name: ceph-osd-set-data-1hvqrb-bridge
          mountPath: /var/lib/ceph/osd/ceph-1
          subPath: ceph-1
        livenessProbe:
          exec:
            command:
            - env
            - -i
            - sh
            - -c
            - "\noutp=\"$(ceph --admin-daemon /run/ceph/<DOMAIN_118> status 2>&1)\"\
              \nrc=$?\nif [ $rc -ne 0 ] && [ ! -f /tmp/osd-sleep ]; then\n\techo \"\
              ceph daemon health check failed with the following output:\"\n\techo\
              \ \"$outp\" | sed -e 's/^/> /g'\n\texit $rc\nfi\n"
          initialDelaySeconds: 10
          timeoutSeconds: 5
          periodSeconds: 10
          successThreshold: 1
          failureThreshold: 3
        startupProbe:
          exec:
            command:
            - env
            - -i
            - sh
            - -c
            - "\noutp=\"$(ceph --admin-daemon /run/ceph/<DOMAIN_118> status 2>&1)\"\
              \nrc=$?\nif [ $rc -ne 0 ] && [ ! -f /tmp/osd-sleep ]; then\n\techo \"\
              ceph daemon health check failed with the following output:\"\n\techo\
              \ \"$outp\" | sed -e 's/^/> /g'\n\texit $rc\nfi\n"
          initialDelaySeconds: 10
          timeoutSeconds: 5
          periodSeconds: 10
          successThreshold: 1
          failureThreshold: 720
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
        securityContext:
          capabilities:
            drop:
            - NET_RAW
          privileged: true
          runAsUser: 0
          readOnlyRootFilesystem: false
      - name: log-collector
        image: quay.io/ceph/ceph:v19.2.3
        command:
        - /bin/bash
        - -x
        - -e
        - -m
        - -c
        - "\nCEPH_CLIENT_ID=ceph-osd.1\nPERIODICITY=daily\nLOG_ROTATE_CEPH_FILE=/etc/logrotate.d/ceph\n\
          LOG_MAX_SIZE=500M\nROTATE=7\nADDITIONAL_LOG_FILES=\n\n# edit the logrotate\
          \ file to only rotate a specific daemon log\n# otherwise we will logrotate\
          \ log files without reloading certain daemons\n# this might happen when\
          \ multiple daemons run on the same machine\nsed -i \"s|*.log|$CEPH_CLIENT_ID.log\
          \ $ADDITIONAL_LOG_FILES|\" \"$LOG_ROTATE_CEPH_FILE\"\n\n# replace default\
          \ daily with given user input\nsed --in-place \"s/daily/$PERIODICITY/g\"\
          \ \"$LOG_ROTATE_CEPH_FILE\"\n\n# replace rotate count, default 7 for all\
          \ ceph daemons other than rbd-mirror\nsed --in-place \"s/rotate 7/rotate\
          \ $ROTATE/g\" \"$LOG_ROTATE_CEPH_FILE\"\n\nif [ \"$LOG_MAX_SIZE\" != \"\
          0\" ]; then\n\t# adding maxsize $LOG_MAX_SIZE at the 4th line of the logrotate\
          \ config file with 4 spaces to maintain indentation\n\tsed --in-place \"\
          4i \\ \\ \\ \\ maxsize $LOG_MAX_SIZE\" \"$LOG_ROTATE_CEPH_FILE\"\nfi\n\n\
          while true; do\n\t# we don't force the logrorate but we let the logrotate\
          \ binary handle the rotation based on user's input for periodicity and size\n\
          \tlogrotate --verbose \"$LOG_ROTATE_CEPH_FILE\"\n\tsleep 15m\ndone\n"
        resources: {}
        volumeMounts:
        - name: rook-config-override
          readOnly: true
          mountPath: /etc/ceph
        - name: ceph-daemons-sock-dir
          mountPath: /run/ceph
        - name: rook-ceph-log
          mountPath: /var/log/ceph
        - name: rook-ceph-crash
          mountPath: /var/lib/ceph/crash
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
        securityContext:
          capabilities:
            drop:
            - NET_RAW
          privileged: false
        tty: true
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      nodeSelector:
        kubernetes.io/hostname: <CLEANUP_HOST_2>
      serviceAccountName: rook-ceph-osd
      serviceAccount: rook-ceph-osd
      shareProcessNamespace: true
      securityContext: {}
      affinity: {}
      schedulerName: default-scheduler
      priorityClassName: system-node-critical
  strategy:
    type: Recreate
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
apiVersion: apps/v1
kind: Deployment

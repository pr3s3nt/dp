metadata:
  name: rook-ceph-operator
  namespace: rook-ceph
  labels:
    app.kubernetes.io/component: rook-ceph-operator
    app.kubernetes.io/instance: rook-ceph
    app.kubernetes.io/name: rook-ceph
    app.kubernetes.io/part-of: rook-ceph-operator
    operator: rook
    storage-backend: ceph
  annotations: {}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rook-ceph-operator
  template:
    metadata:
      labels:
        app: rook-ceph-operator
      annotations:
        kubectl.kubernetes.io/restartedAt: '2026-07-13T03:35:05Z'
    spec:
      volumes:
      - name: rook-config
        emptyDir: {}
      - name: default-config-dir
        emptyDir: {}
      containers:
      - name: rook-ceph-operator
        image: docker.io/rook/ceph:v1.19.2
        args:
        - ceph
        - operator
        env:
        - name: ROOK_CURRENT_NAMESPACE_ONLY
          value: 'false'
        - name: ROOK_RECONCILE_CONCURRENT_CLUSTERS
          value: '1'
        - name: ROOK_HOSTPATH_REQUIRES_PRIVILEGED
          value: 'false'
        - name: ROOK_CEPH_MON_RUN_AS_ROOT
          value: 'false'
        - name: DISCOVER_DAEMON_UDEV_BLACKLIST
          value: (?i)dm-[0-9]+,(?i)rbd[0-9]+,(?i)nbd[0-9]+
        - name: ROOK_UNREACHABLE_NODE_TOLERATION_SECONDS
          value: '5'
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: <DOMAIN_66>
        - name: POD_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: <DOMAIN_24>
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: <DOMAIN_72>
        resources: {}
        volumeMounts:
        - name: rook-config
          mountPath: /var/lib/rook
        - name: default-config-dir
          mountPath: /etc/ceph
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
        securityContext:
          capabilities:
            drop:
            - ALL
          runAsUser: 2016
          runAsGroup: 2016
          runAsNonRoot: true
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      serviceAccountName: rook-ceph-system
      serviceAccount: rook-ceph-system
      securityContext: {}
      schedulerName: default-scheduler
      tolerations:
      - key: <DOMAIN_105>/unreachable
        operator: Exists
        effect: NoExecute
        tolerationSeconds: 5
  strategy:
    type: Recreate
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
apiVersion: apps/v1
kind: Deployment

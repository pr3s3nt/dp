    app.kubernetes.io/part-of: rook-ceph-operator
    operator: rook
    storage-backend: ceph
rules:
- verbs:
  - get
  - watch
  - list
  - create
  - update
  - delete
  apiGroups:
  - <DOMAIN_132>
  resources:
  - csiaddonsnodes
- verbs:

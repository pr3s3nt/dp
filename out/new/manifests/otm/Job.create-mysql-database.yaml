metadata:
  name: create-mysql-database
  namespace: otm
  labels:
    batch.kubernetes.io/controller-uid: bb9d9b7e-ec70-4b5c-8db2-a8a020cfaa8c
    batch.kubernetes.io/job-name: create-mysql-database
    controller-uid: bb9d9b7e-ec70-4b5c-8db2-a8a020cfaa8c
    job-name: create-mysql-database
spec:
  parallelism: 1
  completions: 1
  backoffLimit: 3
  selector:
    matchLabels:
      batch.kubernetes.io/controller-uid: bb9d9b7e-ec70-4b5c-8db2-a8a020cfaa8c
  manualSelector: false
  template:
    metadata:
      labels:
        batch.kubernetes.io/controller-uid: bb9d9b7e-ec70-4b5c-8db2-a8a020cfaa8c
        batch.kubernetes.io/job-name: create-mysql-database
        controller-uid: bb9d9b7e-ec70-4b5c-8db2-a8a020cfaa8c
        job-name: create-mysql-database
    spec:
      containers:
      - name: create-db
        image: <DOMAIN_30>.<COMPANY_DOMAIN>/otm/db/mysql:5.6
        command:
        - bash
        - -c
        - "set -ex\nuntil mysql -h mysql-prd.otm.svc.cluster.local -uroot -p$MYSQL_ROOT_PASSWORD\
          \ -e \"SELECT 1\" 2>/dev/null; do\n  echo \"Waiting for MySQL...\"\n  sleep\
          \ 2\ndone\nmysql -h mysql-prd.otm.svc.cluster.local -uroot -p$MYSQL_ROOT_PASSWORD\
          \ -e \"CREATE DATABASE IF NOT EXISTS \\`${DB_NAME}\\` CHARACTER SET utf8mb4\
          \ COLLATE utf8mb4_unicode_ci;\"\necho \"Database created!\"\n"
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-root-pass
              key: password
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: otm-prd-be-secret
              key: db_name
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      restartPolicy: OnFailure
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      securityContext: {}
      imagePullSecrets:
      - name: harbor-registry-secret
      schedulerName: default-scheduler
  completionMode: NonIndexed
  suspend: false
  podReplacementPolicy: TerminatingOrFailed
apiVersion: batch/v1
kind: Job

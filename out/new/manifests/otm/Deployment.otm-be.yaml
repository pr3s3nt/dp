metadata:
  name: otm-be
  namespace: otm
  labels:
    app: otm-be
  annotations:
    field.cattle.io/publicEndpoints: 'null'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otm-be
  template:
    metadata:
      namespace: otm
      labels:
        app: otm-be
    spec:
      containers:
      - name: otm-be
        image: <DOMAIN_30>.<COMPANY_DOMAIN>/otm/prd/be:22
        ports:
        - name: 1080tcp
          containerPort: 1080
          protocol: TCP
        envFrom:
        - configMapRef:
            name: be-env-vars
        env:
        - name: db_name
          valueFrom:
            secretKeyRef:
              name: otm-prd-be-secret
              key: db_name
        - name: db_user
          valueFrom:
            secretKeyRef:
              name: otm-prd-be-secret
              key: db_user
        - name: db_password
          valueFrom:
            secretKeyRef:
              name: otm-prd-be-secret
              key: db_password
        - name: db_host
          valueFrom:
            secretKeyRef:
              name: otm-prd-be-secret
              key: db_host
        - name: db_port
          valueFrom:
            secretKeyRef:
              name: otm-prd-be-secret
              key: db_port
        - name: email_service_user
          valueFrom:
            secretKeyRef:
              name: otm-prd-be-secret
              key: email_service_user
        - name: email_service_password
          valueFrom:
            secretKeyRef:
              name: otm-prd-be-secret
              key: email_service_password
        - name: email_service_auth_token
          valueFrom:
            secretKeyRef:
              name: otm-prd-be-secret
              key: email_service_auth_token
        - name: AES_KEY
          valueFrom:
            secretKeyRef:
              name: otm-prd-be-secret
              key: AES_KEY
        - name: ENCRYPT_KEY
          valueFrom:
            secretKeyRef:
              name: otm-prd-be-secret
              key: ENCRYPT_KEY
        resources:
          limits:
            cpu: '4'
            memory: 4Gi
          requests:
            cpu: '2'
            memory: 2Gi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      securityContext: {}
      imagePullSecrets:
      - name: harbor-registry-secret
      schedulerName: default-scheduler
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
apiVersion: apps/v1
kind: Deployment

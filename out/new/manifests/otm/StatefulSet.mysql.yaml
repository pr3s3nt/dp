metadata:
  name: mysql
  namespace: otm
  labels:
    app: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      volumes:
      - name: conf
        emptyDir: {}
      - name: config-map
        configMap:
          name: mysql
          defaultMode: 420
      initContainers:
      - name: init-mysql
        image: <DOMAIN_30>.<COMPANY_DOMAIN>/otm/db/mysql:5.6
        command:
        - bash
        - -c
        - "set -ex\n[[ `hostname` =~ -([0-9]+)$ ]] || exit 1\nordinal=${BASH_REMATCH[1]}\n\
          echo [mysqld] > /mnt/conf.d/<DOMAIN_120>\necho server-id=$((100 + $ordinal))\
          \ >> /mnt/conf.d/<DOMAIN_120>\nif [[ $ordinal -eq 0 ]]; then\n  cp /mnt/config-map/<DOMAIN_121>\
          \ /mnt/conf.d/\nelse\n  cp /mnt/config-map/<DOMAIN_122> /mnt/conf.d/\nfi\n"
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-root-pass
              key: password
        resources: {}
        volumeMounts:
        - name: conf
          mountPath: /mnt/conf.d
        - name: config-map
          mountPath: /mnt/config-map
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      - name: clone-mysql
        image: <DOMAIN_30>.<COMPANY_DOMAIN>/otm/prd/xtrabackup:1.0
        command:
        - bash
        - -c
        - 'set -ex

          [[ -d /var/lib/mysql/mysql ]] && exit 0

          [[ `hostname` =~ -([0-9]+)$ ]] || exit 1

          ordinal=${BASH_REMATCH[1]}

          [[ $ordinal -eq 0 ]] && exit 0

          ncat --recv-only mysql-$(($ordinal-1)).mysql 3307 | xbstream -x -C /var/lib/mysql

          xtrabackup --prepare --target-dir=/var/lib/mysql

          '
        resources: {}
        volumeMounts:
        - name: otm
          mountPath: /var/lib/mysql
          subPath: mysql
        - name: conf
          mountPath: /etc/mysql/conf.d
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      containers:
      - name: mysql
        image: <DOMAIN_30>.<COMPANY_DOMAIN>/otm/db/mysql:5.6
        ports:
        - name: mysql
          containerPort: 3306
          protocol: TCP
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-root-pass
              key: password
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
        volumeMounts:
        - name: otm
          mountPath: /var/lib/mysql
          subPath: mysql
        - name: conf
          mountPath: /etc/mysql/conf.d
        livenessProbe:
          exec:
            command:
            - bash
            - -c
            - 'mysqladmin -uroot -p"$MYSQL_ROOT_PASSWORD" ping

              '
          initialDelaySeconds: 120
          timeoutSeconds: 5
          periodSeconds: 20
          successThreshold: 1
          failureThreshold: 5
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      - name: xtrabackup
        image: <DOMAIN_30>.<COMPANY_DOMAIN>/otm/prd/xtrabackup:1.0
        command:
        - bash
        - -c
        - "set -ex\ncd /var/lib/mysql\nif [[ -f xtrabackup_slave_info ]]; then\n \
          \ mv xtrabackup_slave_info change_master_to.<DOMAIN_123>\n  rm -f xtrabackup_binlog_info\n\
          elif [[ -f xtrabackup_binlog_info ]]; then\n  [[ `cat xtrabackup_binlog_info`\
          \ =~ ^(.*?)[[:space:]]+(.*?)$ ]] || exit 1\n  rm xtrabackup_binlog_info\n\
          \  echo \"CHANGE MASTER TO MASTER_LOG_FILE='${BASH_REMATCH[1]}', MASTER_LOG_POS=${BASH_REMATCH[2]}\"\
          \ > change_master_to.<DOMAIN_123>\nfi\nif [[ -f change_master_to.<DOMAIN_123>\
          \ ]]; then\n  echo \"Waiting for mysqld to be ready (accepting connections)\"\
          \n  until mysql -h 127.0.0.1 -uroot -p$MYSQL_ROOT_PASSWORD -e \"SELECT 1\"\
          ; do sleep 1; done\n  echo \"Initializing replication from clone position\"\
          \n  mv change_master_to.<DOMAIN_123> change_master_to.<DOMAIN_124>\n  mysql\
          \ -h 127.0.0.1 -uroot -p$MYSQL_ROOT_PASSWORD <<EOF\n$(<change_master_to.<DOMAIN_124>),\n\
          \  MASTER_HOST='<DOMAIN_125>',\n  MASTER_USER='root',\n  MASTER_PASSWORD=$MYSQL_ROOT_PASSWORD,\n\
          \  MASTER_CONNECT_RETRY=10;\nSTART SLAVE;\nEOF\nfi\nexec ncat --listen --keep-open\
          \ --send-only --max-conns=1 3307 -c \\\n  \"xtrabackup --backup --slave-info\
          \ --stream=xbstream --host=127.0.0.1 --user=root\"\n"
        ports:
        - name: xtrabackup
          containerPort: 3307
          protocol: TCP
        resources:
          requests:
            cpu: 100m
            memory: 100Mi
        volumeMounts:
        - name: otm
          mountPath: /var/lib/mysql
          subPath: mysql
        - name: conf
          mountPath: /etc/mysql/conf.d
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      securityContext: {}
      imagePullSecrets:
      - name: harbor-registry-secret
      schedulerName: default-scheduler
  volumeClaimTemplates:
  - kind: PersistentVolumeClaim
    apiVersion: v1
    metadata:
      name: otm
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 30Gi
      storageClassName: rook-ceph-block
      volumeMode: Filesystem
  serviceName: mysql
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0
      maxUnavailable: 1
  revisionHistoryLimit: 10
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
apiVersion: apps/v1
kind: StatefulSet

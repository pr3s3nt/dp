metadata:
  name: mysql
  namespace: otm
  labels:
    app: mysql
data:
  master.cnf: '# Apply this config only on the master.

    [mysqld]

    log-bin

    binlog_format=MIXED

    innodb_use_sys_malloc = 0

    key_buffer_size = 16M

    read_buffer_size = 2M

    innodb_buffer_pool_size = 512M

    max_connections = 100

    thread_stack = 512K

    innodb_force_recovery = 0

    log-bin=mysqld-bin

    '
  slave.cnf: '# Apply this config only on slaves.

    [mysqld]

    super-read-only

    innodb_use_sys_malloc = 0

    key_buffer_size = 16M

    read_buffer_size = 2M

    innodb_buffer_pool_size = 512M

    max_connections = 100

    thread_stack = 512K

    innodb_force_recovery = 0

    log-bin=mysqld-bin

    '
apiVersion: v1
kind: ConfigMap
